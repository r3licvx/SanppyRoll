<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Loading... - SanppyRoll</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Anime.js CDN dependency required for motion transitions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <style>
    :root {
        --accent: #f47521;
        --bg-main: #0b0b0e;
        --bg-card: #14151a;
        --border-tint: rgba(255, 255, 255, 0.06);
        --text-secondary: #a0a0a5;
    }
    *, *::before, *::after {
        margin: 0; padding: 0; box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        user-select: none; -webkit-user-select: none;
    }
    
    body, input, button, select, textarea, div, p, span, h1, h2, h3, h4, h5, h6, a {
        font-family: 'SF Pro Display', -apple-system, sans-serif;
    }

    body { background: var(--bg-main); color: #fff; min-height: 100vh; overflow-x: hidden; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    img { pointer-events: none; -webkit-user-drag: none; display: block; }

    .svg-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── SHIMMER ANIMATION ── */
    .skeleton {
        background: #14151a;
        background-image: linear-gradient(90deg, #14151a 0px, #1c1d24 40px, #14151a 80px);
        background-size: 600px; 
        animation: shimmer 1.5s infinite linear; 
        border-radius: 4px; 
        pointer-events: none;
    }
    @keyframes shimmer { 0% { background-position: -300px 0; } 100% { background-position: 800px 0; } }

    /* ── NAVBAR ── */
    .navbar {
        position: fixed; top: 0; left: 0; width: 100%; height: 90px; z-index: 2000;
        display: flex; justify-content: space-between; align-items: flex-start;
        padding: 14px 5%;
        background: linear-gradient(to bottom, rgba(11,11,14,0.75) 0%, rgba(11,11,14,0.2) 55%, transparent 100%);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        -webkit-mask-image: linear-gradient(to bottom, black 45%, transparent 100%);
        mask-image: linear-gradient(to bottom, black 45%, transparent 100%);
    }
    .back-btn-new {
        background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border-tint); color: #fff;
        width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
        transition: background 0.2s, transform 0.2s; backdrop-filter: blur(5px); z-index: 10;
    }
    .back-btn-new:active { transform: scale(0.88); background: rgba(255, 255, 255, 0.15); }
    .nav-actions { display: flex; align-items: center; gap: 10px; pointer-events: auto; }

    .profile-btn { 
        position: relative;
        width: 36px;   
        height: 36px; 
        border-radius: 50%; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        background: #1a1a1a;
        border: 2.5px solid transparent;  
        padding: 2px;  
        cursor: pointer;
        box-sizing: border-box;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
    }
    .profile-btn:active { transform: scale(0.9); }
    .profile-btn.premium-user { border-color: var(--accent) !important; }
    .profile-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }

    /* ── IMMERSIVE BANNER & HERO ── */
    .backdrop-container {
        position: relative; width: 100%; height: 42vh; background: #000; overflow: hidden;
    }
    .backdrop-img {
        width: 100%; height: 100%; background-size: cover; background-position: center top;
        opacity: 0.5; transform: scale(1.05); transition: opacity 0.5s ease;
    }
    .backdrop-fade {
        position: absolute; bottom: 0; left: 0; width: 100%; height: 80%;
        background: linear-gradient(to top, var(--bg-main) 0%, rgba(11,11,14,0.4) 60%, transparent 100%);
    }

    .hero-details-row {
        display: flex; gap: 16px; padding: 0 5%; margin-top: -80px; position: relative; z-index: 10; align-items: flex-end;
    }
    .poster-container {
        width: 105px; aspect-ratio: 2/3; border-radius: 6px; overflow: hidden;
        box-shadow: 0 8px 24px rgba(0,0,0,0.6); background: #151518; flex-shrink: 0; opacity: 0;
        border: 1px solid rgba(255,255,255,0.05);
    }
    .poster-container img { width: 100%; height: 100%; object-fit: cover; }

    .info-container { display: flex; flex-direction: column; width: 100%; }
    .d-title { font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; opacity: 0; color: #fff; letter-spacing: -0.5px; }

    /* ── METADATA & BADGES ── */
    .meta-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 11px; font-weight: 700; color: var(--text-secondary); opacity: 0; }
    .meta-item { text-transform: uppercase; letter-spacing: 0.5px; }
    .meta-dot { color: rgba(255,255,255,0.2); }
    .star-rating { color: #f5c518; display: inline-flex; align-items: center; gap: 4px; }
    .star-rating svg { width: 11px; height: 11px; fill: currentColor; }

    .badges-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; opacity: 0; }
    .badge { 
        background: rgba(255, 255, 255, 0.08); 
        border: 1px solid rgba(255, 255, 255, 0.04);
        padding: 3px 8px; 
        border-radius: 4px; 
        font-size: 9px; 
        font-weight: 800; 
        color: #e4e4e9; 
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Collapsible Plot Description */
    .synopsis-container { padding: 15px 5% 5px; position: relative; z-index: 10; }
    .synopsis-text { font-size: 13px; color: #b0b0b6; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; opacity: 0; transition: all 0.3s; }
    .synopsis-text.expanded { display: block; -webkit-line-clamp: unset; }
    .btn-synopsis-toggle { background: none; border: none; color: var(--accent); font-size: 12px; font-weight: 800; cursor: pointer; margin-top: 6px; display: none; opacity: 0; }

    /* ── CRUNCHYROLL STYLE BUTTON MATRIX ── */
    .actions-grid {
        display: flex; gap: 10px; padding: 15px 5%; position: relative; z-index: 10; align-items: center;
    }
    .btn-crunchy-play {
        flex: 1.5; background: var(--accent); border: none; border-radius: 4px; height: 46px;
        color: #fff; font-size: 13px; font-weight: 900; display: flex; align-items: center;
        justify-content: center; gap: 8px; cursor: pointer; transition: background 0.2s, transform 0.2s;
        letter-spacing: 0.5px; opacity: 0;
    }
    .btn-crunchy-play:active { transform: scale(0.97); background: #dd5a02; }
    
    .btn-crunchy-secondary {
        flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; height: 46px;
        color: #fff; font-size: 12px; font-weight: 800; display: flex; align-items: center;
        justify-content: center; gap: 6px; cursor: pointer; transition: all 0.2s; opacity: 0;
    }
    .btn-crunchy-secondary:active { background: rgba(255,255,255,0.05); transform: scale(0.97); }
    .btn-crunchy-secondary.active-trailer { border-color: var(--accent); color: var(--accent); background: rgba(244,117,33,0.05); }

    .btn-crunchy-icon {
        width: 46px; height: 46px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-tint);
        border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff;
        cursor: pointer; transition: all 0.2s; opacity: 0;
    }
    .btn-crunchy-icon:active { background: rgba(255,255,255,0.1); transform: scale(0.93); }
    .btn-crunchy-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; }

    /* ── INLINE TRAILER CONTROLLER ── */
    .inline-trailer-section {
        width: 90%; max-height: 0; overflow: hidden; background: #000;
        margin: 0 auto; border-radius: 8px; border: 0px solid transparent;
        transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-width 0.1s, margin 0.4s;
        position: relative; display: flex; flex-direction: column; z-index: 15;
    }
    .inline-trailer-section.active {
        max-height: 52vw;
        margin: 5px auto 15px;
        border: 1px solid var(--accent);
    }
    .player-wrapper { position: relative; width: 100%; height: 100%; aspect-ratio: 16/9; }
    .player-wrapper video, .player-wrapper iframe { width: 100%; height: 100%; border: none; display: block; object-fit: cover; }

    .player-top-bar {
        position: absolute; top: 0; left: 0; width: 100%; padding: 10px 14px;
        display: flex; align-items: center; z-index: 20;
        background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
        opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s;
    }
    .player-top-bar .trailer-lbl {
        font-size: 11px; font-weight: 700; color: #fff; opacity: 0.9;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%;
    }
    .inline-trailer-section.show-controls .player-top-bar { opacity: 1; visibility: visible; }

    .html5-controls {
        position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 14px 10px;
        background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        display: flex; align-items: center; gap: 10px; z-index: 20;
        opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s;
    }
    .inline-trailer-section.show-controls .html5-controls { opacity: 1; visibility: visible; }

    .play-pause-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; }
    .play-pause-btn svg { width: 18px; height: 18px; fill: currentColor; }

    .progress-container { flex: 1; height: 16px; display: flex; align-items: center; cursor: pointer; position: relative; touch-action: none; }
    .progress-track { width: 100%; height: 3px; background: rgba(255,255,255,0.25); border-radius: 1.5px; position: relative; pointer-events: none; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 1.5px; width: 0%; position: relative; }
    .progress-bar::after { content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: #fff; border-radius: 50%; }
    .time-display { color: rgba(255,255,255,0.85); font-size: 10px; font-weight: 500; }
    .player-tap-layer { position: absolute; inset: 0; z-index: 10; cursor: pointer; }

    .inline-mute-btn { background: none; border: none; color: #fff; cursor: pointer; display: flex; align-items: center; }

    /* ── EPISODES LIST FLAT SLATE STYLE ── */
    .details-container { padding: 10px 5% 40px; position: relative; z-index: 10; }
    .section-header-title { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

    .season-dropdown-wrapper { margin-bottom: 15px; position: relative; width: 100%; max-width: 280px; }
    .season-dropdown-wrapper select {
        width: 100%; background: var(--bg-card); border: 1px solid var(--border-tint);
        padding: 10px 14px; border-radius: 4px; color: #fff; font-size: 13px; font-weight: 700;
        outline: none; cursor: pointer; appearance: none; -webkit-appearance: none;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        background-repeat: no-repeat; background-position: right 14px center; background-size: 14px;
    }

    #episode-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
    .ep-card {
        display: flex; gap: 12px; background: var(--bg-card); padding: 10px; border-radius: 6px;
        border: 1px solid var(--border-tint); align-items: center; cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
    }
    .ep-card:hover { border-color: rgba(255,255,255,0.12); }
    .ep-thumb-wrapper {
        width: 110px; aspect-ratio: 16/9; border-radius: 4px; overflow: hidden; position: relative; flex-shrink: 0; background: #000;
    }
    .ep-thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .ep-play-overlay {
        position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 16px; opacity: 0.9; transition: transform 0.2s;
    }
    .ep-card:active .ep-play-overlay { transform: scale(0.9); }

    .ep-meta-wrapper { display: flex; flex-direction: column; justify-content: center; min-width: 0; flex: 1; }
    .ep-num-title { font-size: 13px; font-weight: 800; color: #fff; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .ep-plot { font-size: 10.5px; color: var(--text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-top: 3px; }

    /* ── TELEGRAM PROMO BANNER ── */
    .tg-promo-banner {
        background: linear-gradient(135deg, rgba(20, 21, 26, 0.9) 0%, rgba(36, 161, 222, 0.08) 100%);
        border: 1px solid rgba(36, 161, 222, 0.2); border-radius: 8px; padding: 14px;
        display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px;
        cursor: pointer; transition: transform 0.2s, border-color 0.2s; position: relative; z-index: 10;
    }
    .tg-promo-banner:active { transform: scale(0.98); border-color: rgba(36, 161, 222, 0.4); }
    .tg-banner-content { display: flex; align-items: center; gap: 12px; }
    .tg-banner-icon { font-size: 26px; color: #24a1de; }
    .tg-banner-text h4 { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 2px; }
    .tg-banner-text p { font-size: 10px; color: var(--text-secondary); line-height: 1.3; }
    .tg-banner-arrow { font-size: 12px; color: rgba(255,255,255,0.25); }

    /* ── SPEC DETAILS PANEL (CRUNCHYROLL GRID) ── */
    .specs-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 25px;
        background: var(--bg-card);
        border: 1px solid var(--border-tint);
        border-radius: 8px;
        padding: 16px;
    }
    .spec-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
        opacity: 0;
    }
    .spec-key {
        font-size: 9.5px;
        font-weight: 800;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.6px;
    }
    .spec-value {
        font-size: 12.5px;
        font-weight: 600;
        color: #fff;
        line-height: 1.4;
        text-align: left;
    }

    /* ── SCROLLABLE CAST ── */
    .cast-section { margin-bottom: 25px; opacity: 0; }
    .cast-scroll-container { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
    .cast-scroll-container::-webkit-scrollbar { display: none; }
    .cast-card { display: flex; flex-direction: column; align-items: center; text-align: center; width: 70px; flex-shrink: 0; }
    .cast-img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; margin-bottom: 6px; border: 1px solid var(--border-tint); background: #1a1a1a; }
    .cast-img-initial { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f47521, #e00073); color: #fff; font-weight: 800; font-size: 16px; margin-bottom: 6px; border: 1px solid var(--border-tint); }
    .cast-name { font-size: 10px; font-weight: 700; color: #fff; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .cast-role { font-size: 8.5px; color: var(--text-secondary); line-height: 1.1; margin-top: 1px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── WIDESCREEN SCREENSHOTS HORIZONTAL CAROUSEL ── */
    .screenshots-container { margin-bottom: 25px; opacity: 0; }
    .ss-scroll-container {
        display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none;
    }
    .ss-scroll-container::-webkit-scrollbar { display: none; }
    .ss-card {
        width: 220px; aspect-ratio: 16/9; border-radius: 6px; overflow: hidden; background: #111;
        border: 1px solid var(--border-tint); flex-shrink: 0;
    }
    .ss-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }

    /* ── ALERT MODAL ── */
    .modal-overlay {
        position: fixed; inset: 0; background: rgba(5, 5, 8, 0.4);
        backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
        z-index: 99999; display: flex; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none; transition: opacity 0.35s cubic-bezier(0.25, 1, 0.5, 1), backdrop-filter 0.35s, -webkit-backdrop-filter 0.35s;
    }
    .modal-overlay.active {
        opacity: 1; pointer-events: auto;
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .modal-box {
        background: #14151a; border: 1px solid rgba(255, 255, 255, 0.08);
        width: 85%; max-width: 310px; border-radius: 6px; padding: 24px; text-align: center;
        box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        transform: scale(0.9) translateY(15px); transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }
    .modal-icon {
        color: var(--accent); width: 44px; height: 44px; margin: 0 auto 14px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(244, 117, 33, 0.1); border-radius: 50%;
    }
    .modal-icon svg { width: 20px; height: 20px; stroke-width: 2.5; }
    .modal-title { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .modal-text { font-size: 12.5px; color: var(--text-secondary); line-height: 1.4; margin-bottom: 20px; }
    .modal-close-btn {
        width: 100%; background: #fff; color: #000; border: none; font-size: 13px; font-weight: 800;
        padding: 10px 0; border-radius: 4px; cursor: pointer; transition: transform 0.2s;
    }
    .modal-close-btn:active { transform: scale(0.96); }

    /* TOAST */
    .toast { position: fixed; top: -80px; left: 50%; transform: translateX(-50%); background: #14151a; color: #fff; padding: 10px 16px; border-radius: 20px; font-size: 12.5px; font-weight: 700; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 30000; transition: top 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); border: 1px solid rgba(255,59,48,0.3); display: flex; align-items: center; gap: 8px; }
    .toast.show { top: 30px; }
    .toast.success { color: #32d74b; border-color: rgba(50,215,75,0.3); }

    /* TMDB FOOTER */
    .tmdb-attribution-footer {
        display: flex; align-items: center; justify-content: center;
        margin-top: 30px; padding: 20px 5%; border-top: 1px solid rgba(255,255,255,0.04);
        cursor: pointer; text-decoration: none;
    }
    .tmdb-logo-svg { height: 14px; fill: #01b4e4; }

    /* Loader */
    .loader-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 99999; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.3s; }
    .loader-overlay.active { visibility: visible; opacity: 1; }
    .spinner { width: 34px; height: 34px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
        .backdrop-container { height: 32vh; }
    }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="loader-overlay" id="loader"><div class="spinner"></div></div>

<!-- ── ALERTS MODAL ── -->
<div class="modal-overlay" id="modal-container" onclick="closeAlertModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        </div>
        <h3 class="modal-title" id="modal-title">Unavailable</h3>
        <p class="modal-text" id="modal-text">Streaming link is not registered inside the database yet.</p>
        <button class="modal-close-btn" onclick="closeAlertModal()">OK</button>
    </div>
</div>

<div id="toast" class="toast">
    <svg class="svg-icon" id="toast-icon" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span id="toast-msg">Error</span>
</div>

<!-- ── SKELETON LAYOUT ── -->
<div id="skeleton-ui" style="display: block; position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 0 0 40px 0;">
    <div class="skeleton" style="width: 100%; height: 32vh; border-radius: 0;"></div>
    
    <div style="display: flex; gap: 15px; padding: 0 5%; margin-top: -60px; margin-bottom: 20px;">
        <div class="skeleton" style="width: 105px; aspect-ratio: 2/3; border-radius: 6px; flex-shrink: 0;"></div>
        <div style="width: 100%; display: flex; flex-direction: column; gap: 8px; justify-content: flex-end; padding-bottom: 10px;">
            <div class="skeleton" style="width: 80%; height: 20px;"></div>
            <div style="display: flex; gap: 6px;">
                <div class="skeleton" style="width: 45px; height: 14px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDnmFVfVSCxXC9shWhz4dw06xtTNBA6vsU",
        authDomain: "sanppyroll.firebaseapp.com",
        databaseURL: "https://sanppyroll-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sanppyroll",
        storageBucket: "sanppyroll.firebasestorage.app",
        messagingSenderId: "642736474886",
        appId: "1:642736474886:web:f0e0e3c04101fddfe02c87"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');
    const mediaType = urlParams.get('type') || 'tv';
    let sIdx = urlParams.get('s') !== null ? parseInt(urlParams.get('s')) : null;
    let eIdx = urlParams.get('e') !== null ? parseInt(urlParams.get('e')) : null;

    let movieData = null;
    let currentSeasonIndex = 0;
    let currentUser = null;
    let userSubPlan = 'free';

    // Trailer controls state
    let isModalMuted = false;
    let isPlaying = true;
    let customVideoElement = null;
    let controlsTimer = null;
    let isDraggingTimeline = false;
    let isTrailerOpen = false;

    if (mediaType === 'tv' || mediaType === 'series' || sIdx !== null) {
        const skSeriesBlock = document.getElementById('skeleton-series-block');
        if (skSeriesBlock) skSeriesBlock.style.display = 'block';
    }

    function showLoader(show) { 
        const loader = document.getElementById('loader');
        if (loader) loader.classList.toggle('active', show); 
    }

    window.showAlertModal = function(title, text) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('modal-container').classList.add('active');
    };

    window.closeAlertModal = function() {
        document.getElementById('modal-container').classList.remove('active');
    };

    function setProfileIcon(user) {
        const profileImg = document.getElementById('user-profile-icon');
        if (!profileImg) return;

        if (!user) {
            profileImg.innerHTML = `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;
            return;
        }

        let avatarUrl = user.photoURL || '';
        let uName = user.displayName || (user.email ? user.email.split('@')[0] : '?');

        try {
            const profileSnapPromise = get(child(dbRef, `users/${user.uid}/profile`));
            const subSnapPromise = get(child(dbRef, `users/${user.uid}/subscription`));

            Promise.all([profileSnapPromise, subSnapPromise]).then(([profileSnap, subSnap]) => {
                if (subSnap.exists() && subSnap.val().plan && subSnap.val().expiry > Date.now()) {
                    userSubPlan = subSnap.val().plan;
                    profileImg.classList.add('premium-user');
                } else {
                    userSubPlan = 'free';
                }

                if (profileSnap.exists()) {
                    const profile = profileSnap.val() || {};
                    if (profile.avatarUrl) avatarUrl = profile.avatarUrl;
                    if (profile.username) uName = profile.username;
                }

                if (avatarUrl) {
                    profileImg.innerHTML = `<img src="${avatarUrl}" alt="Profile">`;
                } else {
                    let initial = (uName || 'U').charAt(0).toUpperCase();
                    profileImg.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #f47521, #e00073);color:#fff;font-weight:900;font-size:14px;border-radius:50%;">${initial}</div>`;
                }
            }).catch(() => {
                let initial = (uName || 'U').charAt(0).toUpperCase();
                profileImg.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #f47521, #e00073);color:#fff;font-weight:900;font-size:14px;border-radius:50%;">${initial}</div>`;
            });
        } catch (e) {
            let initial = (uName || 'U').charAt(0).toUpperCase();
            profileImg.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #f47521, #e00073);color:#fff;font-weight:900;font-size:14px;border-radius:50%;">${initial}</div>`;
        }
    }

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        setProfileIcon(user);
        if (!movieData) fetchDetails();
    });

    window.showToast = function(msg, type = "error") {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toast-icon');
        toast.className = 'toast show';
        if (type === 'success') {
            toast.classList.add('success');
            icon.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
        } else {
            icon.innerHTML = '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>';
        }
        document.getElementById('toast-msg').innerText = msg;
        setTimeout(() => toast.classList.remove('show'), 3000);
    };

    // HYBRID FETCH: Firebase data serves as the source of truth, TMDB purely enriches Cast, Crew & Trailers
    async function fetchDetails() {
        if (!movieId) { window.location.replace('index.html'); return; }
        
        showLoader(true);
        try {
            const fbSnap = await get(child(dbRef, `movies/${movieId}`));
            if (!fbSnap.exists()) {
                showToast("Content not found inside database!");
                showNotFoundError();
                showLoader(false);
                return;
            }
            const fbData = fbSnap.val() || {};

            movieData = {
                title: fbData.title || "Untitled Anime",
                description: fbData.description || "No plot synopsis is available currently.",
                poster: fbData.poster || "logo.png",
                backdrop: fbData.backdrop || fbData.poster || "",
                year: fbData.year || "",
                rating: fbData.rating || "8.5",
                genres: fbData.genres || "",
                video_links: fbData.video_links || [],
                audio_links: fbData.audio_links || [],
                seasons: fbData.seasons || [],
                access_level: fbData.access_level || "free",
                screenshots: fbData.screenshots || [],
                cast: fbData.cast || "",
                trailer_url: fbData.trailer_url || fbData.trailer || "",
                isCustom: true
            };

            const tmdbKeySnap = await get(child(dbRef, 'settings/tmdb_api_key'));
            const apiKey = tmdbKeySnap.exists() ? tmdbKeySnap.val() : null;
            const isNumericId = !isNaN(movieId);

            if (isNumericId && apiKey) {
                const tmdbType = (fbData.type === 'series' || mediaType === 'series' || mediaType === 'tv') ? 'tv' : 'movie';
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/${tmdbType}/${movieId}?api_key=${apiKey}&append_to_response=credits,videos&language=en-US`);
                    if (res.ok) {
                        const tmdbData = await res.json();
                        movieData.credits = tmdbData.credits;
                        
                        if (!movieData.trailer_url && tmdbData.videos) {
                            const youtubeTrailer = (tmdbData.videos.results || []).find(v => v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser'));
                            if (youtubeTrailer) {
                                movieData.trailer_url = `https://www.youtube.com/watch?v=${youtubeTrailer.key}`;
                            }
                        }
                        movieData.isCustom = false;
                    }
                } catch (tmdbErr) {
                    console.warn("TMDB Credits fetch failed, keeping FB metadata: ", tmdbErr);
                }
            }
            
            renderPage();
        } catch(err) {
            console.error("Fatal error loading details:", err);
            showToast("Failed to load content details.");
            showNotFoundError();
        }
        showLoader(false);
    }

    function showNotFoundError() {
        document.getElementById('skeleton-ui').style.display = 'none';
        const realUi = document.getElementById('real-ui');
        realUi.style.display = 'block';
        realUi.style.opacity = '1';
        
        document.getElementById('bg-backdrop').style.backgroundImage = 'none';
        document.getElementById('d-title').innerText = "Content Not Found";
        document.getElementById('desc').innerText = "This content could not be found or has been removed from the catalog. Please go back or try another title.";
        document.getElementById('poster-element').style.display = 'none';
        document.querySelector('.actions-grid').style.display = 'none';
        
        const hiddenElements = document.querySelectorAll('.d-title, .meta-row, .badges-row, .synopsis-text, .section-header-title');
        hiddenElements.forEach(el => el.style.opacity = '1');
    }

    window.shareMovie = function() {
        setTimeout(async () => {
            if (navigator.share) {
                try { await navigator.share({ title: movieData?.title || 'SanppyRoll', text: `Watch ${movieData?.title} on SanppyRoll!`, url: window.location.href }); }
                catch(e) {}
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copied!', 'success');
            }
        }, 150);
    };

    function getYoutubeId(url) {
        if (!url) return null;
        let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?]+)/);
        return match ? match[1] : null;
    }

    function formatTime(seconds) {
        if(isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    /* ── COLLAPSIBLE SYNOPSIS MODULE ── */
    window.toggleSynopsis = function() {
        const descEl = document.getElementById('desc');
        const toggleBtn = document.getElementById('btn-synopsis-toggle');
        if (descEl.classList.contains('expanded')) {
            descEl.classList.remove('expanded');
            toggleBtn.innerText = 'More';
        } else {
            descEl.classList.add('expanded');
            toggleBtn.innerText = 'Less';
        }
    };

    function checkSynopsisOverflow() {
        const descEl = document.getElementById('desc');
        const toggleBtn = document.getElementById('btn-synopsis-toggle');
        if (descEl.scrollHeight > descEl.clientHeight) {
            toggleBtn.style.display = 'block';
            toggleBtn.style.opacity = '1';
        } else {
            toggleBtn.style.display = 'none';
        }
    }

    function renderPage() {
        const titleStr = movieData.title || "Untitled Anime";
        const posterImg = movieData.poster || "logo.png";
        const backdropImg = movieData.backdrop || posterImg;

        document.getElementById('main-poster').src = posterImg;
        document.getElementById('bg-backdrop').style.backgroundImage = `url(${backdropImg})`;
        document.getElementById('d-title').innerText = titleStr;
        document.getElementById('desc').innerText = movieData.description;

        // Synopsis clamp layout check
        setTimeout(checkSynopsisOverflow, 100);

        let badgesHtml = '';
        const isSeries = (mediaType === 'series' || mediaType === 'tv' || (movieData.seasons && movieData.seasons.length > 0));
        document.getElementById('meta-type-lbl').innerText = isSeries ? 'Series' : 'Movie';

        const releaseYear = movieData.year || (movieData.release_date || movieData.first_air_date || "").substring(0, 4);
        if (releaseYear) {
            badgesHtml += `<span class="badge">${releaseYear}</span>`;
        }

        let genresArray = [];
        if (movieData.genres && Array.isArray(movieData.genres)) {
            genresArray = movieData.genres;
        } else if (typeof movieData.genres === 'string' && movieData.genres.trim() !== "") {
            genresArray = movieData.genres.split(',').map(g => ({ name: g.trim() }));
        }

        genresArray.slice(0, 3).forEach(g => {
            badgesHtml += `<span class="badge">${g.name}</span>`;
        });

        document.getElementById('badges-row').innerHTML = badgesHtml;

        let rawRate = movieData.rating || movieData.vote_average;
        if (rawRate) {
            const n = parseFloat(rawRate);
            if (!isNaN(n)) {
                document.getElementById('d-rate').innerText = n.toFixed(1);
            }
        }

        // Render Premium Cast List Section with Dynamic Profile Images
        const castContainer = document.getElementById('cast-scroll-container');
        const castSection = document.getElementById('cast-section');

        if (movieData.isCustom) {
            if (movieData.cast && typeof movieData.cast === 'string' && movieData.cast.trim() !== "") {
                const customCast = movieData.cast.split(',').map(name => name.trim()).filter(Boolean);
                castSection.style.display = 'block';
                castContainer.innerHTML = customCast.map(name => {
                    const initial = name.charAt(0).toUpperCase();
                    return `
                        <div class="cast-card">
                            <div class="cast-img-initial">${initial}</div>
                            <span class="cast-name">${name}</span>
                            <span class="cast-role">Cast</span>
                        </div>
                    `;
                }).join('');
            } else {
                castSection.style.display = 'none';
            }
        } else {
            const credits = movieData.credits || { cast: [], crew: [] };
            const safeCast = Array.isArray(credits?.cast) ? credits.cast : [];
            const displayCast = safeCast.slice(0, 12);

            if (displayCast.length > 0) {
                castSection.style.display = 'block';
                castContainer.innerHTML = displayCast.map(member => {
                    const imgUrl = member.profile_path ? `https://image.tmdb.org/t/p/w185${member.profile_path}` : 'logo.png';
                    const charName = member.character || 'Cast';
                    const name = member.name || 'Actor';
                    return `
                        <div class="cast-card">
                            <img class="cast-img" src="${imgUrl}" alt="${name}" loading="lazy">
                            <span class="cast-name">${name}</span>
                            <span class="cast-role">${charName}</span>
                        </div>
                    `;
                }).join('');
            } else {
                castSection.style.display = 'none';
            }
        }

        // Dynamically resolve creators, writers, animators, and studios
        let creatorsOrDirectors = "";
        let writerNames = "";
        let animatorNames = "";
        let studios = "";

        if (movieData.isCustom) {
            creatorsOrDirectors = "N/A";
            writerNames = "N/A";
            animatorNames = "N/A";
            studios = "N/A";
        } else {
            const credits = movieData.credits || { cast: [], crew: [] };
            const safeCrew = Array.isArray(credits?.crew) ? credits.crew : [];
            const tmdbType = mediaType === 'series' || mediaType === 'tv' ? 'tv' : 'movie';
            
            if (tmdbType === 'movie') {
                creatorsOrDirectors = safeCrew.filter(c => c?.job === 'Director').map(d => d?.name).filter(Boolean).join(', ');
            } else {
                creatorsOrDirectors = Array.isArray(movieData?.created_by) ? movieData.created_by.map(c => c?.name).filter(Boolean).join(', ') : "";
            }

            const writers = safeCrew.filter(c => c?.job === 'Writer' || c?.job === 'Screenplay' || c?.job === 'Series Composition');
            writerNames = writers.slice(0, 3).map(w => w?.name).filter(Boolean).join(', ');

            const animators = safeCrew.filter(c => c?.job === 'Animator' || c?.job === 'Character Design' || c?.job === 'Animation Director' || c?.job === 'Key Animator' || c?.department === 'Visual Effects');
            animatorNames = [...new Set(animators.map(a => a?.name).filter(Boolean))].slice(0, 5).join(', ');

            studios = Array.isArray(movieData?.production_companies) ? movieData.production_companies.map(s => s?.name).filter(Boolean).join(', ') : "";
        }

        // Specs List Layout
        let specsHtml = '';
        const addTile = (lbl, val) => {
            if(val && val !== "N/A" && val.trim() !== "") {
                specsHtml += `
                    <div class="spec-item">
                        <span class="spec-key">${lbl}</span>
                        <span class="spec-value">${val}</span>
                    </div>
                `;
            }
        };

        addTile('Directors / Creators', creatorsOrDirectors);
        addTile('Series Writers', writerNames);
        addTile('Animators & Crew', animatorNames);
        addTile('Studio / Networks', studios);
        addTile('Rating', movieData.rating || (movieData.vote_average ? `${movieData.vote_average.toFixed(1)} / 10` : '8.5 / 10'));
        addTile('Original Language', (movieData.original_language || 'ja').toUpperCase());

        document.getElementById('dynamic-info-grid').innerHTML = specsHtml;

        // Auto-extract Trailer Link
        if(!movieData.isCustom) {
            const youtubeTrailer = (movieData.videos?.results || []).find(v => v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser'));
            if (youtubeTrailer) {
                movieData.trailer_url = `https://www.youtube.com/watch?v=${youtubeTrailer.key}`;
            }
        }
        
        if (!movieData.trailer_url) {
            document.getElementById('btn-play-trailer').style.display = 'none';
        }

        if (isSeries) {
            document.getElementById('series-selector').style.display = 'block';
            if(movieData.seasons) { 
                renderSeasonTabs(); 
                const initialSeasonIdx = sIdx !== null ? sIdx : 0;
                window.changeSeason(initialSeasonIdx);
            }
        } else {
            document.getElementById('btn-play-movie').style.display = 'flex';
        }

        if (movieData.screenshots && movieData.screenshots.length > 0) {
            document.getElementById('screenshots-section').style.display = 'block';
            document.getElementById('ss-grid').innerHTML = movieData.screenshots.map(url => `<div class="ss-card"><img src="${url}" loading="lazy" onload="this.style.opacity=1"></div>`).join('');
        }

        triggerEntranceTransitions();
    }

    // ── GORGEOUS SLOWED DOWN ENTRANCE TRANSITIONS ──
    function triggerEntranceTransitions() {
        const skeletonUi = document.getElementById('skeleton-ui');
        const realUi = document.getElementById('real-ui');
        
        realUi.style.display = 'block';
        skeletonUi.style.display = 'none';

        const hiddenSelectors = [
            '.poster-container', '.d-title', '.meta-row', '.badges-row', '.synopsis-text',
            '.btn-crunchy-play', '.btn-crunchy-secondary', '.btn-crunchy-icon', '#series-selector', '.section-header-title',
            '.spec-item', '.screenshots-container', '#cast-section'
        ];

        if (typeof anime !== 'undefined') {
            anime.timeline({
                easing: 'easeOutQuart',
                duration: 750
            })
            .add({
                targets: '#real-ui',
                opacity: [0, 1],
                duration: 400
            })
            .add({
                targets: ['.poster-container', '.d-title', '.meta-row', '.badges-row', '.synopsis-text'],
                translateY: [20, 0],
                opacity: [0, 1],
                delay: anime.stagger(80)
            }, '-=250')
            .add({
                targets: ['.btn-crunchy-play', '.btn-crunchy-secondary', '.btn-crunchy-icon'],
                scale: [0.93, 1],
                opacity: [0, 1],
                delay: anime.stagger(60)
            }, '-=400')
            .add({
                targets: ['#series-selector', '.section-header-title', '.spec-item', '#cast-section', '.screenshots-container'],
                translateY: [15, 0],
                opacity: [0, 1],
                delay: anime.stagger(70)
            }, '-=350');
        } else {
            realUi.style.opacity = '1';
            hiddenSelectors.forEach(sel => {
                document.querySelectorAll(sel).forEach(el => {
                    el.style.opacity = '1';
                });
            });
        }
    }

    // ── CRASH-PROOF SEASONS & EPISODES FETCHER ──
    window.changeSeason = async function(index) {
        currentSeasonIndex = parseInt(index);
        if (!movieData?.seasons || !Array.isArray(movieData.seasons)) return;
        const targetSeason = movieData.seasons[index];
        if(!targetSeason) return;

        // Render the elegant season selector dropdown options
        const selectDropdown = document.getElementById('season-dropdown');
        if (selectDropdown) selectDropdown.value = index;

        const epListDiv = document.getElementById('episode-list');

        if(movieData.isCustom) {
            renderEpisodeList(targetSeason.episodes || []);
        } else {
            epListDiv.innerHTML = `<div class="skeleton" style="width: 100%; height: 80px; border-radius: 4px; margin-bottom: 10px;"></div>`;
            try {
                const tmdbKeySnap = await get(child(dbRef, 'settings/tmdb_api_key'));
                const apiKey = tmdbKeySnap.exists() ? tmdbKeySnap.val() : null;
                if (apiKey) {
                    const seasonNumber = targetSeason.season_number ?? (index + 1);
                    const res = await fetch(`https://api.themoviedb.org/3/tv/${movieId}/season/${seasonNumber}?api_key=${apiKey}&language=en-US`);
                    const sData = await res.json();
                    renderEpisodeList(sData.episodes || []);
                }
            } catch(e) {
                console.error(e);
                epListDiv.innerHTML = `<div style="color: var(--text-secondary); font-size:12px; text-align:center; padding: 20px;">Failed to load episodes. Check network connection.</div>`;
            }
        }
    };

    function renderSeasonTabs() {
        if(!movieData?.seasons || !Array.isArray(movieData.seasons)) return;
        const selectDropdown = document.getElementById('season-dropdown');
        if (!selectDropdown) return;

        let validSeasons = [];
        if (movieData.isCustom) {
            validSeasons = movieData.seasons;
            selectDropdown.innerHTML = validSeasons.map((s, i) =>
                `<option value="${i}">${s.season_title || s.name || 'Season ' + (i+1)}</option>`
            ).join('');
        } else {
            validSeasons = movieData.seasons.filter(s => s?.season_number > 0);
            selectDropdown.innerHTML = validSeasons.map((s, i) => {
                const globalIndex = movieData.seasons.indexOf(s);
                return `<option value="${globalIndex}">${s?.name || 'Season ' + s?.season_number}</option>`;
            }).join('');
        }
    }

    function renderEpisodeList(episodes) {
        const epListDiv = document.getElementById('episode-list');
        if (!episodes || !Array.isArray(episodes) || episodes.length === 0) {
            epListDiv.innerHTML = `<div style="color: var(--text-secondary); font-size:12px; text-align:center; padding:20px;">No episodes found.</div>`;
            return;
        }

        epListDiv.innerHTML = episodes.map((ep, i) => {
            const fallback = movieData.backdrop || 'logo.png';
            
            let epImg = fallback;
            if(ep?.still_path) {
                epImg = `https://image.tmdb.org/t/p/w300${ep.still_path}`;
            } else if (ep?.ep_thumb) {
                epImg = ep.ep_thumb;
            }

            const epName = ep?.name || ep?.ep_title || 'Episode ' + (i+1);
            const epDesc = (ep?.overview || ep?.ep_desc) ? ep.overview || ep.ep_desc : 'No synopsis is registered for this episode.';
            
            return `
            <div class="ep-card" onclick="window.startEpisode(${i})">
                <div class="ep-thumb-wrapper">
                    <img src="${epImg}" loading="lazy">
                    <div class="ep-play-overlay">
                        <i class="fa-solid fa-play"></i>
                    </div>
                </div>
                <div class="ep-meta-wrapper">
                    <div class="ep-num-title">S${currentSeasonIndex + 1} E${i + 1} - ${epName}</div>
                    <p class="ep-plot">${epDesc}</p>
                </div>
            </div>`;
        }).join('');
    }

    function checkAccess(level) {
        if (!level || level === 'free') return true;
        if (level === 'any_sub' && userSubPlan === 'free') return false;
        if (level === 'elite' && (userSubPlan === 'free' || userSubPlan === 'starter')) return false;
        if (level === 'supreme' && userSubPlan !== 'supreme') return false;
        return true;
    }

    /* ── STREAMING LINKS VALIDATION BEFORE REDIRECTION ── */
    window.startPlay = async function() {
        if (!currentUser) {
            window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
            return;
        }
        
        showLoader(true);
        try {
            const movieSnap = await get(child(dbRef, `movies/${movieId}`));
            if (movieSnap.exists()) {
                const firebaseMovie = movieSnap.val() || {};
                if (!checkAccess(firebaseMovie.access_level)) {
                    window.location.href = 'subscription.html';
                    showLoader(false);
                    return;
                }
                if (!firebaseMovie.video_links || !Array.isArray(firebaseMovie.video_links) || firebaseMovie.video_links.length === 0) {
                    window.showAlertModal(
                        "Video Link Unreleased", 
                        "Sorry! The streaming link for this movie has not been registered in our database yet."
                    );
                    showLoader(false);
                    return;
                }
                window.location.href = `player.html?id=${movieId}`;
            } else {
                window.showAlertModal(
                    "Content Missing", 
                    "We couldn't retrieve the stream specifications for this ID."
                );
            }
        } catch(e) {
            console.error(e);
            showToast("Network Error!");
        }
        showLoader(false);
    };

    window.startEpisode = async function(epIndex) {
        if (!currentUser) {
            window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
            return;
        }

        showLoader(true);
        try {
            const movieSnap = await get(child(dbRef, `movies/${movieId}`));
            if (movieSnap.exists()) {
                const firebaseMovie = movieSnap.val() || {};
                if (!checkAccess(firebaseMovie.access_level)) {
                    window.location.href = 'subscription.html';
                    showLoader(false);
                    return;
                }
                
                const fbSeasons = firebaseMovie.seasons;
                const fbSeason = Array.isArray(fbSeasons) ? fbSeasons[currentSeasonIndex] : null;
                const fbEpisodes = fbSeason?.episodes;
                const fbEpisode = Array.isArray(fbEpisodes) ? fbEpisodes[epIndex] : null;
                
                if (!fbEpisode || !fbEpisode.video_links || !Array.isArray(fbEpisode.video_links) || fbEpisode.video_links.length === 0) {
                    window.showAlertModal(
                        "Episode Not Released", 
                        "Sorry! The streaming node for this specific episode is not registered in our database yet."
                    );
                    showLoader(false);
                    return;
                }
                window.location.href = `player.html?id=${movieId}&s=${currentSeasonIndex}&e=${epIndex}`;
            } else {
                window.showAlertModal(
                    "Database Reference Missing", 
                    "No metadata records found for this media node."
                );
            }
        } catch(e) {
            console.error(e);
            showToast("Network Error!");
        }
        showLoader(false);
    };

    // ── INLINE TRAILER CONTROLS SYSTEM ──
    window.toggleTrailer = function() {
        if(isTrailerOpen) {
            closeInlineTrailer();
            return;
        }

        const segment = document.getElementById('inline-trailer-player');
        const container = document.getElementById('inline-media-container');
        const triggerBtn = document.getElementById('btn-play-trailer');

        let trailerUrl = movieData?.trailer_url;
        if(!trailerUrl) { showToast("Trailer asset not found!"); return; }

        isTrailerOpen = true;
        triggerBtn.classList.add('active-trailer');
        triggerBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;margin-right:6px;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg> CLOSE TRAILER`;

        let ytId = getYoutubeId(trailerUrl);
        isModalMuted = false;

        segment.classList.add('active');

        let rawTitle = movieData?.title || "Media";
        let displayTrailerTitle = rawTitle.length > 25 ? rawTitle.substring(0, 22) + "..." : rawTitle;

        if (ytId) {
            container.innerHTML = `
                <div class="player-top-bar">
                    <span class="trailer-lbl">${displayTrailerTitle} / Trailer</span>
                </div>
                <iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&modestbranding=1&rel=0&controls=1" allow="autoplay; encrypted-media"></iframe>
            `;
            setTimeout(() => { segment.classList.add('show-controls'); }, 100);
        } else {
            container.innerHTML = `
                <div class="player-top-bar">
                    <span class="trailer-lbl">${displayTrailerTitle} / Trailer</span>
                </div>
                <div class="player-tap-layer" onclick="triggerControlsVisibility()"></div>
                <video id="inline-html5-video" src="${trailerUrl}" autoplay playsinline></video>
                <div class="html5-controls">
                    <button class="play-pause-btn" id="play-pause-btn" onclick="togglePlayPause()"></button>
                    <div class="progress-container" id="progress-container">
                        <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
                    </div>
                    <div class="time-display" id="time-display">0:00 / 0:00</div>
                    <button class="inline-mute-btn" id="inline-mute-btn" onclick="toggleMuteHtml5()"></button>
                </div>
            `;
            initHtml5Controls();
        }
    };

    function initHtml5Controls() {
        customVideoElement = document.getElementById('inline-html5-video');
        const segment = document.getElementById('inline-trailer-player');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const timeDisplay = document.getElementById('time-display');

        isPlaying = true;
        updatePlayIcon();
        updateMuteIconUI();

        segment.classList.add('show-controls');
        resetControlsTimer();

        customVideoElement.addEventListener('timeupdate', () => {
            if(!isDraggingTimeline && customVideoElement) {
                const percent = (customVideoElement.currentTime / customVideoElement.duration) * 100;
                progressBar.style.width = `${percent}%`;
                timeDisplay.innerText = `${formatTime(customVideoElement.currentTime)} / ${formatTime(customVideoElement.duration)}`;
            }
        });

        customVideoElement.addEventListener('ended', () => { isPlaying = false; updatePlayIcon(); segment.classList.add('show-controls'); });

        const updateProgress = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            let pos = (e.clientX - rect.left) / rect.width;
            pos = Math.max(0, Math.min(1, pos));
            progressBar.style.width = `${pos * 100}%`;
            customVideoElement.currentTime = pos * customVideoElement.duration;
        };

        progressContainer.addEventListener('pointerdown', (e) => {
            isDraggingTimeline = true;
            clearTimeout(controlsTimer);
            progressContainer.setPointerCapture(e.pointerId);
            updateProgress(e);
        });

        progressContainer.addEventListener('pointermove', (e) => {
            if(isDraggingTimeline) updateProgress(e);
        });

        progressContainer.addEventListener('pointerup', (e) => {
            isDraggingTimeline = false;
            progressContainer.releasePointerCapture(e.pointerId);
            resetControlsTimer();
        });
    }

    window.triggerControlsVisibility = function() {
        const segment = document.getElementById('inline-trailer-player');
        if(segment.classList.contains('show-controls')) {
            segment.classList.remove('show-controls');
            clearTimeout(controlsTimer);
        } else {
            segment.classList.add('show-controls');
            resetControlsTimer();
        }
    };

    function resetControlsTimer() {
        clearTimeout(controlsTimer);
        if(!isDraggingTimeline && isPlaying) {
            controlsTimer = setTimeout(() => {
                const segment = document.getElementById('inline-trailer-player');
                if(segment) segment.classList.remove('show-controls');
            }, 3000);
        }
    }

    window.togglePlayPause = function() {
        if(!customVideoElement) return;
        if(customVideoElement.paused) {
            customVideoElement.play();
            isPlaying = true;
            resetControlsTimer();
        } else {
            customVideoElement.pause();
            isPlaying = false;
            clearTimeout(controlsTimer);
        }
        updatePlayIcon();
    };

    function updatePlayIcon() {
        const btn = document.getElementById('play-pause-btn');
        if(!btn) return;
        btn.innerHTML = isPlaying
            ? '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>'
            : '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
    }

    window.toggleMuteHtml5 = function() {
        if(!customVideoElement) return;
        isModalMuted = !isModalMuted;
        customVideoElement.muted = isModalMuted;
        updateMuteIconUI();
        resetControlsTimer();
    };

    function updateMuteIconUI() {
        const btn = document.getElementById('inline-mute-btn');
        if(!btn) return;
        btn.innerHTML = isModalMuted
            ? '<svg class="svg-icon" viewBox="0 0 24 24" style="width:15px; height:15px; fill:#fff; stroke:#fff;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>'
            : '<svg class="svg-icon" viewBox="0 0 24 24" style="width:15px; height:15px; fill:#fff; stroke:#fff;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>';
    }

    window.closeInlineTrailer = function() {
        const segment = document.getElementById('inline-trailer-player');
        const container = document.getElementById('inline-media-container');
        const triggerBtn = document.getElementById('btn-play-trailer');

        isTrailerOpen = false;
        clearTimeout(controlsTimer);

        triggerBtn.classList.remove('active-trailer');
        triggerBtn.innerHTML = `<i class="fa-solid fa-film"></i> TRAILER`;

        segment.classList.remove('active', 'show-controls');
        if(customVideoElement) customVideoElement.pause();

        setTimeout(() => {
            container.innerHTML = '';
            customVideoElement = null;
        }, 400);
    };
</script>
