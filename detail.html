<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Loading... - SanppyRoll</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Anime.js CDN dependency required for motion transitions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <style>
    :root {
        --accent: #f47521;
        --bg-main: #000000;
        --bg-card: #0d0d11;
        --border-tint: rgba(255, 255, 255, 0.08);
        --text-secondary: #a0a0a5;
    }
    *, *::before, *::after {
        margin: 0; padding: 0; box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        user-select: none; -webkit-user-select: none;
    }
    
    body, input, button, select, textarea, div, p, span, h1, h2, h3, h4, h5, h6, a {
        font-family: 'SF Pro Display', -apple-system, sans-serif;
    }

    body { background: var(--bg-main); color: #fff; min-height: 100vh; overflow-x: hidden; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    img { pointer-events: none; -webkit-user-drag: none; display: block; }

    .svg-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── SHIMMER ANIMATION ── */
    .skeleton {
        background: #14151a;
        background-image: linear-gradient(90deg, #14151a 0px, #1c1d24 40px, #14151a 80px);
        background-size: 600px; 
        animation: shimmer 1.5s infinite linear; 
        border-radius: 4px; 
        pointer-events: none;
    }
    @keyframes shimmer { 0% { background-position: -300px 0; } 100% { background-position: 800px 0; } }

    /* ── NAVBAR (Fade Blur Header Intact) ── */
    .navbar {
        position: fixed; top: 0; left: 0; width: 100%; height: 90px; z-index: 2000;
        display: flex; justify-content: space-between; align-items: flex-start;
        padding: 14px 5%;
        background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 55%, transparent 100%);
        backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
        -webkit-mask-image: linear-gradient(to bottom, black 45%, transparent 100%);
        mask-image: linear-gradient(to bottom, black 45%, transparent 100%);
    }
    .back-btn-new {
        background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border-tint); color: #fff;
        width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
        transition: background 0.2s, transform 0.2s; backdrop-filter: blur(5px); z-index: 10;
    }
    .back-btn-new:active { transform: scale(0.88); background: rgba(255, 255, 255, 0.15); }
    .nav-actions { display: flex; align-items: center; gap: 10px; pointer-events: auto; }

    .profile-btn { 
        position: relative;
        width: 36px;   
        height: 36px; 
        border-radius: 50%; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        background: #1a1a1a;
        border: 2.5px solid transparent;  
        padding: 2px;  
        cursor: pointer;
        box-sizing: border-box;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
    }
    .profile-btn:active { transform: scale(0.9); }
    .profile-btn.premium-user { border-color: var(--accent) !important; }
    .profile-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }

/* ===== ULTRA-SLEEK MINIMALIST ATTRIBUTION ===== */
.tmdb-attribution-footer {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5px; /* Text aur logo ke beech ka minimal space */
    width: 100%;
    margin-top: 35px; /* Niche se thoda aur upar space diya taaki saaf dikhe */
    padding: 10px 0 20px 0;
    opacity: 0.4; /* Ekdum subtle background me rahega */
    transition: opacity 0.3s ease;
    text-decoration: none;
}

.tmdb-attribution-footer:hover {
    opacity: 0.8; /* Hover karne par premium tarike se visible hoga */
}

.tmdb-powered-text {
    font-size: 9px; /* Bilkul micro text size */
    font-weight: 300; /* Ultra-light font weight (no bold!) */
    color: #8e8e93; /* Apple secondary grey shade */
    letter-spacing: 0.5px;
    text-transform: lowercase;
}

.tmdb-custom-logo {
    width: 16px; /* Logo ko ekdum chhota aur minimal kar diya */
    height: 16px;
    object-fit: contain;
    border-radius: 3px;
    filter: grayscale(20%); /* Halka sa blend hone ke liye */
}

    /* ── IMMERSIVE BANNER & HERO ── */
    .crunchy-hero-banner {
        position: relative;
        width: 100%;
        min-height: 62vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        background-size: cover;
        background-position: center top;
        padding: 80px 5% 24px;
        box-sizing: border-box;
    }
    .crunchy-hero-banner::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, var(--bg-main) 0%, rgba(0,0,0,0.85) 45%, rgba(0,0,0,0.4) 75%, transparent 100%);
        z-index: 1;
        pointer-events: none;
    }

    .crunchy-hero-meta {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 600px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .crunchy-hero-title {
        font-size: 26px;
        font-weight: 800;
        line-height: 1.2;
        color: #fff;
        text-shadow: 0 4px 12px rgba(0,0,0,0.8);
        margin-bottom: 10px;
        letter-spacing: -0.5px;
        opacity: 0;
    }

    .crunchy-badges-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 10px;
        opacity: 0;
    }
    .crunchy-badge-age {
        background: rgba(255, 255, 255, 0.15);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        display: none;
    }
    .crunchy-bullet {
        color: var(--text-secondary);
        font-size: 8px;
        margin: 0 2px;
    }

    .crunchy-ratings-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-bottom: 20px;
        opacity: 0;
    }
    .crunchy-stars {
        display: flex;
        gap: 2px;
        color: #f5c518;
    }
    .crunchy-stars svg {
        width: 12px;
        height: 12px;
        fill: currentColor;
    }
    .crunchy-stars svg.empty-star {
        color: rgba(255, 255, 255, 0.2);
    }
    .rating-val-lbl {
        font-size: 12px;
        font-weight: 800;
        color: var(--text-secondary);
    }

    /* ── ACTION INTERFACES ── */
    .crunchy-primary-actions {
        display: flex;
        gap: 8px;
        width: 100%;
        max-width: 480px;
        margin-bottom: 16px;
        opacity: 0;
    }
    .btn-crunchy-orange-cta {
        flex: 1;
        background: var(--accent);
        border: none;
        border-radius: 4px;
        height: 42px;
        color: #fff;
        font-size: 12px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        transition: background 0.2s, transform 0.2s;
        letter-spacing: 0.5px;
    }
    .btn-crunchy-orange-cta:active { transform: scale(0.97); background: #dd5a02; }
    
    .btn-crunchy-ribbon {
        width: 42px;
        height: 42px;
        background: transparent;
        border: 2px solid var(--accent);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent);
        cursor: pointer;
        transition: background 0.2s, transform 0.2s;
    }
    .btn-crunchy-ribbon:active { transform: scale(0.93); background: rgba(244, 117, 33, 0.08); }
    .btn-crunchy-ribbon.active { background: var(--accent); color: #fff; }
    .btn-crunchy-ribbon svg { width: 16px; height: 16px; fill: currentColor; }

    .crunchy-secondary-actions {
        display: flex;
        justify-content: center;
        gap: 40px;
        width: 100%;
        max-width: 400px;
        opacity: 0;
    }
    .crunchy-sub-action {
        background: none;
        border: none;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font-size: 9.5px;
        font-weight: 800;
        cursor: pointer;
        transition: transform 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .crunchy-sub-action:active { transform: scale(0.92); }
    .crunchy-sub-action svg { width: 18px; height: 18px; stroke-width: 2.2; color: #fff; }

    /* ── COLLAPSIBLE SYNOPSIS MODULE ── */
    .synopsis-container { padding: 15px 5% 5px; position: relative; z-index: 10; }
    .synopsis-text { font-size: 13px; color: #b0b0b6; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; opacity: 1; transition: all 0.3s; }
    .synopsis-text.expanded { display: block; -webkit-line-clamp: unset; }
    .btn-synopsis-toggle { background: none; border: none; color: var(--accent); font-size: 11.5px; font-weight: 800; cursor: pointer; margin-top: 6px; display: none; opacity: 0; }

    /* ── INLINE TRAILER CONTROLLER ── */
    .inline-trailer-section {
        width: 90%; max-height: 0; overflow: hidden; background: #000;
        margin: 0 auto; border-radius: 8px; border: 0px solid transparent;
        transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-width 0.1s, margin 0.4s;
        position: relative; display: flex; flex-direction: column; z-index: 15;
    }
    .inline-trailer-section.active {
        max-height: 52vw;
        margin: 5px auto 15px;
        border: 1px solid var(--accent);
    }
    .player-wrapper { position: relative; width: 100%; height: 100%; aspect-ratio: 16/9; }
    .player-wrapper video, .player-wrapper iframe { width: 100%; height: 100%; border: none; display: block; object-fit: cover; }

    /* ── DETAILS CONTAINER ── */
    .details-container { padding: 10px 5% 40px; position: relative; z-index: 10; display: flex; flex-direction: column; }
    .section-header-title { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Custom Season Select Dropdown Bar */
    .season-selector-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin-bottom: 18px;
    }
    .custom-season-select-wrapper {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        color: #fff;
    }
    .custom-season-select-wrapper span {
        font-size: 16px;
        font-weight: 800;
    }
    .custom-season-select-wrapper i {
        font-size: 12px;
        color: var(--accent);
    }
    .season-tool-icons {
        display: flex;
        align-items: center;
        gap: 16px;
        color: #fff;
        font-size: 14px;
    }
    .season-tool-icons i { cursor: pointer; }

    /* ── POPUPS & MODALS STYLING (FIXED AND STYLED CORRECTLY) ── */
    .modal-overlay {
        position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 5000;
        display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none;
        transition: opacity 0.3s ease; padding: 20px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-box {
        background: #101115; border: 1px solid var(--border-tint); border-radius: 14px;
        padding: 24px; max-width: 360px; width: 100%; text-align: center;
        transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }
    .modal-overlay.active .modal-box { transform: scale(1); }
    .modal-icon { width: 50px; height: 50px; margin: 0 auto 16px; color: var(--accent); display: flex; align-items: center; justify-content: center; }
    .modal-icon svg { width: 100%; height: 100%; }
    .modal-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 8px; }
    .modal-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 20px; }
    .modal-close-btn {
        background: var(--accent); border: none; color: #fff; padding: 12px 24px;
        font-size: 13px; font-weight: 800; border-radius: 6px; cursor: pointer; width: 100%;
        transition: background 0.2s;
    }
    .modal-close-btn:active { background: #dd5a02; }

    /* Premium Custom Season Popup Selector (Matches Missing Link Alert Modal Style) */
    .custom-sheet-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000;
        display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none;
        transition: opacity 0.3s ease; padding: 20px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .custom-sheet-overlay.active { opacity: 1; pointer-events: auto; }
    .custom-sheet-content {
        background: #101115; border: 1px solid var(--border-tint); border-radius: 14px;
        padding: 24px; max-width: 360px; width: 100%;
        transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .custom-sheet-overlay.active .custom-sheet-content { transform: scale(1); }
    .sheet-header {
        display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;
    }
    .sheet-header h3 { font-size: 16px; font-weight: 800; color: #fff; }
    .sheet-close-btn { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; transition: color 0.2s; }
    .sheet-close-btn:hover { color: #fff; }
    .sheet-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
    .sheet-item {
        padding: 12px 16px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px;
        color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
        display: flex; justify-content: space-between; align-items: center;
        transition: all 0.2s ease;
    }
    .sheet-item:active { transform: scale(0.97); }
    .sheet-item.active {
        border-color: var(--accent);
        background: rgba(244, 117, 33, 0.12);
        color: var(--accent);
    }
    .select-check-icon { display: none; }
    .sheet-item.active .select-check-icon { display: inline-block; }

    #episode-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 25px; }
    .ep-card-new {
        display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
        align-items: center; cursor: pointer; position: relative;
    }
    .ep-thumb-wrapper-new {
        width: 120px; aspect-ratio: 16/9; border-radius: 4px; overflow: hidden; position: relative; flex-shrink: 0; background: #000;
    }
    .ep-thumb-wrapper-new img { width: 100%; height: 100%; object-fit: cover; }
    .ep-duration-badge {
        position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8);
        color: #fff; font-size: 9px; font-weight: 800; padding: 1px 4px; border-radius: 3px;
    }
    .ep-play-overlay {
        position: absolute; inset: 0; background: rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 14px; opacity: 1;
    }
    .ep-info-new { display: flex; flex-direction: column; min-width: 0; flex: 1; padding-right: 18px; }
    .ep-series-title { font-size: 9px; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.5px; }
    .ep-title-new { font-size: 13px; font-weight: 800; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
    .ep-subtitle-new { font-size: 11px; color: var(--text-secondary); margin-top: 3px; font-weight: 600; }
    .ep-options-btn { position: absolute; right: 0; color: var(--text-secondary); font-size: 14px; cursor: pointer; padding: 4px; }

    /* ── PREMIUM CAST GRID UI (3-COLUMN FLAT SLATE) ── */
    .cast-section { margin-bottom: 25px; opacity: 0; }
    .cast-grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px 8px;
    }
    .cast-card-grid {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    .cast-circle-img-wrapper {
        width: 66px;
        height: 66px;
        border-radius: 50%;
        border: 2px solid var(--accent);
        overflow: hidden;
        margin-bottom: 8px;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }
    .cast-circle-img-wrapper.more-card {
        border-style: dashed;
        color: var(--accent);
        font-size: 20px;
        cursor: pointer;
    }
    .cast-circle-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .cast-img-initial {
        width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #f47521, #e00073); color: #fff; font-weight: 800; font-size: 16px;
    }
    .cast-name { font-size: 10px; font-weight: 700; color: #fff; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .cast-role { font-size: 8.5px; color: var(--text-secondary); line-height: 1.1; margin-top: 1px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── SCREENSHOTS VERTICAL LIST LAYOUT ── */
    .screenshots-container { margin-bottom: 25px; opacity: 0; }
    .ss-vertical-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
    }
    .ss-row {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
    }
    .ss-number {
        font-size: 11px;
        font-weight: 800;
        color: var(--accent);
        min-width: 28px;
        text-align: right;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .ss-card-vertical {
        flex: 1;
        aspect-ratio: 16/9;
        border-radius: 6px;
        overflow: hidden;
        background: #111;
        border: 1px solid var(--border-tint);
    }
    .ss-card-vertical img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.5s;
    }

    /* Desktop size control to prevent oversized screenshots on PC */
    @media (min-width: 768px) {
        .ss-vertical-container {
            max-width: 480px;
            margin: 0 auto;
        }
    }

/* ===== SANPPYROLL TELEGRAM BANNER ===== */

.tg-promo-banner{
    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:12px 14px;
    margin:18px 0;

    border-radius:16px;

    background:linear-gradient(135deg,#121212,#1b1b1b);

    border:1px solid rgba(255,255,255,.08);

    transition:.35s;

    animation:tgFloat 3.5s ease-in-out infinite;
}

.tg-banner-content{
    display:flex;
    align-items:center;
    gap:12px;
}

.tg-banner-icon{
    width:42px;
    height:42px;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:12px;

    background:linear-gradient(135deg,#f47521,#ff8f3a);

    color:#fff;
    font-size:18px;

    flex-shrink:0;
}

.tg-banner-text h4{
    font-size:13px;
    font-weight:800;
    margin:0;
}

.tg-banner-text p{
    font-size:10px;
    color:#9e9e9e;
    margin-top:3px;
    line-height:1.35;
}

.tg-banner-arrow{
    color:#f47521;
    font-size:13px;
    transition:.3s;
}

.tg-promo-banner:hover{
    transform:translateY(-2px);
    border-color:rgba(244,117,33,.45);
}

.tg-promo-banner:hover .tg-banner-arrow{
    transform:translateX(5px);
}

@keyframes tgFloat{
    0%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-4px);
    }
    100%{
        transform:translateY(0);
    }
}
    /* ── TOAST MESSAGES ── */
    .toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
        background: #101115; border: 1px solid var(--border-tint); padding: 12px 24px;
        border-radius: 8px; display: flex; align-items: center; gap: 10px; z-index: 6000;
        opacity: 0; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
        pointer-events: none; max-width: 90%; width: max-content;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: #2ecc71; }
    .toast.success #toast-msg { color: #2ecc71; }
    .toast.error { border-color: #e74c3c; }
    .toast.error #toast-msg { color: #e74c3c; }
    #toast-msg { font-size: 13px; font-weight: 800; }

    </style>
</head>
<body oncontextmenu="return false;">

<!-- ── ALERTS MODAL ── -->
<div class="modal-overlay" id="modal-container" onclick="closeAlertModal()">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDnmFVfVSCxXC9shWhz4dw06xtTNBA6vsU",
        authDomain: "sanppyroll.firebaseapp.com",
        databaseURL: "https://sanppyroll-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sanppyroll",
        storageBucket: "sanppyroll.firebasestorage.app",
        messagingSenderId: "642736474886",
        appId: "1:642736474886:web:f0e0e3c04101fddfe02c87"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');
    const mediaType = urlParams.get('type') || 'tv';
    let sIdx = urlParams.get('s') !== null ? parseInt(urlParams.get('s')) : null;
    let eIdx = urlParams.get('e') !== null ? parseInt(urlParams.get('e')) : null;

    let movieData = null;
    let currentSeasonIndex = 0;
    let currentUser = null;
    let userSubPlan = 'free';
    let isAddedToWatchlist = false;
    let castMembers = [];
    let isCastExpanded = false;

    // Trailer controls state
    let isModalMuted = false;
    let isPlaying = true;
    let customVideoElement = null;
    let controlsTimer = null;
    let isDraggingTimeline = false;
    let isTrailerOpen = false;

    if (mediaType === 'tv' || mediaType === 'series' || sIdx !== null) {
        const skSeriesBlock = document.getElementById('skeleton-series-block');
        if (skSeriesBlock) skSeriesBlock.style.display = 'block';
    }

    // Spinner overlay loader is now disabled, only Skeleton UI will perform loading.
    function showLoader(show) { 
        // Silent block - Skeleton UI perfectly handles the dynamic state.
    }

    window.showAlertModal = function(title, text) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('modal-container').classList.add('active');
    };

    window.closeAlertModal = function() {
        document.getElementById('modal-container').classList.remove('active');
    };

    function setProfileIcon(user) {
        const profileImg = document.getElementById('user-profile-icon');
        if (!profileImg) return;

        if (!user) {
            profileImg.innerHTML = `<svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;
            return;
        }

        let avatarUrl = user.photoURL || '';
        let uName = user.displayName || (user.email ? user.email.split('@')[0] : '?');

        try {
            const profileSnapPromise = get(child(dbRef, `users/${user.uid}/profile`));
            const subSnapPromise = get(child(dbRef, `users/${user.uid}/subscription`));

            Promise.all([profileSnapPromise, subSnapPromise]).then(([profileSnap, subSnap]) => {
                if (subSnap.exists() && subSnap.val().plan && subSnap.val().expiry > Date.now()) {
                    userSubPlan = subSnap.val().plan;
                    profileImg.classList.add('premium-user');
                } else {
                    userSubPlan = 'free';
                }

                if (profileSnap.exists()) {
                    const profile = profileSnap.val() || {};
                    if (profile.avatarUrl) avatarUrl = profile.avatarUrl;
                    if (profile.username) uName = profile.username;
                }

                if (avatarUrl) {
                    profileImg.innerHTML = `<img src="${avatarUrl}" alt="Profile">`;
                } else {
                    let initial = (uName || 'U').charAt(0).toUpperCase();
                    profileImg.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #f47521, #e00073);color:#fff;font-weight:900;font-size:14px;border-radius:50%;">${initial}</div>`;
                }
            }).catch(() => {
                let initial = (uName || 'U').charAt(0).toUpperCase();
                profileImg.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #f47521, #e00073);color:#fff;font-weight:900;font-size:14px;border-radius:50%;">${initial}</div>`;
            });
        } catch (e) {
            let initial = (uName || 'U').charAt(0).toUpperCase();
            profileImg.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #f47521, #e00073);color:#fff;font-weight:900;font-size:14px;border-radius:50%;">${initial}</div>`;
        }
    }

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        setProfileIcon(user);
        if (!movieData) fetchDetails();
    });

    window.showToast = function(msg, type = "error") {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toast-icon');
        toast.className = 'toast show';
        if (type === 'success') {
            toast.classList.add('success');
            toast.classList.remove('error');
            icon.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
        } else {
            toast.classList.add('error');
            toast.classList.remove('success');
            icon.innerHTML = '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>';
        }
        document.getElementById('toast-msg').innerText = msg;
        setTimeout(() => toast.classList.remove('show'), 3000);
    };

    // HYBRID FETCH: Firebase data serves as source of truth, TMDB purely enriches metadata
    async function fetchDetails() {
        if (!movieId) { window.location.replace('index.html'); return; }
        
        showLoader(true);
        try {
            const fbSnap = await get(child(dbRef, `movies/${movieId}`));
            if (!fbSnap.exists()) {
                showToast("Content not found inside database!");
                showNotFoundError();
                showLoader(false);
                return;
            }
            const fbData = fbSnap.val() || {};

            movieData = {
                title: fbData.title || "Untitled Anime",
                description: fbData.description || "No plot synopsis is available currently.",
                poster: fbData.poster || "logo.png",
                backdrop: fbData.backdrop || fbData.poster || "",
                year: fbData.year || "",
                rating: fbData.rating || "8.5",
                genres: fbData.genres || "",
                video_links: fbData.video_links || [],
                audio_links: fbData.audio_links || [],
                seasons: fbData.seasons || [],
                access_level: fbData.access_level || "free",
                screenshots: fbData.screenshots || [],
                cast: fbData.cast || "",
                trailer_url: fbData.trailer_url || fbData.trailer || "",
                isCustom: true
            };

            const tmdbKeySnap = await get(child(dbRef, 'settings/tmdb_api_key'));
            const apiKey = tmdbKeySnap.exists() ? tmdbKeySnap.val() : null;
            const isNumericId = !isNaN(movieId);

            if (isNumericId && apiKey) {
                const tmdbType = (fbData.type === 'series' || mediaType === 'series' || mediaType === 'tv') ? 'tv' : 'movie';
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/${tmdbType}/${movieId}?api_key=${apiKey}&append_to_response=credits,videos&language=en-US`);
                    if (res.ok) {
                        const tmdbData = await res.json();
                        movieData.credits = tmdbData.credits;
                        
                        if (!movieData.trailer_url && tmdbData.videos) {
                            const youtubeTrailer = (tmdbData.videos.results || []).find(v => v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser'));
                            if (youtubeTrailer) {
                                movieData.trailer_url = `https://www.youtube.com/watch?v=${youtubeTrailer.key}`;
                            }
                        }
                        movieData.isCustom = false;

                        fetchAgeRating(apiKey, tmdbType, movieId);
                    }
                } catch (tmdbErr) {
                    console.warn("TMDB fetch failed: ", tmdbErr);
                }
            }
            
            renderPage();
        } catch(err) {
            console.error("Fatal error loading details:", err);
            showToast("Failed to load content details.");
            showNotFoundError();
        }
        showLoader(false);
    }

    async function fetchAgeRating(apiKey, type, id) {
        try {
            const badge = document.getElementById('certification-badge');
            const bullet = document.getElementById('certification-bullet');
            
            if (type === 'tv') {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/content_ratings?api_key=${apiKey}`);
                if (res.ok) {
                    const data = await res.json();
                    const usRating = (data.results || []).find(r => r.iso_3166_1 === 'US');
                    if (usRating && usRating.rating) {
                        badge.innerText = usRating.rating;
                        badge.style.display = 'inline-block';
                        bullet.style.display = 'inline';
                    }
                }
            } else {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${id}/release_dates?api_key=${apiKey}`);
                if (res.ok) {
                    const data = await res.json();
                    const usResult = (data.results || []).find(r => r.iso_3166_1 === 'US');
                    if (usResult && usResult.release_dates && usResult.release_dates.length > 0) {
                        const certification = usResult.release_dates[0].certification;
                        if (certification) {
                            badge.innerText = certification;
                            badge.style.display = 'inline-block';
                            bullet.style.display = 'inline';
                        }
                    }
                }
            }
        } catch (e) {
            console.warn("Could not load certification: ", e);
        }
    }

    function showNotFoundError() {
        document.getElementById('skeleton-ui').style.display = 'none';
        const realUi = document.getElementById('real-ui');
        realUi.style.display = 'block';
        realUi.style.opacity = '1';
        
        document.getElementById('bg-backdrop').style.backgroundImage = 'none';
        document.getElementById('d-title').innerText = "Content Not Found";
        document.getElementById('desc').innerText = "This content could not be found or has been removed from the catalog. Please go back or try another title.";
        document.getElementById('bg-backdrop').querySelector('.crunchy-hero-meta').style.display = 'none';
        
        const hiddenElements = document.querySelectorAll('.d-title, .crunchy-badges-row, .crunchy-ratings-row, .synopsis-text, .section-header-title');
        hiddenElements.forEach(el => el.style.opacity = '1');
    }

    window.shareMovie = function() {
        setTimeout(async () => {
            if (navigator.share) {
                try { await navigator.share({ title: movieData?.title || 'SanppyRoll', text: `Watch ${movieData?.title} on SanppyRoll!`, url: window.location.href }); }
                catch(e) {}
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copied!', 'success');
            }
        }, 150);
    };

    function getYoutubeId(url) {
        if (!url) return null;
        let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?]+)/);
        return match ? match[1] : null;
    }

    function formatTime(seconds) {
        if(isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    /* ── COLLAPSIBLE SYNOPSIS MODULE ── */
    window.toggleSynopsis = function() {
        const descEl = document.getElementById('desc');
        const toggleBtn = document.getElementById('btn-synopsis-toggle');
        if (descEl.classList.contains('expanded')) {
            descEl.classList.remove('expanded');
            toggleBtn.innerText = 'More';
        } else {
            descEl.classList.add('expanded');
            toggleBtn.innerText = 'Less';
        }
    };

    function checkSynopsisOverflow() {
        const descEl = document.getElementById('desc');
        const toggleBtn = document.getElementById('btn-synopsis-toggle');
        if (descEl.scrollHeight > descEl.clientHeight) {
            toggleBtn.style.display = 'block';
            toggleBtn.style.opacity = '1';
        } else {
            toggleBtn.style.display = 'none';
        }
    }

    /* ── WATCHLIST TOGGLE ── */
    window.toggleMyWatchlist = function() {
        isAddedToWatchlist = !isAddedToWatchlist;
        const ribbonBtn = document.getElementById('btn-watchlist-cta');
        const ribbonSvg = document.getElementById('watchlist-svg-icon');
        
        if (isAddedToWatchlist) {
            ribbonBtn.classList.add('active');
            ribbonSvg.innerHTML = '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="currentColor"/>';
            showToast('Added to Watchlist', 'success');
        } else {
            ribbonBtn.classList.remove('active');
            ribbonSvg.innerHTML = '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';
            showToast('Removed from Watchlist', 'success');
        }
    };

    /* ── PRIMARY WATCH CTA CONTROLLER ── */
    window.triggerPrimaryCTA = function() {
        const isSeries = (mediaType === 'series' || mediaType === 'tv' || (movieData.seasons && movieData.seasons.length > 0));
        if (isSeries) {
            const resumeKey = `resume_${movieId}`;
            const resumeData = localStorage.getItem(resumeKey);
            if (resumeData) {
                try {
                    const parsed = JSON.parse(resumeData);
                    window.location.href = `player.html?id=${movieId}&s=${parsed.s}&e=${parsed.e}`;
                } catch(e) {
                    window.startEpisode(0);
                }
            } else {
                window.startEpisode(0);
            }
        } else {
            window.startPlay();
        }
    };

    function updatePlayButtonText() {
        const playBtn = document.getElementById('btn-primary-play-cta');
        const isSeries = (mediaType === 'series' || mediaType === 'tv' || (movieData.seasons && movieData.seasons.length > 0));
        
        if (isSeries) {
            const resumeKey = `resume_${movieId}`;
            const resumeData = localStorage.getItem(resumeKey);
            if (resumeData) {
                try {
                    const parsed = JSON.parse(resumeData);
                    playBtn.innerHTML = `<i class="fa-solid fa-play"></i> CONTINUE WATCHING S${parsed.s + 1}:E${parsed.e + 1}`;
                } catch(e) {
                    playBtn.innerHTML = `<i class="fa-solid fa-play"></i> START WATCHING E1`;
                }
            } else {
                playBtn.innerHTML = `<i class="fa-solid fa-play"></i> START WATCHING E1`;
            }
        } else {
            playBtn.innerHTML = `<i class="fa-solid fa-play"></i> START WATCHING`;
        }
    }

    function renderStars(ratingValue) {
        let starsVal = 4.5;
        const rawNum = parseFloat(ratingValue);
        if(!isNaN(rawNum)) {
            starsVal = rawNum > 5 ? rawNum / 2 : rawNum;
        }

        const starsContainer = document.getElementById('crunchy-stars-stars');
        if (!starsContainer) return;

        let starsHtml = '';
        for (let i = 1; i <= 5; i++) {
            if (i <= Math.floor(starsVal)) {
                starsHtml += `<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
            } else if (i - 0.5 <= starsVal) {
                starsHtml += `<svg viewBox="0 0 24 24" style="position:relative;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="url(#halfGrad)"></polygon><defs><linearGradient id="halfGrad"><stop offset="50%" stop-color="#f5c518"/><stop offset="50%" stop-color="rgba(255,255,255,0.2)"/></linearGradient></defs></svg>`;
            } else {
                starsHtml += `<svg class="empty-star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
            }
        }
        starsContainer.innerHTML = starsHtml;
        document.getElementById('d-rate-lbl').innerText = ` ${rawNum.toFixed(1)}`;
    }

    function getNumberLabel(index) {
        const num = index + 1;
        if (num === 1) return "1";
        if (num === 2) return "2nd";
        if (num === 3) return "3rd";
        return num + "th";
    }

    function renderPage() {
        const titleStr = movieData.title || "Untitled Anime";
        const posterImg = movieData.poster || "logo.png";
        const backdropImg = movieData.backdrop || posterImg;

        document.getElementById('bg-backdrop').style.backgroundImage = `url(${backdropImg})`;
        document.getElementById('d-title').innerText = titleStr;
        document.getElementById('desc').innerText = movieData.description;

        setTimeout(checkSynopsisOverflow, 100);

        const isSeries = (mediaType === 'series' || mediaType === 'tv' || (movieData.seasons && movieData.seasons.length > 0));

        let rawRate = movieData.rating || movieData.vote_average || "8.5";
        renderStars(rawRate);

        if (movieData.isCustom) {
            if (movieData.cast && typeof movieData.cast === 'string' && movieData.cast.trim() !== "") {
                castMembers = movieData.cast.split(',').map(name => name.trim()).filter(Boolean);
            } else {
                castMembers = [];
            }
        } else {
            const credits = movieData.credits || { cast: [], crew: [] };
            castMembers = Array.isArray(credits?.cast) ? credits.cast : [];
        }

        renderCastGrid();

        if (!movieData.trailer_url) {
            document.getElementById('btn-play-trailer').style.display = 'none';
        }

        if (isSeries) {
            document.getElementById('series-selector').style.display = 'block';
            updatePlayButtonText();
            if(movieData.seasons) { 
                renderSeasonTabs(); 
                const initialSeasonIdx = sIdx !== null ? sIdx : 0;
                window.changeSeason(initialSeasonIdx);
            }
        } else {
            updatePlayButtonText();
        }

        // Renders screenshots vertically (one below another) with customized number counters on side
        if (movieData.screenshots && movieData.screenshots.length > 0) {
            document.getElementById('screenshots-section').style.display = 'block';
            
            const ssHtml = movieData.screenshots.map((url, idx) => {
                const counterText = getNumberLabel(idx);
                return `
                <div class="ss-row">
                    <div class="ss-card-vertical">
                        <img src="${url}" loading="lazy" onload="this.style.opacity=1">
                    </div>
                </div>`;
            }).join('');

            document.getElementById('ss-grid').innerHTML = `<div class="ss-vertical-container">${ssHtml}</div>`;
        }

        triggerEntranceTransitions();
    }

    /* ── HIGH VISIBILITY CAST SLATE GRID (3-Columns) ── */
    function renderCastGrid() {
        const castContainer = document.getElementById('cast-scroll-container');
        const castSection = document.getElementById('cast-section');
        
        if (castMembers.length === 0) {
            castSection.style.display = 'none';
            return;
        }
        
        castSection.style.display = 'block';

        const limitCount = 5;
        const needsMoreCta = castMembers.length > 6;
        let renderedList = [];

        if (!isCastExpanded && needsMoreCta) {
            renderedList = castMembers.slice(0, limitCount);
        } else {
            renderedList = castMembers;
        }

        let html = renderedList.map(member => {
            if (movieData.isCustom) {
                const initial = member.charAt(0).toUpperCase();
                return `
                    <div class="cast-card-grid">
                        <div class="cast-circle-img-wrapper">
                            <div class="cast-img-initial">${initial}</div>
                        </div>
                        <span class="cast-name">${member}</span>
                        <span class="cast-role">Cast</span>
                    </div>
                `;
            } else {
                const imgUrl = member.profile_path ? `https://image  .tmdb.org/t/p/w185${member.profile_path}` : 'logo.png';
                const charName = member.character || 'Cast';
                const name = member.name || 'Actor';
                return `
                    <div class="cast-card-grid">
                        <div class="cast-circle-img-wrapper">
                            <img class="cast-circle-img" src="${imgUrl}" alt="${name}" loading="lazy">
                        </div>
                        <span class="cast-name">${name}</span>
                        <span class="cast-role">${charName}</span>
                    </div>
                `;
            }
        }).join('');

        if (needsMoreCta) {
            if (!isCastExpanded) {
                html += `
                    <div class="cast-card-grid" onclick="toggleCastExpansion(true)">
                        <div class="cast-circle-img-wrapper more-card">
                            <i class="fa-solid fa-plus"></i>
                        </div>
                        <span class="cast-name" style="color: var(--accent);">More</span>
                        <span class="cast-role">View All</span>
                    </div>
                `;
            } else {
                html += `
                    <div class="cast-card-grid" onclick="toggleCastExpansion(false)">
                        <div class="cast-circle-img-wrapper more-card">
                            <i class="fa-solid fa-minus"></i>
                        </div>
                        <span class="cast-name" style="color: var(--accent);">Less</span>
                        <span class="cast-role">Collapse</span>
                    </div>
                `;
            }
        }

        castContainer.innerHTML = html;
    }

    window.toggleCastExpansion = function(expandState) {
        isCastExpanded = expandState;
        renderCastGrid();
    };

    // ── ENTRANCE TRANSITIONS ──
    function triggerEntranceTransitions() {
        const skeletonUi = document.getElementById('skeleton-ui');
        const realUi = document.getElementById('real-ui');
        
        realUi.style.display = 'block';
        skeletonUi.style.display = 'none';

        const hiddenSelectors = [
            '.crunchy-hero-title', '.crunchy-badges-row', '.crunchy-ratings-row', '.crunchy-primary-actions', '.crunchy-secondary-actions',
            '.synopsis-text', '#series-selector', '.section-header-title', '.screenshots-container', '#cast-section'
        ];

        if (typeof anime !== 'undefined') {
            anime.timeline({
                easing: 'easeOutQuart',
                duration: 750
            })
            .add({
                targets: '#real-ui',
                opacity: [0, 1],
                duration: 400
            })
            .add({
                targets: ['.crunchy-hero-title', '.crunchy-badges-row', '.crunchy-ratings-row'],
                translateY: [20, 0],
                opacity: [0, 1],
                delay: anime.stagger(80)
            }, '-=250')
            .add({
                targets: ['.crunchy-primary-actions', '.crunchy-secondary-actions'],
                scale: [0.93, 1],
                opacity: [0, 1],
                delay: anime.stagger(60)
            }, '-=400')
            .add({
                targets: ['#series-selector', '.section-header-title', '#cast-section', '.screenshots-container'],
                translateY: [15, 0],
                opacity: [0, 1],
                delay: anime.stagger(70)
            }, '-=350');
        } else {
            realUi.style.opacity = '1';
            hiddenSelectors.forEach(sel => {
                document.querySelectorAll(sel).forEach(el => {
                    el.style.opacity = '1';
                });
            });
        }
    }

    // Custom non-native HTML Season slide-up menu overlay
    window.toggleCustomSeasonMenu = function(show) {
        const sheet = document.getElementById('custom-season-sheet');
        if (show) {
            sheet.classList.add('active');
        } else {
            sheet.classList.remove('active');
        }
    };

    window.selectCustomSeason = function(index) {
        window.changeSeason(index);
        window.toggleCustomSeasonMenu(false);
    };

    // ── SEASONS & EPISODES FETCHER ──
    window.changeSeason = async function(index) {
        currentSeasonIndex = parseInt(index);
        if (!movieData?.seasons || !Array.isArray(movieData.seasons)) return;
        const targetSeason = movieData.seasons[index];
        if(!targetSeason) return;

        const seasonTitle = targetSeason.season_title || targetSeason.name || 'Season ' + (index+1);
        document.getElementById('selected-season-name').innerText = seasonTitle;

        const options = document.querySelectorAll('.sheet-item');
        options.forEach((opt, idx) => {
            if(idx === index) opt.classList.add('active');
            else opt.classList.remove('active');
        });

        const epListDiv = document.getElementById('episode-list');

        if(movieData.isCustom) {
            renderEpisodeList(targetSeason.episodes || []);
        } else {
            epListDiv.innerHTML = `<div class="skeleton" style="width: 100%; height: 80px; border-radius: 4px; margin-bottom: 10px;"></div>`;
            try {
                const tmdbKeySnap = await get(child(dbRef, 'settings/tmdb_api_key'));
                const apiKey = tmdbKeySnap.exists() ? tmdbKeySnap.val() : null;
                if (apiKey) {
                    const seasonNumber = targetSeason.season_number ?? (index + 1);
                    const res = await fetch(`https://api.themoviedb.org/3/tv/${movieId}/season/${seasonNumber}?api_key=${apiKey}&language=en-US`);
                    const sData = await res.json();
                    renderEpisodeList(sData.episodes || []);
                }
            } catch(e) {
                console.error(e);
                epListDiv.innerHTML = `<div style="color: var(--text-secondary); font-size:12px; text-align:center; padding: 20px;">Failed to load episodes. Check network connection.</div>`;
            }
        }
    };

    function renderSeasonTabs() {
        if(!movieData?.seasons || !Array.isArray(movieData.seasons)) return;
        const sheetList = document.getElementById('custom-season-sheet-list');
        if (!sheetList) return;

        let validSeasons = [];
        if (movieData.isCustom) {
            validSeasons = movieData.seasons;
        } else {
            validSeasons = movieData.seasons.filter(s => s?.season_number > 0);
        }

        sheetList.innerHTML = validSeasons.map((s, i) => {
            const globalIndex = movieData.seasons.indexOf(s);
            const title = s.season_title || s.name || 'Season ' + (i+1);
            return `<div class="sheet-item" onclick="selectCustomSeason(${globalIndex})">
                        <span>${title}</span>
                        <i class="fa-solid fa-check select-check-icon"></i>
                    </div>`;
        }).join('');
    }

    function renderEpisodeList(episodes) {
        const epListDiv = document.getElementById('episode-list');
        if (!episodes || !Array.isArray(episodes) || episodes.length === 0) {
            epListDiv.innerHTML = `<div style="color: var(--text-secondary); font-size:12px; text-align:center; padding:20px;">No episodes found.</div>`;
            return;
        }

        const seriesUpper = (movieData.title || "ANIME").toUpperCase();

        epListDiv.innerHTML = episodes.map((ep, i) => {
            const fallback = movieData.backdrop || 'logo.png';
            
            let epImg = fallback;
            if(ep?.still_path) {
                epImg = `https://image.tmdb.org/t/p/w300${ep.still_path}`;
            } else if (ep?.ep_thumb) {
                epImg = ep.ep_thumb;
            }

            const epName = ep?.name || ep?.ep_title || 'Episode ' + (i+1);
            const runtimeStr = ep?.runtime ? `${ep.runtime}m` : "23m";
            
            return `
            <div class="ep-card-new" onclick="window.startEpisode(${i})">
                <div class="ep-thumb-wrapper-new">
                    <img src="${epImg}" loading="lazy">
                    <div class="ep-play-overlay">
                        <i class="fa-solid fa-play"></i>
                    </div>
                    <span class="ep-duration-badge">${runtimeStr}</span>
                </div>
                <div class="ep-info-new">
                    <span class="ep-series-title">${seriesUpper}</span>
                    <div class="ep-title-new">E${i + 1} - ${epName}</div>
                    <div class="ep-subtitle-new">Dub | Sub</div>
                </div>
                <div class="ep-options-btn">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </div>`;
        }).join('');
    }

    function checkAccess(level) {
        if (!level || level === 'free') return true;
        if (level === 'any_sub' && userSubPlan === 'free') return false;
        if (level === 'elite' && (userSubPlan === 'free' || userSubPlan === 'starter')) return false;
        if (level === 'supreme' && userSubPlan !== 'supreme') return false;
        return true;
    }

    /* ── STREAMING LINKS VALIDATION ── */
    window.startPlay = async function() {
        if (!currentUser) {
            window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
            return;
        }
        
        showLoader(true);
        try {
            const movieSnap = await get(child(dbRef, `movies/${movieId}`));
            if (movieSnap.exists()) {
                const firebaseMovie = movieSnap.val() || {};
                if (!checkAccess(firebaseMovie.access_level)) {
                    window.location.href = 'subscription.html';
                    showLoader(false);
                    return;
                }
                if (!firebaseMovie.video_links || !Array.isArray(firebaseMovie.video_links) || firebaseMovie.video_links.length === 0) {
                    window.showAlertModal(
                        "Video Link Unreleased", 
                        "Sorry! The streaming link for this movie has not been registered in our database yet."
                    );
                    showLoader(false);
                    return;
                }
                window.location.href = `player.html?id=${movieId}`;
            } else {
                window.showAlertModal(
                    "Content Missing", 
                    "We couldn't retrieve the stream specifications for this ID."
                );
            }
        } catch(e) {
            console.error(e);
            showToast("Network Error!");
        }
        showLoader(false);
    };

    window.startEpisode = async function(epIndex) {
        if (!currentUser) {
            window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
            return;
        }

        showLoader(true);
        try {
            const movieSnap = await get(child(dbRef, `movies/${movieId}`));
            if (movieSnap.exists()) {
                const firebaseMovie = movieSnap.val() || {};
                if (!checkAccess(firebaseMovie.access_level)) {
                    window.location.href = 'subscription.html';
                    showLoader(false);
                    return;
                }
                
                const fbSeasons = firebaseMovie.seasons;
                const fbSeason = Array.isArray(fbSeasons) ? fbSeasons[currentSeasonIndex] : null;
                const fbEpisodes = fbSeason?.episodes;
                const fbEpisode = Array.isArray(fbEpisodes) ? fbEpisodes[epIndex] : null;
                
                if (!fbEpisode || !fbEpisode.video_links || !Array.isArray(fbEpisode.video_links) || fbEpisode.video_links.length === 0) {
                    window.showAlertModal(
                        "Episode Not Released", 
                        "Sorry! The streaming node for this specific episode is not registered in our database yet."
                    );
                    showLoader(false);
                    return;
                }

                const resumeKey = `resume_${movieId}`;
                const savePayload = { s: currentSeasonIndex, e: epIndex };
                localStorage.setItem(resumeKey, JSON.stringify(savePayload));

                window.location.href = `player.html?id=${movieId}&s=${currentSeasonIndex}&e=${epIndex}`;
            } else {
                window.showAlertModal(
                    "Database Reference Missing", 
                    "No metadata records found for this media node."
                );
            }
        } catch(e) {
            console.error(e);
            showToast("Network Error!");
        }
        showLoader(false);
    };

    // ── INLINE TRAILER CONTROLS SYSTEM ──
    window.toggleTrailer = function() {
        if(isTrailerOpen) {
            closeInlineTrailer();
            return;
        }

        const segment = document.getElementById('inline-trailer-player');
        const container = document.getElementById('inline-media-container');
        const triggerBtn = document.getElementById('btn-play-trailer');

        let trailerUrl = movieData?.trailer_url;
        if(!trailerUrl) { showToast("Trailer asset not found!"); return; }

        isTrailerOpen = true;
        triggerBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;margin-right:6px;"><circle cx="12" cy="12" r="10"></circle><line x1="10" y1="10" x2="14" y2="14"></line><line x1="14" y1="10" x2="10" y2="14"></line></svg> <span>Close</span>`;

        let ytId = getYoutubeId(trailerUrl);
        isModalMuted = false;

        segment.classList.add('active');

        let rawTitle = movieData?.title || "Media";
        let displayTrailerTitle = rawTitle.length > 25 ? rawTitle.substring(0, 22) + "..." : rawTitle;

        if (ytId) {
            container.innerHTML = `
                <div class="player-top-bar">
                    <span class="trailer-lbl">${displayTrailerTitle} / Trailer</span>
                </div>
                <iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&modestbranding=1&rel=0&controls=1" allow="autoplay; encrypted-media"></iframe>
            `;
            setTimeout(() => { segment.classList.add('show-controls'); }, 100);
        } else {
            container.innerHTML = `
                <div class="player-top-bar">
                    <span class="trailer-lbl">${displayTrailerTitle} / Trailer</span>
                </div>
                <div class="player-tap-layer" onclick="triggerControlsVisibility()"></div>
                <video id="inline-html5-video" src="${trailerUrl}" autoplay playsinline></video>
                <div class="html5-controls">
                    <button class="play-pause-btn" id="play-pause-btn" onclick="togglePlayPause()"></button>
                    <div class="progress-container" id="progress-container">
                        <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
                    </div>
                    <div class="time-display" id="time-display">0:00 / 0:00</div>
                    <button class="inline-mute-btn" id="inline-mute-btn" onclick="toggleMuteHtml5()"></button>
                </div>
            `;
            initHtml5Controls();
        }
    };

    function initHtml5Controls() {
        customVideoElement = document.getElementById('inline-html5-video');
        const segment = document.getElementById('inline-trailer-player');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const timeDisplay = document.getElementById('time-display');

        isPlaying = true;
        updatePlayIcon();
        updateMuteIconUI();

        segment.classList.add('show-controls');
        resetControlsTimer();

        customVideoElement.addEventListener('timeupdate', () => {
            if(!isDraggingTimeline && customVideoElement) {
                const percent = (customVideoElement.currentTime / customVideoElement.duration) * 100;
                progressBar.style.width = `${percent}%`;
                timeDisplay.innerText = `${formatTime(customVideoElement.currentTime)} / ${formatTime(customVideoElement.duration)}`;
            }
        });

        customVideoElement.addEventListener('ended', () => { isPlaying = false; updatePlayIcon(); segment.classList.add('show-controls'); });

        const updateProgress = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            let pos = (e.clientX - rect.left) / rect.width;
            pos = Math.max(0, Math.min(1, pos));
            progressBar.style.width = `${pos * 100}%`;
            customVideoElement.currentTime = pos * customVideoElement.duration;
        };

        progressContainer.addEventListener('pointerdown', (e) => {
            isDraggingTimeline = true;
            clearTimeout(controlsTimer);
            progressContainer.setPointerCapture(e.pointerId);
            updateProgress(e);
        });

        progressContainer.addEventListener('pointermove', (e) => {
            if(isDraggingTimeline) updateProgress(e);
        });

        progressContainer.addEventListener('pointerup', (e) => {
            isDraggingTimeline = false;
            progressContainer.releasePointerCapture(e.pointerId);
            resetControlsTimer();
        });
    }

    window.triggerControlsVisibility = function() {
        const segment = document.getElementById('inline-trailer-player');
        if(segment.classList.contains('show-controls')) {
            segment.classList.remove('show-controls');
            clearTimeout(controlsTimer);
        } else {
            segment.classList.add('show-controls');
            resetControlsTimer();
        }
    };

    function resetControlsTimer() {
        clearTimeout(controlsTimer);
        if(!isDraggingTimeline && isPlaying) {
            controlsTimer = setTimeout(() => {
                const segment = document.getElementById('inline-trailer-player');
                if(segment) segment.classList.remove('show-controls');
            }, 3000);
        }
    }

    window.togglePlayPause = function() {
        if(!customVideoElement) return;
        if(customVideoElement.paused) {
            customVideoElement.play();
            isPlaying = true;
            resetControlsTimer();
        } else {
            customVideoElement.pause();
            isPlaying = false;
            clearTimeout(controlsTimer);
        }
        updatePlayIcon();
    };

    function updatePlayIcon() {
        const btn = document.getElementById('play-pause-btn');
        if(!btn) return;
        btn.innerHTML = isPlaying
            ? '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>'
            : '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
    }

    window.toggleMuteHtml5 = function() {
        if(!customVideoElement) return;
        isModalMuted = !isModalMuted;
        customVideoElement.muted = isModalMuted;
        updateMuteIconUI();
        resetControlsTimer();
    };

    function updateMuteIconUI() {
        const btn = document.getElementById('inline-mute-btn');
        if(!btn) return;
        btn.innerHTML = isModalMuted
            ? '<svg class="svg-icon" viewBox="0 0 24 24" style="width:15px; height:15px; fill:#fff; stroke:#fff;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>'
            : '<svg class="svg-icon" viewBox="0 0 24 24" style="width:15px; height:15px; fill:#fff; stroke:#fff;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>';
    }

    window.closeInlineTrailer = function() {
        const segment = document.getElementById('inline-trailer-player');
        const container = document.getElementById('inline-media-container');
        const triggerBtn = document.getElementById('btn-play-trailer');

        isTrailerOpen = false;
        clearTimeout(controlsTimer);

        triggerBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;margin-right:6px;"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg> <span>Trailer</span>`;

        segment.classList.remove('active', 'show-controls');
        if(customVideoElement) customVideoElement.pause();

        setTimeout(() => {
            container.innerHTML = '';
            customVideoElement = null;
        }, 400);
    };
</script>
