<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Privacy Policy – SanppyRoll</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        .font-sf { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }

        body {
            background: #0b0b0e; /* Solid dark background like Telegram */
            color: #e6e6ec;
            overflow-x: hidden;
            line-height: 1.7;
            font-weight: 300;
        }
        
        h1, h2, h3, .header-title {
            font-weight: 700;
            color: #ffffff;
        }

        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 5px; background: #0b0b0e; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f47521; }
        
        a { text-decoration: none; color: inherit; }
        
        /* ---------- HEADER ---------- */
        .privacy-header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(11, 11, 14, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .header-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex: 1;
        }
        .privacy-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #f47521;
            background: #1e1e2a;
        }
        .privacy-icon img { width: 100%; height: 100%; object-fit: cover; }
        .header-title {
            font-size: 20px;
            letter-spacing: -0.2px;
        }
        
        /* Language Dropdown */
        .lang-selector { position: relative; }
        .lang-circle {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .lang-circle:hover { background: rgba(244,117,33,0.15); border-color: #f47521; }
        .lang-circle i { font-size: 18px; color: #f47521; }
        .lang-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: #1c1c1e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px 0;
            min-width: 140px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            transform: translateY(-5px);
            z-index: 300;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .lang-selector.open .lang-dropdown { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .lang-option {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #ddd;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lang-option i { width: 18px; color: #f47521; }
        .lang-option:hover { background: rgba(255,255,255,0.05); color: #fff; }

        /* Main Container - Telegram Style (Narrow, readable width) */
        .policy-container {
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }
        
        /* Hero section */
        .policy-hero {
            margin-bottom: 50px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }
        .policy-hero h1 {
            font-size: 34px;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
        }
        .effective-date {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 24px;
        }
        .hero-desc {
            font-size: 17px;
            color: #b0b0b6;
            text-align: left;
        }

        /* Telegram-style Flat Sections */
        .policy-section {
            margin-bottom: 45px;
            animation: fadeIn 0.6s ease-out;
        }
        .policy-section h2 {
            font-size: 22px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .policy-section h2 i {
            color: #f47521;
            font-size: 20px;
        }
        
        .policy-text p {
            margin-bottom: 18px;
            font-size: 16px;
        }
        
        .policy-list {
            margin: 0 0 20px 10px;
            list-style: none;
        }
        .policy-list li {
            margin-bottom: 12px;
            position: relative;
            padding-left: 20px;
        }
        .policy-list li::before {
            content: "•";
            color: #f47521;
            font-weight: bold;
            font-size: 20px;
            position: absolute;
            left: 0;
            top: -2px;
        }
        
        /* SVG Links */
        .svg-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #f47521;
            font-weight: 600;
            transition: opacity 0.2s;
            margin-top: 5px;
        }
        .svg-link:hover { opacity: 0.8; text-decoration: underline; }
        .svg-icon { width: 16px; height: 16px; }

        .contact-block {
            background: rgba(255,255,255,0.03);
            border-left: 3px solid #f47521;
            padding: 16px 20px;
            margin-top: 15px;
            border-radius: 0 8px 8px 0;
            font-size: 15px;
        }

        .footer-cta {
            margin-top: 60px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 40px;
        }
        .redirect-home-btn {
            background: #f47521;
            border: none;
            border-radius: 8px;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .redirect-home-btn:hover { background: #dd5a02; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .policy-hero h1 { font-size: 28px; }
            .policy-section h2 { font-size: 20px; }
            .policy-text p, .policy-list li { font-size: 15px; }
        }
    </style>
</head>

                contactBlock: "ఇమెయిల్: <strong>SanppyRoll@protonmail.com</strong><br>చిరునామా: SanppyRoll Legal, 221B Digital Lane.",
                card9Footer: "పారదర్శకతకు మేము కట్టుబడి ఉన్నాము.",
                legalTitle: "సమ్మతి",
                legalText: "ఉపయోగించడం ద్వారా, మీరు ఈ విధానాన్ని అంగీకరిస్తున్నారు."
            }
        };

        function renderPolicy(lang) {
            const t = translations[lang] || translations.en;
            const container = document.getElementById('policyContent');
            if (!container) return;
            
            if(lang === 'hi') {
                document.body.classList.remove('font-sf');
                document.body.classList.add('font-poppins');
            } else {
                document.body.classList.remove('font-poppins');
                document.body.classList.add('font-sf');
            }

            const heroHtml = `
                <div class="policy-hero">
                    <h1>${t.heroTitle}</h1>
                    <div class="effective-date">${t.effectiveDate}</div>
                    <p class="hero-desc">${t.heroDesc}</p>
                </div>
            `;

            const sections = [
                { title: t.card1Title, icon: "fa-database", content: t.card1Text, list: [t.list1_1, t.list1_2, t.list1_3, t.list1_4], footer: t.card1Footer },
                { title: t.card2Title, icon: "fa-chart-line", content: t.card2Text, list: [t.list2_1, t.list2_2, t.list2_3, t.list2_4, t.list2_5], footer: t.card2Footer },
                { title: t.card3Title, icon: "fa-cookie-bite", content: t.card3Text, list: [t.list3_1, t.list3_2, t.list3_3], footer: t.card3Footer },
                { title: t.card4Title, icon: "fa-share-alt", content: t.card4Text, list: [t.list4_1, t.list4_2, t.list4_3, t.list4_4], footer: t.card4Footer },
                { title: t.card5Title, icon: "fa-lock", content: t.card5Text, list: [t.list5_1, t.list5_2, t.list5_3], footer: t.card5Footer, note: t.card5Note },
                { title: t.card6Title, icon: "fa-user-check", content: t.card6Text, list: [t.list6_1, t.list6_2, t.list6_3, t.list6_4], footer: t.card6Footer },
                { title: t.card7Title, icon: "fa-child", content: t.card7Text, list: [], footer: "" },
                { title: t.card8Title, icon: "fa-clock", content: t.card8Text, list: [], footer: "" },
                { title: t.card9Title, icon: "fa-envelope-open-text", content: t.card9Text, list: [], contactBlock: t.contactBlock, footer: t.card9Footer }
            ];
            
            let sectionsHtml = '';
            sections.forEach(sec => {
                let listHtml = '';
                if (sec.list && sec.list.length) {
                    listHtml = `<ul class="policy-list">${sec.list.map(li => `<li>${li}</li>`).join('')}</ul>`;
                }
                
                let contactBlockHtml = '';
                if (sec.contactBlock) {
                    contactBlockHtml = `<div class="contact-block">${sec.contactBlock}</div>`;
                }

                let extraNote = sec.note ? `<p style="margin-top:10px; color:#f47521; font-weight:600;">* ${sec.note}</p>` : '';
                
                sectionsHtml += `
                    <div class="policy-section">
                        <h2><i class="fas ${sec.icon}"></i> ${sec.title}</h2>
                        <div class="policy-text">
                            <p>${sec.content}</p>
                            ${listHtml}
                            ${contactBlockHtml}
                            ${sec.footer ? `<p style="margin-top:15px; opacity:0.8;">${sec.footer}</p>` : ''}
                            ${extraNote}
                        </div>
                    </div>
                `;
            });

            const legalHtml = `
                <div class="policy-section" style="margin-top: 60px;">
                    <h2><i class="fas fa-balance-scale"></i> ${t.legalTitle}</h2>
                    <div class="policy-text">
                        <p>${t.legalText}</p>
                    </div>
                </div>
            `;

            const footerCta = `
                <div class="footer-cta">
                    <button class="redirect-home-btn" onclick="window.location.href='index.html'">
                        <i class="fas fa-arrow-left"></i> Return to Home
                    </button>
                </div>
            `;

            container.innerHTML = heroHtml + sectionsHtml + legalHtml + footerCta;
        }

        // Language Selector Logic
        const langSelector = document.getElementById('langSelector');
        const toggleBtn = document.getElementById('langToggleBtn');
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            langSelector.classList.toggle('open');
        });
        
        document.querySelectorAll('.lang-option').forEach(opt => {
            opt.addEventListener('click', (e) => {
                const lang = opt.getAttribute('data-lang');
                if (lang) {
                    renderPolicy(lang);
                }
                langSelector.classList.remove('open');
            });
        });
        
        document.addEventListener('click', (e) => {
            if (!langSelector.contains(e.target)) langSelector.classList.remove('open');
        });
        
        // As you ordered, strictly English loads first!
        renderPolicy('en');
    </script>
</body>
</html>
