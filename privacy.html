<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Privacy Policy – SanppyRoll</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        .font-sf { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; }
        .font-poppins { font-family: 'Poppins', sans-serif; }

        body {
            background: #0b0b0e;
            color: #e6e6ec;
            overflow-x: hidden;
            line-height: 1.7;
            font-weight: 300;
        }
        
        h1, h2, h3, .header-title {
            font-weight: 700;
            color: #ffffff;
        }

        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 5px; background: #0b0b0e; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f47521; }
        
        a { text-decoration: none; color: inherit; }

        .svg-icon { width: 14px; height: 14px; display: inline-block; vertical-align: middle; }
        
        /* ---------- HEADER ---------- */
        .privacy-header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(11, 11, 14, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 12px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        
        .back-btn-new {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .back-btn-new:hover { background: rgba(255, 255, 255, 0.08); transform: scale(1.05); }
        .back-btn-new:active { transform: scale(0.9); }
        .back-btn-new svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 3; fill: none; }

        .header-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex: 1;
        }
        .privacy-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #f47521;
            background: #1e1e2a;
            box-shadow: 0 4px 15px rgba(244, 117, 33, 0.2);
        }
        .privacy-icon img { width: 100%; height: 100%; object-fit: cover; }
        .header-title {
            font-size: 18px;
            letter-spacing: -0.2px;
        }
        
        /* Language Dropdown */
        .lang-selector { position: relative; }
        .lang-circle {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .lang-circle:hover { background: rgba(244,117,33,0.1); border-color: #f47521; transform: scale(1.05); }
        .lang-circle i { font-size: 16px; color: #f47521; }
        .lang-dropdown {
            position: absolute;
            top: 45px;
            right: 0;
            background: #121214;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 6px 0;
            min-width: 130px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(-5px);
            z-index: 300;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .lang-selector.open .lang-dropdown { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .lang-option {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #ddd;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lang-option i { width: 16px; color: #f47521; }
        .lang-option:hover { background: rgba(244,117,33,0.08); color: #fff; }

        /* Main Container - Coding Layout */
        .policy-container {
            max-width: 780px;
            margin: 0 auto;
            padding: 30px 4% 80px;
        }
        
        /* Hero section */
        .policy-hero {
            margin-bottom: 40px;
            text-align: center;
        }
        .policy-hero h1 {
            font-size: 30px;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }
        .effective-date {
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hero-desc {
            font-size: 15px;
            color: #b0b0b6;
            text-align: left;
            line-height: 1.6;
        }

        /* ── ULTIMATE CODESPACE WINDOWS ── */
        .ide-window {
            background: #141416;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
        }
        .ide-window:hover {
            transform: translateY(-3px);
            border-color: rgba(244, 117, 33, 0.3);
        }
        .ide-header {
            background: #19191d;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .ide-dots {
            display: flex;
            gap: 6px;
        }
        .ide-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .ide-dot.red { background: #ff5f56; }
        .ide-dot.yellow { background: #ffbd2e; }
        .ide-dot.green { background: #27c93f; }
        .ide-tab {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }
        .ide-body {
            padding: 14px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #abb2bf;
            overflow-x: auto;
            background: #101012;
        }
        .code-line {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 2px;
        }
        .line-num {
            color: rgba(255, 255, 255, 0.15);
            text-align: right;
            width: 20px;
            user-select: none;
            flex-shrink: 0;
            font-weight: 500;
        }
        .code-content {
            flex: 1;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        /* Syntax Highlight Palette */
        .c-key { color: #e06c75; font-weight: 600; }     /* Soft Red */
        .c-val { color: #98c379; }                       /* Soft Green */
        .c-keyword { color: #c678dd; font-weight: 600; } /* Purple */
        .c-bracket { color: #abb2bf; }                   /* Gray */
        .c-comment { color: #5c6370; font-style: italic; } /* Slate Comment Gray */
        .c-num { color: #d19a66; }                       /* Orange */
        .c-type { color: #56b6c2; }                      /* Cyan */
        
        /* SVG Links */
        .svg-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #f47521;
            font-weight: 600;
            transition: opacity 0.2s;
            margin-top: 4px;
        }
        .svg-link:hover { opacity: 0.8; text-decoration: underline; }

        .contact-block {
            background: rgba(255,255,255,0.01);
            border-left: 3px solid #f47521;
            padding: 12px 16px;
            margin-top: 10px;
            border-radius: 0 8px 8px 0;
            font-size: 13.5px;
        }

        .footer-cta {
            margin-top: 50px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 30px;
        }
        .redirect-home-btn {
            background: #f47521;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(244, 117, 33, 0.2);
        }
        .redirect-home-btn:hover { background: #dd5a02; transform: translateY(-2px); }
        .redirect-home-btn:active { transform: translateY(0) scale(0.96); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .policy-hero h1 { font-size: 24px; }
            .policy-section h2 { font-size: 18px; }
            .ide-body { font-size: 12px; }
        }
    </style>
</head>

                targets: '#policyContent',
                opacity: [1, 0],
                translateY: [0, -10],
                duration: 200,
                easing: 'easeInQuad',
                complete: () => {
                    if(lang === 'hi') {
                        document.body.classList.remove('font-sf');
                        document.body.classList.add('font-poppins');
                    } else {
                        document.body.classList.remove('font-poppins');
                        document.body.classList.add('font-sf');
                    }

                    const heroHtml = `
                        <div class="policy-hero">
                            <h1>${t.heroTitle}</h1>
                            <div class="effective-date">${t.effectiveDate}</div>
                            <p class="hero-desc">${t.heroDesc}</p>
                        </div>
                    `;

                    let sectionsHtml = '';
                    t.cards.forEach(sec => {
                        let codeLinesHtml = '';
                        if (sec.code && sec.code.length) {
                            codeLinesHtml = sec.code.map((line, index) => `
                                <div class="code-line">
                                    <span class="line-num">${String(index + 1).padStart(2, '0')}</span>
                                    <div class="code-content">${line}</div>
                                </div>
                            `).join('');
                        }

                        sectionsHtml += `

                                <div class="ide-header">

                                        <span class="ide-dot yellow"></span>
                                        <span class="ide-dot green"></span>
                                    </div>
                                    <div class="ide-tab"><i class="fas ${sec.icon}"></i> ${sec.file}</div>
                                </div>
                                <div class="ide-body">
                                    ${codeLinesHtml}
                                </div>
                                <div style="padding:14px; background:#141416; font-size:13px; border-top:1px solid rgba(255,255,255,0.03); line-height:1.5;">
                                    ${sec.explain}
                                </div>
                            </div>
                        `;
                    });

                    const legalHtml = `
                        <div class="ide-window">
                            <div class="ide-header">
                                <div class="ide-dots">
                                    <span class="ide-dot red"></span>
                                    <span class="ide-dot yellow"></span>

                                </div>
                            </div>
                        </div>
                    `;

                    const contactHtml = `
                        <div class="ide-window">
                            <div class="ide-header">
                                <div class="ide-dots">
                                    <span class="ide-dot red"></span>
                                    <span class="ide-dot yellow"></span>

                        </div>
                    `;

                    container.innerHTML = heroHtml + sectionsHtml + legalHtml + contactHtml + footerCta;

                        targets: '#policyContent',
                        opacity: [0, 1],
                        translateY: [10, 0],
                        duration: 400,
                        easing: 'easeOutQuad'
                    });
                }
            });
        }

        // Language Selector Logic
        const langSelector = document.getElementById('langSelector');
        const toggleBtn = document.getElementById('langToggleBtn');
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            langSelector.classList.toggle('open');
        });
        
        document.querySelectorAll('.lang-option').forEach(opt => {
