<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Home - SanppyRoll</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <script>
        let isBackNav = false;
        if (window.performance && window.performance.getEntriesByType) {
            const navEntries = window.performance.getEntriesByType("navigation");
            if (navEntries.length > 0 && navEntries[0].type === "back_forward") isBackNav = true;
        } else if (window.performance && window.performance.navigation) {
            if (window.performance.navigation.type === 2) isBackNav = true;
        }
        const _cachedData = sessionStorage.getItem('snappy_index_cache');
        const _hasCached = !!_cachedData;
        if (isBackNav && _hasCached) {
            document.documentElement.style.setProperty('--skeleton-display', 'none');
            document.documentElement.style.setProperty('--content-opacity', '1');
        } else {
            document.documentElement.style.setProperty('--skeleton-display', 'block');
            document.documentElement.style.setProperty('--content-opacity', '0');
        }
    </script>
    <style>
        /* ── CSS VARIABLES ── */
        :root {
            --accent: #f47521;
            --text-muted: rgba(255, 255, 255, 0.4);
        }

        /* ── CORE ── */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            outline: none;
        }
        
        body, input, button, select, textarea, div, span, p, h1, h2, h3, h4, h5, h6, a {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        html { scroll-behavior: smooth; }
        body {
            background: #0b0b0e; color: #fff; overflow-x: hidden; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        img { pointer-events: none; -webkit-user-drag: none; display: block; }
        a { text-decoration: none; color: inherit; }

        /* ── SVG ICON UTILS ── */
        .svg-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .svg-icon-fill { width: 14px; height: 14px; fill: currentColor; }

        /* ── DYNAMIC SKELETON SHIMMER ── */
        #skeleton-ui {
            display: var(--skeleton-display, block);
            width: 100%;
            position: absolute;
            top: 0; left: 0;
            z-index: 5000;
            padding-bottom: 80px;
        }
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.06) 50%, rgba(255, 255, 255, 0.02) 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite linear;
            border-radius: 8px;
        }
        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .sk-hero { width: 100%; height: 55vh; border-radius: 0; margin-bottom: 25px; }
        .sk-row { padding-left: 5%; margin-bottom: 25px; overflow: hidden; }
        .sk-row-title { height: 18px; width: 130px; margin-bottom: 12px; }
        .sk-posters { display: flex; gap: 11px; }
        .sk-poster { width: 112px; aspect-ratio: 2/3; flex-shrink: 0; border-radius: 10px; }

        /* ── CONTENT CONTAINER ── */
        #app-content { opacity: var(--content-opacity, 0); }
        #app-content.loaded { opacity: 1 !important; }

        /* ── NAVBAR ── */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px; z-index: 1000;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 14px 5%;
            background: linear-gradient(to bottom, rgba(11,11,14,0.75) 0%, rgba(11,11,14,0.2) 55%, transparent 100%);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            -webkit-mask-image: linear-gradient(to bottom, black 45%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 45%, transparent 100%);
        }
        .nav-logo { height: 30px; cursor: pointer; pointer-events: auto; margin-top: 4px; transition: transform 0.2s ease, opacity 0.2s; }
        .nav-logo:active { transform: scale(0.93); opacity: 0.8; }
        .nav-actions { display: flex; align-items: center; gap: 10px; pointer-events: auto; margin-top: 2px; }
        
        .icon-btn {
            background: transparent; border: none; color: #fff;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: color 0.2s, transform 0.15s; opacity: 0.9;
        }
        .icon-btn:hover { opacity: 1; color: #f47521; }
        .icon-btn:active { transform: scale(0.88); }

        /* --- PROFILE ICON & ACCENT RING --- */
        .profile-btn { 
            position: relative;
            width: 36px;
            height: 36px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: #1a1a1a;
            border: 2.5px solid transparent;
            padding: 2px;
            cursor: pointer;
            opacity: 0;
            box-sizing: border-box;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s ease;
        }

        .profile-btn.premium-user {
            border-color: #f47521; /* Orange ring only for premium users */
        }

        .profile-btn:active {
            transform: scale(0.9);
        }

        .profile-btn img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            display: block;
        }

        .profile-fallback-avatar {
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 100%; 
            height: 100%; 
            border-radius: 50%;
            background: linear-gradient(135deg, #f47521, #e00073);
            color: #fff; 
            font-weight: 900; 
            font-size: 13px;
        }

        /* ── CINEMATIC HERO ── */
        .hero-slider { width: 100%; height: 60vh; position: relative; overflow: hidden; background: #0b0b0e; transform: translateZ(0); opacity: 0; }
        .hero-slide {
            position: absolute; inset: 0; width: 100%; height: 100%;
            opacity: 0; transition: opacity 0.9s ease-in-out;
            display: flex; align-items: flex-end; padding: 0 5% 52px 5%;
            z-index: 1; pointer-events: none;
        }
        .hero-slide.active { opacity: 1; z-index: 2; pointer-events: auto; }
        .hero-img-bg {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; inset: 0; z-index: 0; pointer-events: none; border: none;
        }
        .hero-fade {
            position: absolute; bottom: -1px; left: 0; right: 0; height: 68%;
            background: linear-gradient(to top, #0b0b0e 0%, rgba(11,11,14,0.65) 42%, transparent 100%);
            z-index: 1; pointer-events: none; transform: translateZ(0);
        }
        
        /* Cinematic left vignette mask */
        .hero-vignette {
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background: linear-gradient(90deg, #0b0b0e 0%, rgba(11,11,14,0.85) 25%, rgba(11,11,14,0.4) 55%, transparent 100%);
        }
        
        .hero-content { position: relative; z-index: 10; max-width: 580px; width: 100%; }
        .hero-logo-img { height: 52px; margin-bottom: 12px; object-fit: contain; object-position: left; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }
        .hero-title {
            font-size: clamp(26px, 6.5vw, 40px); font-weight: 800; line-height: 1.1;
            margin-bottom: 7px; letter-spacing: -0.5px; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        /* Redesigned Premium Metadata Tags */
        .hero-meta-container { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
        .hero-tag-premium-badge {
            background: #f47521; color: #fff; font-size: 10px; font-weight: 800;
            padding: 3px 8px; border-radius: 4px; letter-spacing: 0.5px;
        }
        .hero-rating-badge {
            background: rgba(11, 11, 14, 0.6); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px;
            border-radius: 6px; display: inline-flex; align-items: center;
        }
        .hero-genre-pill {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ddd; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
        }

        .hero-subtitle {
            font-size: 13px; font-weight: 500; color: rgba(225,230,235,0.85);
            margin-bottom: 18px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        /* Redesigned Primary Action Buttons (Flat Widescreen Layout) */
        .hero-actions-container { display: flex; align-items: center; gap: 12px; margin-top: 5px; }
        .btn-hero-play {
            display: inline-flex !important; align-items: center; justify-content: center; gap: 10px;
            padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer;
            font-size: 14px; font-weight: 800; color: #000 !important; background: #ffffff !important;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s, box-shadow 0.2s;
        }
        .btn-hero-play:hover {
            background-color: #f47521 !important; color: #fff !important;
            box-shadow: 0 6px 20px rgba(244,117,33,0.4); transform: scale(1.03);
        }
        .btn-hero-play:active { transform: scale(0.97); }
        .btn-hero-play i { font-size: 12px; }
        
        .btn-hero-info {
            display: inline-flex !important; align-items: center; justify-content: center; gap: 10px;
            padding: 12px 24px; border-radius: 8px; border: 1.5px solid rgba(255, 255, 255, 0.25) !important;
            cursor: pointer; font-size: 14px; font-weight: 700; color: #ffffff !important;
            background: rgba(255, 255, 255, 0.08) !important; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s, background-color 0.2s;
        }
        .btn-hero-info:hover {
            border-color: rgba(255, 255, 255, 0.6) !important; background-color: rgba(255, 255, 255, 0.15) !important;
            transform: scale(1.03);
        }
        .btn-hero-info:active { transform: scale(0.97); }

        .hero-indicators { position: absolute; bottom: 22px; right: 5%; z-index: 10; display: flex; gap: 5px; }
        .indicator { width: 10px; height: 3px; background: rgba(255,255,255,0.25); border-radius: 2px; transition: all 0.35s ease; }
        .indicator.active { width: 22px; background: #f47521; }

        /* ── CONTENT ROWS ── */
        .main-content { margin-top: -18px; position: relative; z-index: 50; padding-bottom: 60px; }
        .no-hero-padding { padding-top: 100px !important; }
        .row-container { padding: 8px 0 22px 5%; opacity: 0; }
        .row-header { display: flex; justify-content: space-between; align-items: center; padding-right: 5%; margin-bottom: 12px; }
        .row-title { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: -0.2px; display: flex; align-items: center; gap: 6px; }
        .view-all { font-size: 12px; color: #f47521; font-weight: 700; cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; gap: 4px; }
        .view-all:active { opacity: 0.6; }
        .posters-scroll { display: flex; gap: 11px; overflow-x: auto; scrollbar-width: none; scroll-snap-type: x mandatory; padding-right: 5%; }
        .posters-scroll::-webkit-scrollbar { display: none; }
        .item-wrapper { flex: 0 0 auto; width: 112px; display: flex; flex-direction: column; gap: 6px; scroll-snap-align: start; cursor: pointer; position: relative; transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
        .poster-card {
            width: 100%; aspect-ratio: 2/3; border-radius: 10px; position: relative;
            background: #1a1a1f; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }
        .poster-img { width: 100%; height: 100%; object-fit: cover; }
        .item-title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── BADGES ── */
        .card-badge {
            position: absolute; top: 0; left: 0; z-index: 10; padding: 3px 7px; border-radius: 0 0 7px 0;
            font-size: 8.5px; font-weight: 900; letter-spacing: 0.4px; display: flex; align-items: center; gap: 3px;
        }
        .badge-4k { background: rgba(0,0,0,0.75); border-right: 1px solid #f47521; border-bottom: 1px solid #f47521; color: #f47521; backdrop-filter: blur(4px); }
        .badge-fullhd { background: rgba(0,0,0,0.75); border-right: 1px solid rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.4); color: rgba(255,255,255,0.9); backdrop-filter: blur(4px); }
        .badge-hd { background: rgba(0,0,0,0.7); border-right: 1px solid rgba(255,255,255,0.3); border-bottom: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.75); backdrop-filter: blur(4px); font-size: 8px; }
        .badge-top { background: linear-gradient(135deg, #ff4500 0%, #f47521 100%); color: #fff; box-shadow: 0 2px 8px rgba(255,69,0,0.4); }
        .badge-trending { background: linear-gradient(135deg, #ff0844 0%, #ff7b7b 100%); color: #fff; box-shadow: 0 2px 8px rgba(255,8,68,0.35); }
        .badge-premium { background: #f5c518; color: #000; box-shadow: 0 2px 8px rgba(245,197,24,0.4); font-size: 9px; }

        /* ── VIEW ALL OVERLAY ── */
        .overlay-screen { position: fixed; inset: 0; background: #0b0b0e; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.28s; display: flex; flex-direction: column; }
        .overlay-screen.active { opacity: 1; pointer-events: auto; }
        .overlay-header { padding: 14px 5%; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .overlay-header h2 { font-size: 16px; font-weight: 800; flex: 1; text-align: center; margin-right: 32px; }
        .view-all-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 14px 5%; overflow-y: auto; flex: 1; }

        /* ── GEN Z MODERN PRIVACY BUTTON ── */
        .footer-minimal {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .privacy-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-decoration: none;
        }
        .privacy-link-btn:hover {
            color: #fff;
            background: rgba(244, 117, 33, 0.1);
            border-color: rgba(244, 117, 33, 0.3);
            box-shadow: 0 4px 20px rgba(244, 117, 33, 0.15);
            transform: translateY(-2px);
        }
        .privacy-link-btn:active {
            transform: translateY(0) scale(0.96);
        }
        .privacy-link-btn i {
            font-size: 12px;
            transition: transform 0.3s ease;
        }
        .privacy-link-btn:hover i {
            transform: rotate(15deg) scale(1.1);
            color: var(--accent);
        }

        /* ── TELEGRAM SECTION ── */
        .section-block { padding: 20px 5% 40px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .tg-title { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 6px; }
        .tg-desc { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 15px; max-width: 280px; }
        
        .tg-join-btn {
            background: transparent; position: relative; padding: 6px 20px;
            display: flex; align-items: center; font-size: 14px; font-weight: 700;
            cursor: pointer; border: 1.5px solid rgb(36, 161, 222);
            border-radius: 30px; outline: none; overflow: hidden; transform: scale(0.9);
            color: rgb(36, 161, 222); transition: color 0.3s 0.1s ease-out;
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.2);
        }
        .tg-join-btn span { margin: 8px; }
        .tg-join-btn svg { width: 18px; height: 18px; }
        .tg-join-btn::before {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; margin: auto; content: "";
            border-radius: 50%; display: block; width: 20em; height: 20em; left: -5em;
            text-align: center; transition: box-shadow 0.4s ease-out; z-index: -1;
        }
        .tg-join-btn:hover, .tg-join-btn:active { color: #fff; border-color: rgb(36, 161, 222); }
        .tg-join-btn:hover::before, .tg-join-btn:active::before { box-shadow: inset 0 0 0 10em rgb(36, 161, 222); }
        .divider-line { height: 1px; background: rgba(255,255,255,0.06); margin: 10px 5%; }

        /* ── COOKIE CONSENT MODAL ── */
        .cookie-overlay {
            position: fixed; bottom: -300px; left: 50%; transform: translateX(-50%);
            z-index: 9999; transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cookie-overlay.show { bottom: 25px; }
        .cookie-card {
            width: 310px; background-color: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px 30px; gap: 12px; position: relative; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .cookie-logo { width: 55px; margin-bottom: 5px; object-fit: contain; }
        .cookieHeading { font-size: 1.25em; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        .cookieDescription { text-align: center; font-size: 0.75em; font-weight: 500; color: rgba(255,255,255,0.6); line-height: 1.5; }
        .cookieDescription a { color: #f47521; font-weight: 700; transition: color 0.2s; }
        .cookieDescription a:hover { text-decoration: underline; color: #ffaa00; }
        .cookie-btn-container { display: flex; gap: 15px; margin-top: 8px; width: 100%; }
        .acceptButton {
            flex: 1; height: 38px; background-color: #f47521; border: none;
            color: #fff; cursor: pointer; font-weight: 700; font-size: 14px;
            border-radius: 20px; box-shadow: 0 4px 10px rgba(244,117,33,0.3); transition: all 0.2s ease;
        }
        .declineButton {
            flex: 1; height: 38px; background-color: rgba(255,255,255,0.1); border: none;
            color: rgba(255,255,255,0.8); cursor: pointer; font-weight: 600; font-size: 14px;
            border-radius: 20px; transition: all 0.2s ease;
        }
        .acceptButton:active { transform: scale(0.95); background-color: #e65c00; }
        .declineButton:active { transform: scale(0.95); background-color: rgba(255,255,255,0.15); }

        @media (max-width: 600px) {
            .hero-slider { height: 52vh; }
            .item-wrapper { width: 105px; }
            .view-all-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }
    </style>
</head>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDnmFVfVSCxXC9shWhz4dw06xtTNBA6vsU",
        authDomain: "sanppyroll.firebaseapp.com",
        databaseURL: "https://sanppyroll-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sanppyroll",
        storageBucket: "sanppyroll.firebasestorage.app",
        messagingSenderId: "642736474886",
        appId: "1:642736474886:web:f0e0e3c04101fddfe02c87"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db);
    const auth = getAuth(app);
    
    let currentUser = null;
    let userSubPlan = 'free';
    let allMovies = [];
    let categoryIcons = {};
    let currentSlide = 0;
    let slideInterval;

    // Detect if page was restored via Back-Forward Cache to skip motion timelines completely
    let shouldAnimate = !isBackNav;

    window.popBtn = (el) => {
        if(!el) return;
        anime({
            targets: el,
            scale: [1, 0.93, 1],
            duration: 250,
            easing: 'easeInOutQuad'
        });
    };

    // ── QUALITY DETECTION ──
    function getQualityBadge(movie) {
        let maxQ = null;
        const links = movie.video_links || [];
        const seriesLinks = (!links.length && movie.seasons) ? (movie.seasons[0]?.episodes?.[0]?.video_links || []) : [];
        const allLinks = links.length ? links : seriesLinks;
        
        if (allLinks.length) {
            const labels = allLinks.map(l => (l.label || '').toLowerCase());
            if (labels.some(l => l.includes('4k') || l.includes('2160') || l.includes('ultra'))) maxQ = '4k';
            else if (labels.some(l => l.includes('1080'))) maxQ = 'fullhd';
            else if (labels.some(l => l.includes('720'))) maxQ = 'hd';
        }
        return maxQ;
    }

    function getBadgeHtml(movie, index, catName) {
        const isElite = (movie.access_level === 'elite' || movie.access_level === 'supreme');
        
        if (isElite) return `<div class="card-badge badge-premium"><svg viewBox="0 0 24 24" class="svg-icon-fill" style="margin-right:2px; width:8px; height:8px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> PRO</div>`;

        const isTrending = catName.toLowerCase().includes('new');
        const isTop = catName.toLowerCase().includes('top');
        
        if (isTop) return `<div class="card-badge badge-top">TOP ${index + 1}</div>`;
        if (isTrending) return `<div class="card-badge badge-trending">NEW</div>`;
        
        const q = getQualityBadge(movie);
        if (q === '4k') return `<div class="card-badge badge-4k">4K</div>`;
        if (q === 'fullhd') return `<div class="card-badge badge-fullhd">Full HD</div>`;
        if (q === 'hd') return `<div class="card-badge badge-hd">HD</div>`;
        
        return '';
    }

    function getDynamicIconHtml(iconClass) {
        let col = '#f47521';
        if (iconClass.includes('star') || iconClass.includes('crown') || iconClass.includes('bolt') || iconClass.includes('fire')) col = '#f5c518';
        else if (iconClass.includes('heart') || iconClass.includes('film') || iconClass.includes('play') || iconClass.includes('tv')) col = '#f47521';
        else if (iconClass.includes('globe') || iconClass.includes('leaf') || iconClass.includes('child')) col = '#34c759';
        else if (iconClass.includes('ghost') || iconClass.includes('robot') || iconClass.includes('cogs')) col = '#8e8e93';
        return `<i class="${iconClass}" style="color:${col};font-size:14px;"></i>`;
    }

    // --- ANIME.JS CINEMATIC HOME ENTRANCE TRANSITION ---
    function triggerCinematicEntrance() {
        const skeletonUi = document.getElementById('skeleton-ui');
        const contentEl = document.getElementById('app-content');
        
        if (skeletonUi) skeletonUi.style.display = 'none';
        contentEl.classList.add('loaded');
        
        // If user returned via BACK cache, skip all animation timelines to prevent cumulative layout shifts
        if (!shouldAnimate) {
            const rowContainers = contentEl.querySelectorAll('.row-container');
            rowContainers.forEach(el => {
                el.style.opacity = '1';
                el.style.transform = 'none';
            });
            const heroSlider = document.getElementById('hero-slider');
            if (heroSlider) {
                heroSlider.style.opacity = '1';
                heroSlider.style.transform = 'none';
            }
            const heroContents = contentEl.querySelectorAll('.hero-content');
            heroContents.forEach(el => {
                el.style.opacity = '1';
                el.style.transform = 'none';
            });
            const tgWrapper = document.getElementById('telegram-section-wrapper');
            if (tgWrapper) {
                tgWrapper.style.opacity = '1';
                tgWrapper.style.transform = 'none';
            }
            
            if (!localStorage.getItem('sanppy_cookies_accepted')) {
                const cookieOverlay = document.getElementById('cookie-overlay');
                if (cookieOverlay) cookieOverlay.classList.add('show');
            }
            return;
        }
        
        if (typeof anime !== 'undefined') {
            anime.timeline({
                easing: 'easeOutQuart',
                duration: 800
            })
            .add({
                targets: '#hero-slider',
                opacity: [0, 1],
                scale: [0.98, 1],
                duration: 1100
            })
            .add({
                targets: '.hero-slide.active .hero-content',
                translateY: [35, 0],
                opacity: [0, 1],
                duration: 800
            }, '-=800')
            .add({
                targets: '.row-container',
                translateY: [35, 0],
                opacity: [0, 1],
                delay: anime.stagger(120)
            }, '-=600')
            .add({
                targets: '#telegram-section-wrapper',
                opacity: [0, 1],
                duration: 500
            }, '-=400');
        } else {
            const targets = contentEl.querySelectorAll('.row-container');
            targets.forEach(el => { el.style.opacity = '1'; });
            const tgWrapper = document.getElementById('telegram-section-wrapper');
            if (tgWrapper) tgWrapper.style.opacity = '1';
        }
        
        if (!localStorage.getItem('sanppy_cookies_accepted')) {
            setTimeout(() => { document.getElementById('cookie-overlay').classList.add('show'); }, 1500);
        }
    }

    window.acceptCookies = function() {
        localStorage.setItem('sanppy_cookies_accepted', 'true');
        document.getElementById('cookie-overlay').classList.remove('show');
    };
    window.declineCookies = function() {
        document.getElementById('cookie-overlay').classList.remove('show');
    };

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.replace('login.html'); return; }
        currentUser = user;
        const profileImg = document.getElementById('user-profile-icon');
        
        const cachedPic = localStorage.getItem('cachedProfilePic');
        const cachedName = localStorage.getItem('cachedProfileName') || 'U';
        const cachedIsPremium = localStorage.getItem('cachedIsPremium') === 'true';

        window.animateAvatarLoad = function(imgEl) {
            if (!imgEl) return;
            anime({
                targets: imgEl,
                scale: [0.85, 1],
                opacity: [0, 1],
                easing: 'easeOutQuint',
                duration: 600
            });
        };

        function updateProfileUI(url, nameStr, isPremium = false) {
            const isFirstLoad = !profileImg.dataset.initialized;
            
            // Re-render prevention to block duplicate animation triggers
            if (!isFirstLoad && profileImg.dataset.url === url && profileImg.dataset.premium === String(isPremium) && profileImg.dataset.name === nameStr) {
                return;
            }
            
            profileImg.dataset.url = url || '';
            profileImg.dataset.name = nameStr || '';
            profileImg.dataset.premium = String(isPremium);

            const initial = (nameStr || 'U').charAt(0).toUpperCase();
            
            if (isPremium) {
                profileImg.classList.add('premium-user');
            } else {
                profileImg.classList.remove('premium-user');
            }

            if (url) {
                profileImg.innerHTML = `<img src="${url}" style="opacity:0;" onload="animateAvatarLoad(this)" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'profile-fallback-avatar\\'>${initial}</div>';">`;
            } else {
                profileImg.innerHTML = `<div class="profile-fallback-avatar" style="opacity:0;">${initial}</div>`;
                const fallback = profileImg.querySelector('.profile-fallback-avatar');
                if (fallback) {
                    if (shouldAnimate && isFirstLoad) {
                        anime({
                            targets: fallback,
                            scale: [0.8, 1],
                            opacity: [0, 1],
                            easing: 'easeOutElastic(1, .8)',
                            duration: 800
                        });
                    } else {
                        fallback.style.opacity = '1';
                    }
                }
            }

            // Play container pop animation strictly once on absolute page load
            if (isFirstLoad) {
                profileImg.dataset.initialized = 'true';
                if (shouldAnimate) {
                    anime({
                        targets: '#user-profile-icon',
                        scale: [0.6, 1],
                        opacity: [0, 1],
                        easing: 'easeOutElastic(1, 0.65)',
                        duration: 900
                    });
                } else {
                    profileImg.style.opacity = '1';
                    profileImg.style.transform = 'none';
                }
            } else {
                profileImg.style.opacity = '1';
                profileImg.style.transform = 'none';
            }
        }

        // 1. Immediately render using cached info to avoid blank/flickering profile state
        updateProfileUI(cachedPic, cachedName, cachedIsPremium);
        
        let isPremiumPlan = false;
        try {
            const subSnap = await get(child(dbRef, `users/${user.uid}/subscription`));
            if (subSnap.exists() && subSnap.val().plan && subSnap.val().expiry > Date.now()) {
                userSubPlan = subSnap.val().plan;
                isPremiumPlan = true;
            } else { userSubPlan = 'free'; }
            localStorage.setItem('cachedIsPremium', isPremiumPlan ? 'true' : 'false');
        } catch(e) {}

        // 2. Fetch realtime user profile data. Custom avatar set via me.html strictly takes priority.
        try {
            const profileSnap = await get(child(dbRef, `users/${user.uid}/profile`));
            let finalUrl = user.photoURL; // default to Google profile image initially
            let finalName = user.displayName || user.email;

            if (profileSnap.exists()) {
                const pData = profileSnap.val();
                
                // If custom custom profile is uploaded, overwrite Google's Auth URL completely
                if (pData.avatarUrl) {
                    finalUrl = pData.avatarUrl;
                }
                if (pData.username) {
                    finalName = pData.username;
                }
            }
            
            // Correct profile UI strictly with priority check
            updateProfileUI(finalUrl, finalName, isPremiumPlan);
            if (finalUrl) {
                localStorage.setItem('cachedProfilePic', finalUrl);
            } else {
                localStorage.removeItem('cachedProfilePic');
            }
            localStorage.setItem('cachedProfileName', finalName);
        } catch(e) {
            updateProfileUI(user.photoURL, user.displayName || user.email, isPremiumPlan);
        }
        
        const cachedRaw = sessionStorage.getItem('snappy_index_cache');
        if (cachedRaw && (window.performance?.getEntriesByType?.('navigation')?.[0]?.type === 'back_forward' || window.performance?.navigation?.type === 2)) {
            try {
                const cached = JSON.parse(cachedRaw);
                allMovies = cached.movies || [];
                categoryIcons = cached.icons || {};
                renderFromData(cached.movies, cached.settings);
                triggerCinematicEntrance();
                return;
            } catch(e) {}
        }
        fetchData(user);
    });

    async function fetchData(user) {
        try {
            const [moviesSnap, iconsSnap] = await Promise.all([
                get(child(dbRef, `/`)),
                get(child(dbRef, `settings/category_icons`))
            ]);
            if (iconsSnap?.exists()) categoryIcons = iconsSnap.val();
            if (moviesSnap?.exists()) {
                const data = moviesSnap.val();
                allMovies = data.movies ? Object.keys(data.movies).map(k => ({ id: k, ...data.movies[k] })) : [];
                const settings = data.settings || {};
                sessionStorage.setItem('snappy_index_cache', JSON.stringify({ movies: allMovies, settings, icons: categoryIcons }));
                renderFromData(allMovies, settings);
            }
            triggerCinematicEntrance();
        } catch(e) { triggerCinematicEntrance(); console.error(e); }
    }

    function renderFromData(movies, settings) {
        let heroIds = [];
        if (settings.hero_movies && Array.isArray(settings.hero_movies)) heroIds = settings.hero_movies;
        else if (settings.hero_movie_id) heroIds = [settings.hero_movie_id];
        const heroItems = heroIds.map(id => movies.find(x => x.id === id)).filter(Boolean);
        if (heroItems.length > 0) renderHeroSlider(heroItems);
        
        renderRows(movies, settings.category_order || []);
        renderTelegramSection(settings);
    }

    // --- IMMERSIVE REDESIGNED HERO SLIDER ---
    function renderHeroSlider(movies) {
        const container = document.getElementById('hero-slides-container');
        const indicators = document.getElementById('hero-indicators');
        const sliderWrap = document.getElementById('hero-slider');
        
        container.innerHTML = ''; indicators.innerHTML = '';
        indicators.style.display = movies.length > 1 ? 'flex' : 'none';
        
        movies.forEach((m, i) => {
            const isActive = i === 0 ? 'active' : '';
            const titleOrLogo = m.logo_image ? `<img src="${m.logo_image}" class="hero-logo-img" alt="${m.title}">` : `<h1 class="hero-title">${m.title}</h1>`;
            
            const q = getQualityBadge(m);
            let qHtml = '';
            if (q === '4k') qHtml = `<span class="hero-meta-badge hero-meta-quality">4K</span>`;
            else if (q === 'fullhd') qHtml = `<span class="hero-meta-badge hero-meta-quality">Full HD</span>`;
            else if (q === 'hd') qHtml = `<span class="hero-meta-badge hero-meta-quality">HD</span>`;
            
            const ratingHtml = `
                <span class="hero-rating-badge">
                    <i class="fa-solid fa-star" style="color:#f5c518; margin-right:4px;"></i>${m.rating || '8.5'}
                </span>
            `;

            const genreHtml = m.genres ? `<span class="hero-genre-pill">${m.genres.split(',')[0]}</span>` : '';

            container.innerHTML += `
            <div class="hero-slide ${isActive}" id="slide-${i}">
                <img id="hero-img-${i}" src="${m.backdrop || m.poster}" class="hero-img-bg" loading="${i === 0 ? 'eager' : 'lazy'}">
                <div class="hero-vignette"></div>
                <div class="hero-fade"></div>
                <div class="hero-content">
                    <div class="hero-meta-container">
                        <span class="hero-tag-premium-badge">POPULAR</span>
                        ${ratingHtml}
                        ${genreHtml}
                    </div>
                    ${titleOrLogo}
                    <div class="hero-subtitle">${m.description || ''}</div>
                    
                    <div class="hero-actions-container">
                        <button class="btn-hero-play" onclick="window.goToPlayer('${m.id}', '${m.access_level || 'free'}', this)">
                            <i class="fa-solid fa-play"></i> Watch Now
                        </button>
                        <button class="btn-hero-info" onclick="window.goToDetail('${m.id}', '${m.access_level || 'free'}', this)">
                            <i class="fa-solid fa-circle-info"></i> More Info
                        </button>
                    </div>
                </div>
            </div>`;
            indicators.innerHTML += `<div class="indicator ${isActive}" id="ind-${i}"></div>`;
        });
        
        sliderWrap.style.display = 'block';
        document.getElementById('rows-wrapper').classList.remove('no-hero-padding');
        
        if (movies.length > 1) {
            slideInterval = setInterval(() => nextSlide(movies.length), 6000);
            setupSwipe(container, movies.length);
        }
    }

    function nextSlide(total) {
        document.getElementById(`slide-${currentSlide}`).classList.remove('active');
        document.getElementById(`ind-${currentSlide}`).classList.remove('active');
        currentSlide = (currentSlide + 1) % total;
        document.getElementById(`slide-${currentSlide}`).classList.add('active');
        document.getElementById(`ind-${currentSlide}`).classList.add('active');
        
        const currentHeroContent = document.querySelector(`.hero-slide#slide-${currentSlide} .hero-content`);
        if(currentHeroContent) {
            anime({
                targets: currentHeroContent,
                translateY: [20, 0],
                opacity: [0, 1],
                easing: 'easeOutQuart',
                duration: 600
            });
        }
    }

    function setupSwipe(el, total) {
        let startX = 0;
        el.addEventListener('touchstart', e => { startX = e.changedTouches[0].screenX; clearInterval(slideInterval); }, { passive: true });
        el.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].screenX;
            if (startX - endX > 50) nextSlide(total);
            else if (endX - startX > 50) {
                document.getElementById(`slide-${currentSlide}`).classList.remove('active');
                document.getElementById(`ind-${currentSlide}`).classList.remove('active');
                currentSlide = (currentSlide - 1 + total) % total;
                document.getElementById(`slide-${currentSlide}`).classList.add('active');
                document.getElementById(`ind-${currentSlide}`).classList.add('active');
                
                const currentHeroContent = document.querySelector(`.hero-slide#slide-${currentSlide} .hero-content`);
                if(currentHeroContent) {
                    anime({
                        targets: currentHeroContent,
                        translateY: [20, 0],
                        opacity: [0, 1],
                        easing: 'easeOutQuart',
                        duration: 600
                    });
                }
            }
            slideInterval = setInterval(() => nextSlide(total), 6000);
        }, { passive: true });
    }

    function renderRows(data, categoryOrder = []) {
        const wrapper = document.getElementById('rows-wrapper');
        wrapper.innerHTML = '';
        let catGroups = {};
        
        data.forEach(m => { const c = m.category?.trim() || 'Misc'; if (!catGroups[c]) catGroups[c] = []; catGroups[c].push(m); });
        let cats = Object.keys(catGroups);
        cats.sort((a, b) => {
            let iA = categoryOrder.findIndex(c => c.toLowerCase() === a.toLowerCase());
            let iB = categoryOrder.findIndex(c => c.toLowerCase() === b.toLowerCase());
            if (iA !== -1 && iB !== -1) return iA - iB;
            if (iA !== -1) return -1; if (iB !== -1) return 1; return a.localeCompare(b);
        });
        
        cats.forEach(catName => {
            const movies = catGroups[catName];
            movies.sort((a, b) => (a.order ?? 99999) - (b.order ?? 99999));
            const catIconClass = categoryIcons[catName] || "fa-solid fa-layer-group";
            const viewAllHtml = movies.length > 4 ? `<span class="view-all" onclick="window.openViewAll('${catName.replace(/'/g,"\\'")}')">View All <svg class="svg-icon" style="width:10px;height:10px;stroke-width:3" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></span>` : '';
            let rowHtml = `<div class="row-container"><div class="row-header"><h3 class="row-title">${getDynamicIconHtml(catIconClass)} ${catName}</h3>${viewAllHtml}</div><div class="posters-scroll">`;
            
            movies.forEach((m, index) => {
                const badgeHtml = getBadgeHtml(m, index, catName);
                rowHtml += `
                <div class="item-wrapper" onclick="window.goToDetail('${m.id}', '${m.access_level || 'free'}', this)">
                    <div class="poster-card">${badgeHtml}<img src="${m.poster}" class="poster-img" loading="lazy"></div>
                    <div class="item-title">${m.title}</div>
                </div>`;
            });
            rowHtml += `</div></div>`;
            wrapper.innerHTML += rowHtml;
        });
    }

    function renderTelegramSection(settings) {
        const tgLink = settings?.telegram_link || 'https://t.me/z3rovx';
        const wrap = document.getElementById('telegram-section-wrapper');
        wrap.style.display = 'block';
        wrap.innerHTML = `
        <div class="divider-line"></div>
        <div class="section-block">
            <h3 class="tg-title">Stay Updated</h3>
            <p class="tg-desc">Join our official Telegram channel for updates and latest releases!</p>
            <button class="tg-join-btn" style="margin-bottom: 25px;" onclick="let btn=this; setTimeout(() => window.open('${tgLink}','_blank'), 400);">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 26 26">
                    <path d="M2.14753 11.8099C7.3949 9.52374 10.894 8.01654 12.6447 7.28833C17.6435 5.20916 18.6822 4.84799 19.3592 4.83606C19.5081 4.83344 19.8411 4.87034 20.0567 5.04534C20.2388 5.1931 20.2889 5.39271 20.3129 5.5328C20.3369 5.6729 20.3667 5.99204 20.343 6.2414C20.0721 9.08763 18.9 15.9947 18.3037 19.1825C18.0514 20.5314 17.5546 20.9836 17.0736 21.0279C16.0283 21.1241 15.2345 20.3371 14.2221 19.6735C12.6379 18.635 11.7429 17.9885 10.2051 16.9751C8.42795 15.804 9.58001 15.1603 10.5928 14.1084C10.8579 13.8331 15.4635 9.64397 15.5526 9.26395C15.5637 9.21642 15.5741 9.03926 15.4688 8.94571C15.3636 8.85216 15.2083 8.88415 15.0962 8.9096C14.9373 8.94566 12.4064 10.6184 7.50365 13.928C6.78528 14.4212 6.13461 14.6616 5.55163 14.649C4.90893 14.6351 3.67265 14.2856 2.7536 13.9869C1.62635 13.6204 0.730432 13.4267 0.808447 12.8044C0.849081 12.4803 1.29544 12.1488 2.14753 11.8099Z"></path>

                <span>Telegram</span>
            </button>
            
            <footer class="footer-minimal">
                <a href="privacy.html" class="privacy-link-btn">

        </div>`;
    }

    // --- DIRECT REDIRECTION TACTILE DELAY SYSTEMS ---
    window.goToDetail = function(id, accessLevel, element) {
        if (!checkAccess(accessLevel)) { window.location.href = 'subscription.html'; return; }
        if (element) window.popBtn(element);
        setTimeout(() => {
            window.location.href = `detail.html?id=${id}`;
        }, 250);
    };
    window.goToPlayer = function(id, accessLevel, element) {
        if (!checkAccess(accessLevel)) { window.location.href = 'subscription.html'; return; }
        if (element) window.popBtn(element);
        setTimeout(() => {
            window.location.href = `player.html?id=${id}`;
        }, 250);
    };
    function checkAccess(level) {
        if (level === 'any_sub' && userSubPlan === 'free') return false;
        if (level === 'elite' && (userSubPlan === 'free' || userSubPlan === 'starter')) return false;
        if (level === 'supreme' && userSubPlan !== 'supreme') return false;
        return true;
    }

    // ── VIEW ALL OVERLAY SCREEN ──
    window.openViewAll = function(catName) {
        document.getElementById('view-all-screen').classList.add('active');
        document.body.style.overflow = 'hidden';
        const catIconClass = categoryIcons[catName] || "fa-solid fa-folder-open";
        document.getElementById('view-all-title').innerHTML = `${getDynamicIconHtml(catIconClass)} ${catName}`;
        const grid = document.getElementById('view-all-grid');
        grid.innerHTML = '';
        const filtered = allMovies.filter(m => m.category?.trim() === catName);
        filtered.forEach((m, index) => {
            const badgeHtml = getBadgeHtml(m, index, catName);
            grid.innerHTML += `
            <div class="item-wrapper" style="width:100%;" onclick="window.goToDetail('${m.id}', '${m.access_level || 'free'}', this)">
                <div class="poster-card">${badgeHtml}<img src="${m.poster}" class="poster-img" loading="lazy"></div>
                <div class="item-title">${m.title}</div>
            </div>`;
        });
    };
    window.closeViewAll = function() {
        document.getElementById('view-all-screen').classList.remove('remove');
        document.getElementById('view-all-screen').classList.remove('active');
        document.body.style.overflow = '';
    };
</script>
</body>
</html>
