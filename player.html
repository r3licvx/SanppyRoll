<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover">
    
    <!-- Third-Party Domain & Hotlinking Referrer Bypass -->
    <meta name="referrer" content="no-referrer">
    
    <title>SanppyRoll - Watch</title>
    
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root { 
            --accent: #F47521; 
            --bg-main: #0b0b0e;
            --bg-card: #151518;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --anim: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            --bg-glass: rgba(15, 15, 15, 0.65);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, button, input, textarea { font-family: 'SF Pro Display', -apple-system, sans-serif; font-weight: 400; }
        
        body { background: var(--bg-main); color: var(--text-main); overflow-x: hidden; -webkit-font-smoothing: antialiased;}
        #app-container { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; }

        /* --- PLAYER UI --- */
        .player-wrapper {
            position: sticky; top: 0; z-index: 100; width: 100%;
        }
        
        .video-container {
            width: 100%; position: relative; background: #000; 
            overflow: hidden; user-select: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); background-size: cover; background-position: center;
            border-radius: 16px; /* Sleek curved edges in normal mode */
            transition: border-radius var(--anim);
        }

        /* SCROLL FADE GAP */
        .scroll-fader {
            position: absolute; bottom: -30px; left: 0; width: 100%; height: 30px;
            background: linear-gradient(to bottom, var(--bg-main) 0%, transparent 100%);
            pointer-events: none; z-index: 90;
        }
        .video-container:fullscreen ~ .scroll-fader, .video-container:-webkit-full-screen ~ .scroll-fader { display: none; }
        
        @media (max-aspect-ratio: 16/9) {
            .video-container { aspect-ratio: 16/9; }
        }
        @media (min-aspect-ratio: 16/9) {
            .video-container { aspect-ratio: 16/9; }
        }

        /* Force stretch to avoid black notch areas on Chrome/Safari */
        .video-container:fullscreen, .video-container:-webkit-full-screen { 
            width: 100vw; height: 100vh; max-width: none; border-radius: 0 !important; aspect-ratio: auto;
            padding: 0 !important; margin: 0 !important; box-shadow: none !important;
        }
        
        video { 
            width: 100%; height: 100%; display: block; 
            object-fit: contain; /* Starts as Contain */
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), object-fit 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
            background: transparent;
        }
        video:fullscreen, video:-webkit-full-screen { object-fit: contain !important; }
        
        /* Fit Modes */
        video.fit-contain { object-fit: contain; transform: scale(1); }
        video.fit-fill { object-fit: fill; transform: scale(1); }
        video.fit-cover { object-fit: cover; transform: scale(1); }
        video.fit-scale-115 { object-fit: contain; transform: scale(1.15); }
        video.fit-scale-125 { object-fit: contain; transform: scale(1.25); }
        
        .top-header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 20px 25px 40px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            color: #fff; z-index: 10; opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            pointer-events: none; display: flex; align-items: center; justify-content: space-between;
        }
        
        .header-left { display: flex; align-items: center; gap: 15px; flex: 1; overflow: hidden; }
        .back-btn { pointer-events: auto; cursor: pointer; font-size: clamp(14px, 3.5vw, 18px); flex-shrink: 0; transition: color 0.2s;}
        .back-btn:hover { color: var(--accent); }
        .title-wrapper { display: flex; flex-direction: column; overflow: hidden; flex: 1; margin-top: 1px;}
        
        #video-title-text { 
            font-size: clamp(14px, 3vw, 16px); font-weight: 400; letter-spacing: 0.3px; 
            margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.95;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        /* Header logo specific styling */
        .header-logo-container {
            display: block; 
            flex-shrink: 0;
            margin-left: 15px;
            pointer-events: auto;
        }
        .header-logo-img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        
        @media (max-width: 768px) {
            .title-wrapper { display: none; } 
            .top-header { padding: 15px 20px; }
            .header-logo-container {
                display: none;
            }
            .video-container:fullscreen .header-logo-container,
            .video-container:-webkit-full-screen .header-logo-container {
                display: block !important;
            }
        }

        .center-overlay {
            position: absolute; top: 35px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.85); color: #fff; font-size: 13px; font-weight: 400;
            padding: 8px 16px; border-radius: 30px; z-index: 15;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease-in-out;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08); white-space: nowrap; letter-spacing: 0.3px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .center-overlay.active { opacity: 1; }
        .grad-icon { color: var(--accent); display: inline-block; font-size: 12px;}

        @media (max-width: 600px) {
            .center-overlay { font-size: 11px; padding: 6px 12px; top: 20px;}
        }

        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 70px 25px 25px; display: flex; flex-direction: column;
            opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 10;
            background: linear-gradient(to top, var(--bg-main) 0%, rgba(11,11,14,0.8) 30%, transparent 100%);
        }
        .video-container.show-controls .controls,
        .video-container.show-controls .top-header { opacity: 1; visibility: visible; }

        .progress-area { 
            height: 16px; width: 100%; display: flex; align-items: center;
            cursor: pointer; margin-bottom: 12px; position: relative; 
        }
        .progress-visual-bg {
            height: 2px; width: 100%; background: rgba(255,255,255,0.2); 
            position: relative; border-radius: 4px; pointer-events: none;
            transition: height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .video-container.show-controls .progress-visual-bg { height: 2px; }
        .progress-area:hover .progress-visual-bg, .progress-area.dragging .progress-visual-bg { height: 4px; }
        
        .buffer-bar {
            height: 100%; width: 0%; left: 0; background: rgba(255,255,255,0.35); 
            position: absolute; border-radius: 4px; pointer-events: none; transition: width 0.1s linear, left 0.1s linear;
        }
        
        .progress-bar { 
            height: 100%; width: 0%; background: var(--accent); 
            position: absolute; border-radius: 4px; pointer-events: none;
        }
        .progress-bar::after { 
            content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%) scale(0);
            width: 10px; height: 10px; background: #fff; border-radius: 50%; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .progress-area:hover .progress-bar::after, .progress-area.dragging .progress-bar::after { transform: translateY(-50%) scale(1); }

        .drag-time {
            position: absolute; top: -35px; background: rgba(15,15,15,0.9); color: #fff;
            padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 400;
            transform: translateX(-50%); display: none; z-index: 12; pointer-events: none; border: 1px solid rgba(255,255,255,0.1);
        }
        .progress-area.dragging .drag-time { display: block; }

        .mini-timeline {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255,255,255,0.2); z-index: 5;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .mini-progress { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear;}
        
        .video-container:not(.show-controls) .mini-timeline { opacity: 1; visibility: visible; }
        .video-container:fullscreen .mini-timeline, .video-container:-webkit-full-screen .mini-timeline { display: none !important; }
        @media (min-width: 769px) { .mini-timeline { display: none !important; } }

        .buttons { display: flex; align-items: center; justify-content: space-between; color: #fff; }
        .left-btns, .right-btns { display: flex; align-items: center; gap: clamp(10px, 3.5vw, 18px); position: relative; }
        
        .buttons i { cursor: pointer; font-size: clamp(14px, 4vw, 18px); transition: all 0.2s; color: #fff; text-align: center; opacity: 0.85; }
        .buttons i:hover { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .pop-anim { transform: scale(1.15) !important; opacity: 1 !important; transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1) !important; }
        
        .video-container:fullscreen .buttons i, .video-container:-webkit-full-screen .buttons i {
            font-size: clamp(14px, 2.5vw, 16px);
        }

        #prev-btn, #next-btn { font-size: 14px; }
        .time { font-size: clamp(11px, 2.5vw, 13px); font-weight: 400; color: rgba(255,255,255,0.8); margin-left: 5px; font-variant-numeric: tabular-nums;}

        .settings-menu {
            position: absolute; bottom: 50px; right: 0;
            background: var(--bg-glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            padding: 6px; min-width: 110px; max-height: 120px; flex-direction: column;
            z-index: 15; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            overflow-y: auto; overflow-x: hidden;
            visibility: hidden; opacity: 0; transform: translateY(15px) scale(0.95); transform-origin: bottom right;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex;
        }
        .settings-menu.active { visibility: visible; opacity: 1; transform: translateY(0) scale(1); }
        .settings-menu::-webkit-scrollbar { width: 3px; }
        .settings-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
        
        .quality-btn, .audio-btn-item {
            background: transparent; border: none; color: rgba(255,255,255,0.85);
            padding: 8px 12px; text-align: left; font-size: 12px; font-weight: 400; 
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; outline: none;
            border-radius: 8px; margin-bottom: 2px;
        }
        .quality-btn:last-child { margin-bottom: 0; }
        .quality-btn:hover, .audio-btn-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        .quality-btn i.fa-check, .audio-btn-item i.fa-check { font-size: 10px; width: 10px; opacity: 0; color: #fff; transition: 0.2s; }
        .quality-btn.active, .audio-btn-item.active { color: var(--accent); background: rgba(244, 117, 33, 0.1); }
        .quality-btn.active i.fa-check, .audio-btn-item.active i.fa-check { opacity: 1; color: var(--accent); }
        
        .quality-btn.locked-quality { opacity: 0.6; color: rgba(255,255,255,0.5); }
        .quality-btn.locked-quality:hover { background: transparent; opacity: 0.8; }
        .lock-icon-q { display: none; font-size: 10px; color: #FFD700; margin-left: 6px; }
        .quality-btn.locked-quality .lock-icon-q { display: inline-block; }
        .quality-btn.locked-quality i.fa-check { display: none !important; }

        .yt-ripple {
            position: absolute; top: 0; bottom: 0; width: 35%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; opacity: 0; pointer-events: none; z-index: 8;
        }
        .yt-left { left: 0; background: linear-gradient(90deg, rgba(244, 117, 33, 0.1) 0%, transparent 80%); }
        .yt-right { right: 0; background: linear-gradient(270deg, rgba(244, 117, 33, 0.1) 0%, transparent 80%); }
        .ripple-active { animation: cleanFade 0.4s ease forwards; }
        @keyframes cleanFade { 0% { opacity: 0; } 30% { opacity: 1; } 100% { opacity: 0; } }
        .ripple-active i { animation: popArrow 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes popArrow { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); color: var(--accent); } 100% { transform: scale(1); color: #fff; } }
        .yt-ripple i { font-size: 28px; margin-bottom: 8px; opacity: 0.9; }
        .yt-ripple span { font-size: 13px; font-weight: 400; }

        /* --- ADVANCED ROTATING DYNAMIC LOADER --- */
        .loader-wrapper {
            position: absolute; inset: 0;
            z-index: 100; pointer-events: none; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 0.3s;
        }
        
        .loader-content { 
            display: flex; flex-direction: column; align-items: center; gap: 15px; 
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .video-container.show-controls .loader-content {
            transform: translateY(-30px);
        }

        /* Responsive Custom Wave Loader Rules */
        .custom-loader {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 24px;
        }
        .custom-loader span {
            width: 3px;
            background-color: var(--accent);
            border-radius: 4px;
            transform-origin: center;
            animation: spinner-wave 0.9s ease-in-out infinite;
            display: inline-block;
        }
        .custom-loader span:nth-child(1) { height: 10px; animation-delay: 0s; }
        .custom-loader span:nth-child(2) { height: 16px; animation-delay: 0.12s; }
        .custom-loader span:nth-child(3) { height: 22px; animation-delay: 0.24s; }
        .custom-loader span:nth-child(4) { height: 16px; animation-delay: 0.36s; }
        .custom-loader span:nth-child(5) { height: 10px; animation-delay: 0.48s; }

        /* Auto-Sizing Wave Design in Fullscreen Mode */
        .video-container:fullscreen .custom-loader,
        .video-container:-webkit-full-screen .custom-loader {
            gap: 5px;
            height: 43px;
        }
        .video-container:fullscreen .custom-loader span,
        .video-container:-webkit-full-screen .custom-loader span {
            width: 5px;
            border-radius: 6px;
        }
        .video-container:fullscreen .custom-loader span:nth-child(1),
        .video-container:-webkit-full-screen .custom-loader span:nth-child(1) { height: 18px; }
        .video-container:fullscreen .custom-loader span:nth-child(2),
        .video-container:-webkit-full-screen .custom-loader span:nth-child(2) { height: 28px; }
        .video-container:fullscreen .custom-loader span:nth-child(3),
        .video-container:-webkit-full-screen .custom-loader span:nth-child(3) { height: 38px; }
        .video-container:fullscreen .custom-loader span:nth-child(4),
        .video-container:-webkit-full-screen .custom-loader span:nth-child(4) { height: 28px; }
        .video-container:fullscreen .custom-loader span:nth-child(5),
        .video-container:-webkit-full-screen .custom-loader span:nth-child(5) { height: 18px; }

        @keyframes spinner-wave {
            0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; }
        }

        .video-container.loading .loader-wrapper { opacity: 1; visibility: visible; }

        .tap-layer { position: absolute; inset: 0; z-index: 5; cursor: pointer; -webkit-touch-callout: none; user-select: none; }

        #below-content {
            opacity: 0; margin-top: 25px; 
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            flex: 1; display: flex; flex-direction: column;
        }
        #below-content.visible { opacity: 1; transform: translateY(0); }

        .video-info-section { padding: 0 5% 0px; background: var(--bg-main); position: relative; z-index: 2; }
        .yt-title { font-size: clamp(20px, 5vw, 24px); font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 10px; letter-spacing: -0.3px;}
        .yt-desc { font-size: clamp(13px, 3vw, 14px); color: var(--text-muted); line-height: 1.5; font-weight: 400; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 20px;}
        
        .details-section { padding: 0px 5% 10px; background: var(--bg-main); flex: 1; position: relative; z-index: 2;}
        
        .action-row { 
            display: flex; align-items: center; gap: 12px; margin-bottom: 25px; 
            padding-bottom: 0px; border-bottom: none; flex-wrap: wrap;
        }
        .action-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; 
            padding: 8px 16px; border-radius: 25px; font-size: 13px; font-weight: 400; cursor: pointer; 
            display: flex; align-items: center; gap: 8px; transition: all 0.2s; outline: none;
            backdrop-filter: blur(10px);
        }
        .action-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .action-btn:active { transform: scale(0.95); }
        .action-btn i { font-size: 14px; color: var(--accent); }

        .series-container { margin-bottom: 20px; }
        .season-tabs { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); scrollbar-width: none; }
        .season-tabs::-webkit-scrollbar { display: none; }
        .season-btn { background: transparent; border: none; color: var(--text-muted); font-size: 14px; font-weight: 400; cursor: pointer; white-space: nowrap; transition: 0.2s; outline: none; position: relative; padding-bottom: 8px;}
        .season-btn:hover { color: #fff; }
        .season-btn.active { color: #fff; font-weight: 600; }
        .season-btn.active::after { content: ''; position: absolute; left: 0; bottom: -1px; width: 100%; height: 3px; background: var(--accent); border-radius: 3px 3px 0 0; }
        
        #episode-list { display: flex; flex-direction: column; gap: 10px; }
        .ep-card { display: flex; gap: 12px; background: rgba(255, 255, 255, 0.02); padding: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: all 0.2s; align-items: center; }
        .ep-card:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(244, 117, 33, 0.4); }
        .ep-card:active { transform: scale(0.98); }
        
        .ep-thumb { width: 110px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; position: relative; flex-shrink: 0; background: #111; }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; transition: opacity 0.3s; }
        .ep-card:hover .ep-thumb img { opacity: 1; }
        .ep-thumb .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.8); font-size: 20px; transition: all 0.2s; z-index: 2; text-shadow: 0 4px 15px rgba(0,0,0,0.8);}
        .ep-card:hover .play-icon, .ep-card.active-ep .play-icon { color: #fff; transform: translate(-50%, -50%) scale(1.15); }
        
        .ep-info { display: flex; flex-direction: column; justify-content: center; width: 100%; padding-right: 5px;}
        .ep-num { font-size: 10px; color: var(--accent); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; background: rgba(244, 117, 33, 0.15); padding: 3px 8px; border-radius: 6px; width: fit-content;}
        .ep-title { font-size: 13px; font-weight: 400; color: #fff; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .ep-desc { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.5); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .ep-card.active-ep { background: rgba(244, 117, 33, 0.08); border-color: rgba(244, 117, 33, 0.4); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(11,11,14,0.8); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);}
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 800px; height: 85dvh; display: flex; flex-direction: column; position: relative; border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.6); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);}
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .modal-header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-header h3 { font-size: 16px; font-weight: 600; color: #fff; margin:0;}
        .header-actions { display: flex; gap: 15px; align-items: center;}
        .refresh-btn { background: transparent; border: none; color: var(--accent); font-size: 13px; font-weight: 400; cursor: pointer; transition: 0.2s; outline: none;}
        .refresh-btn:active { transform: scale(0.9); }
        .close-modal { background: rgba(255,255,255,0.1); border: none; width: 30px; height: 30px; border-radius: 50%; color: #fff; font-size: 14px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; outline: none;}
        .close-modal:hover { background: rgba(255,255,255,0.2); transform: rotate(90deg); }
        
        .modal-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-x: hidden; }
        .modal-body::-webkit-scrollbar { width: 3px; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        /* --- VISUAL THREAD CONNECTOR STYLING FOR REPLIES --- */
        .comment-box { display: flex; gap: 12px; margin-bottom: 5px; position: relative;}
        
        /* ── ADJUSTED REPLY SPACING AND THREAD LINES ── */
        .comment-box.is-reply {

    function getPlayableUrl(url) {
        if (!url) return "";
        
        // Extract Google Drive ID using 25+ character ID regex
        const driveIdMatch = url.match(/[-\w]{25,}/);
        if (driveIdMatch && (url.includes('drive.google.com') || url.includes('docs.google.com') || url.includes('googleusercontent'))) {
            const driveid = driveIdMatch[0];
            const apiKeys = [
                'AIzaSyCt3DULzE2trDJhfFUosWZT-3GEObbMqVU', 
                'AIzaSyCsbx8BSyLwkw6XX6Lg5OF1U0HNtI9VmCY',

                'AIzaSyCIY6fomcJxOt0XQ_naa1rzfd5wlOMGKDY'
            ];
            const apikey = apiKeys[Math.floor(Math.random() * apiKeys.length)];
            return `https://www.googleapis.com/drive/v3/files/${driveid}?alt=media&key=${apikey}`;
        }
        
        // Rewrite standard heroku proxy link if necessary
        if (url.includes('/watch/')) {

        }
        
        return url;

    // --- DEBOUNCED ROBUST SEEK SYSTEM (KATTAR ENGINE) ---
    function performRobustSkip(delta) {
        if (!vid.duration) return;
        
        if (!isSeekingDebouncing) {
            virtualCurrentTime = vid.currentTime;
            isSeekingDebouncing = true;
            if (intendedPlayState) {
                vid.pause();
                if (hasExtAudio) extAud.pause();
            }
        }
        
        virtualCurrentTime = Math.max(0, Math.min(vid.duration, virtualCurrentTime + delta));
        
        const pct = (virtualCurrentTime / vid.duration) * 100;
        pBar.style.width = pct + "%";
        miniProg.style.width = pct + "%";
        document.getElementById("curr").innerText = fmt(virtualCurrentTime);
        
        // Quietly stop current chunk fetches to prevent server requests pile-up
        if (hls) {
            hls.stopLoad();
        }
        if (hlsAudio) {
            hlsAudio.stopLoad();
        }

        clearTimeout(seekDebounceTimeout);
        player.classList.add('loading');
        
        seekDebounceTimeout = setTimeout(() => {
            // Re-enable and request fresh seek range chunks from third-party server
            if (hls) {
                hls.startLoad();
            }
            if (hlsAudio) {
                hlsAudio.startLoad();
            }
            vid.currentTime = virtualCurrentTime;
            if (hasExtAudio && !isNaN(extAud.duration)) {
                extAud.currentTime = virtualCurrentTime;
            }
            isSeekingDebouncing = false;
        }, 200);
    }

    async function checkAndResumeProgress() {
        if(!currentUser) return;
        const epKey = (sIdx !== null && eIdx !== null) ? `s${sIdx}_e${eIdx}` : 'movie';
        const localKey = `nexstream_prog_${currentUser.uid}_${movieId}_${epKey}`;

        const dbPath = (sIdx !== null && eIdx !== null) ? `users/${currentUser.uid}/progress/${movieId}/s${sIdx}_e${eIdx}` : `users/${currentUser.uid}/progress/${movieId}`;
        try {
            const snap = await get(child(dbRef, dbPath));
            if (snap.exists()) {
                const fbData = snap.val();
                if (fbData.time > 0) targetTime = fbData.time; 
            } else {
                localStorage.removeItem(localKey);
            }
        } catch(err) {}
        
        if(targetTime === 0) { 
            try {
                const localData = JSON.parse(localStorage.getItem(localKey));
                if (localData && localData.time > 0) targetTime = localData.time;
            } catch(e) {}
        }
        
        if (targetTime > 0) {
            targetResumeTime = targetTime; 
            if(vid.readyState > 0) {
                vid.currentTime = targetTime;
                if(hasExtAudio) extAud.currentTime = targetTime;
                savedTimeLoaded = true;
                if(intendedPlayState) doPlay();
            } else {
                vid.addEventListener('loadedmetadata', () => {
                    if(!savedTimeLoaded) {
                        vid.currentTime = targetTime;
                        if(hasExtAudio) extAud.currentTime = targetTime;
                        savedTimeLoaded = true;
                        if(intendedPlayState) doPlay();
                    }
                }, {once: true});
            }
        }
    }

    async function fetchVideoData() {

                currentMovieData = snap.val();

                                let maxTime = -1;
                                for(let k in pData) {

                                        let parts = k.split('_');

                let allM = [];
                snap.forEach(c => { if(c.key !== movieId) allM.push({id: c.key, ...c.val()}) });
                
                let recs = allM.filter(m => {
                    if (currentTags && currentTags.length > 0 && m.tags) {
                        let mTags = Array.isArray(m.tags) ? m.tags : (typeof m.tags === 'string' ? m.tags.split(',').map(t=>t.trim()) : []);
                        let match = currentTags.some(cTag => mTags.some(mTag => mTag.toLowerCase() === cTag.toLowerCase()));

                if (recs.length > 0) {

            }

    async function loadAudio(url, startTime = 0) {
        isAudBuffering = false; isMediaError = false; audError = false; 

        // Direct Stream Proxy routing
        url = getPlayableUrl(url);

        if(hlsAudio) { hlsAudio.destroy(); hlsAudio = null; }
        extAud.pause();
        extAud.removeAttribute('src');

        const isM3U8 = url.toLowerCase().includes('.m3u8') || url.toLowerCase().includes('m3u8') || url.includes('desidubanime');
        const isAppleNative = extAud.canPlayType('application/vnd.apple.mpegurl');

        if (Hls.isSupported() && !isAppleNative && isM3U8) {
            hlsAudio = new Hls({ 
                startPosition: startTime,
                enableWorker: true,
                lowLatencyMode: true,
                xhrSetup: function (xhr, url) {
                    xhr.withCredentials = false;
                }
            });
            hlsAudio.loadSource(url);
            hlsAudio.attachMedia(extAud);
            hlsAudio.on(Hls.Events.MANIFEST_PARSED, function () {
                extAud.currentTime = startTime;
            });
            hlsAudio.on(Hls.Events.ERROR, function(event, data) {
                if(data.fatal) {
                    console.error("Audio HLS failed, trying native...", data);
                    extAud.src = url; 
                    extAud.currentTime = startTime;
                }
            });
        } else {
            extAud.src = url;
            extAud.load();
            extAud.addEventListener('loadeddata', () => { extAud.currentTime = startTime; }, {once: true});
        }
    }

    async function loadVideo(url, startTime = 0) {
        isVidBuffering = false; isMediaError = false; vidError = false; 
        player.classList.add('loading');

        // Direct Stream Proxy routing
        url = getPlayableUrl(url);

        targetResumeTime = startTime; 
        document.getElementById("curr").innerText = fmt(startTime);
        if (vid.duration) pBar.style.width = `${(startTime / vid.duration) * 100}%`;
        
        vid.pause();
        if(hasExtAudio) {
            extAud.pause();
            extAud.currentTime = startTime; 
        }

        const isM3U8 = url.toLowerCase().includes('.m3u8') || url.toLowerCase().includes('m3u8');
        const isAppleNative = vid.canPlayType('application/vnd.apple.mpegurl');
        const isMkv = url.toLowerCase().includes('.mkv') || url.toLowerCase().includes('mkv');

        const playNative = (vidUrl, time) => {
            if(hls) { hls.destroy(); hls = null; }
            vid.preload = "auto";
            
            while (vid.firstChild) {
                vid.removeChild(vid.firstChild);
            }

            if (isMkv) {
                vid.removeAttribute('src');
                
                const s1 = document.createElement('source');
                s1.src = vidUrl;
                s1.type = 'video/webm';
                vid.appendChild(s1);
                
                const s2 = document.createElement('source');
                s2.src = vidUrl;
                s2.type = 'video/mp4';
                vid.appendChild(s2);

                const s3 = document.createElement('source');
                s3.src = vidUrl;
                s3.type = 'video/x-matroska';
                vid.appendChild(s3);

                const s4 = document.createElement('source');
                s4.src = vidUrl;
                s4.type = 'video/mkv';
                vid.appendChild(s4);
                
                vid.load();
            } else {
                vid.removeAttribute('src');
                vid.src = vidUrl;
            }
            
            vid.addEventListener('loadeddata', () => {
                let calculatedStartTime = (time === 0) ? 0.1 : time;
                vid.currentTime = calculatedStartTime; 
                if(hasExtAudio) extAud.currentTime = calculatedStartTime;
                vid.style.backgroundImage = 'none';
                if(intendedPlayState) doPlay(); else player.classList.remove('loading'); 
                
                if (vid.audioTracks && vid.audioTracks.length > 1 && !hasExtAudio) {
                    let aHtml = '';
                    for (let i = 0; i < vid.audioTracks.length; i++) {
                        let track = vid.audioTracks[i];
                        let lbl = track.language || track.label || `Track ${i + 1}`;
                        aHtml += `<button class="quality-btn ${track.enabled ? 'active' : ''}" data-native-idx="${i}"><i class="fa-solid fa-check"></i> ${lbl}</button>`;
                    }
                    audioMenu.innerHTML = aHtml;
                    audioBtn.style.display = 'inline-block';
                    
                    audioMenu.querySelectorAll('.quality-btn').forEach(btn => {
                        btn.onclick = (e) => {
                            e.stopPropagation(); popBtn(btn);
                            let idx = parseInt(btn.getAttribute('data-native-idx'));
                            for(let j=0; j<vid.audioTracks.length; j++) {
                                vid.audioTracks[j].enabled = (j === idx);
                            }
                            audioMenu.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            audioMenu.classList.remove('active');
                            showToast("Audio track switched");
                        };
                    });
                }
            }, {once: true}); 

            vid.addEventListener('error', (e) => {
                console.error("Native Video Load Error", e);
                if (vidUrl.startsWith('http://')) {
                    const fallbackUrl = vidUrl.replace('http://', 'https://');
                    console.log("Native Load Error fallback to HTTPS:", fallbackUrl);
                    playNative(fallbackUrl, time);
                } else if (vidUrl.startsWith('https://')) {
                    const fallbackUrl = vidUrl.replace('https://', 'http://');
                    console.log("Native Load Error fallback to HTTP:", fallbackUrl);
                    playNative(fallbackUrl, time);
                } else if (isMkv) {
                    showToast("MKV playback requires Chrome, Edge or Opera.");
                    isMediaError = true;
                    updateBufferingUI();
                } else if (Hls.isSupported() && !isM3U8) {
                    playHls(vidUrl, time);
                } else {
                    isMediaError = true;
                    updateBufferingUI();
                }
            }, {once: true});
        };

        const playHls = (vidUrl, time) => {
            if(hls) { hls.destroy(); hls = null; }
            hls = new Hls({ 
                startPosition: time,
                maxBufferLength: 30, 
                maxMaxBufferLength: 60,
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 15,
                fragLoadingMaxRetry: 5,
                manifestLoadingMaxRetry: 5,
                xhrSetup: function (xhr, url) {
                    xhr.withCredentials = false;
                }
            }); 
            hls.loadSource(vidUrl); hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, function () { 
                let calculatedStartTime = (time === 0) ? 0.1 : time;
                vid.currentTime = calculatedStartTime; 
                if(hasExtAudio) extAud.currentTime = calculatedStartTime; 
                vid.style.backgroundImage = 'none';
                if(intendedPlayState) doPlay(); else player.classList.remove('loading'); 
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.error("HLS Error encountered", data);
                    if (vidUrl.startsWith('http://')) {
                        const fallbackUrl = vidUrl.replace('http://', 'https://');
                        console.log("HLS Fatal error fallback to HTTPS:", fallbackUrl);
                        playHls(fallbackUrl, time);
                    } else if (vidUrl.startsWith('https://')) {
                        const fallbackUrl = vidUrl.replace('https://', 'http://');
                        console.log("HLS Fatal error fallback to HTTP:", fallbackUrl);
                        playHls(fallbackUrl, time);
                    } else if (isM3U8) {
                        playNative(vidUrl, time);
                    } else {
                        hls.recoverMediaError();
                    }
                }
            });
        };
        
        if (Hls.isSupported() && isM3U8) {
            playHls(url, targetResumeTime);
        } else if (isAppleNative && isM3U8) {
            playNative(url, targetResumeTime);
        } else {
            playNative(url, targetResumeTime);
        }
    }

    // DIRECT STREAM & COMPACT SYNC PLAYBACK LOGIC - NO INFINITE DOWNLOADING LOOPS
    async function doPlay() {
        intendedPlayState = true;
        isVidBuffering = true; updateBufferingUI();
        try {
            if (hasExtAudio) {
                if (Math.abs(vid.currentTime - extAud.currentTime) > 0.15) {
                    extAud.currentTime = vid.currentTime;
                }
                await Promise.all([vid.play(), extAud.play()]);
            } else {
                await vid.play();
            }
            isVidBuffering = false;
            isAudBuffering = false;
            updateBufferingUI();
            resetHideTimer();
            vid.style.backgroundImage = 'none';
        } catch (e) {
            intendedPlayState = false;
            vid.pause(); if(hasExtAudio) extAud.pause();
            player.classList.add("show-controls"); player.classList.remove("loading");
            showMsg("Tap to Play");
        }
    }

    function doPause() {
        intendedPlayState = false;
        vid.pause(); if(hasExtAudio) extAud.pause();
        player.classList.add("show-controls");
        clearTimeout(hideTimer);
    }

    const tryResumeSync = async () => { 
        if (intendedPlayState) {
            if (hasExtAudio) {
                // Check readyState >= 2 (HAVE_CURRENT_DATA) for instant responsive sync
                if (vid.readyState >= 2 && extAud.readyState >= 2) {
                    isVidBuffering = false; isAudBuffering = false; updateBufferingUI();
                    if (Math.abs(vid.currentTime - extAud.currentTime) > 0.15) extAud.currentTime = vid.currentTime;
                    try { await Promise.all([vid.play(), extAud.play()]); } catch(e){}
                } else if (vid.readyState >= 2 && extAud.readyState < 2) {
                    isAudBuffering = true; updateBufferingUI(); vid.pause();
                } else if (extAud.readyState >= 2 && vid.readyState < 2) {
                    isVidBuffering = true; updateBufferingUI(); extAud.pause();
                }
            } else {
                if (vid.readyState >= 2) {
                    isVidBuffering = false; updateBufferingUI();
                    try { await vid.play(); } catch(e){}
                }
            }
        } 
    };
    
    vid.addEventListener('canplay', tryResumeSync); extAud.addEventListener('canplay', tryResumeSync);
    
    vid.addEventListener('waiting', () => { 
        intendedPlayState = true; 
        isVidBuffering = true; updateBufferingUI();
        if(hasExtAudio && !isAudBuffering) extAud.pause(); 
    });
    
    extAud.addEventListener('waiting', () => { 
        intendedPlayState = true; 
        isAudBuffering = true; updateBufferingUI();
        if(!isVidBuffering) vid.pause(); 
    });
    
    vid.addEventListener('playing', () => { 
        clearTimeout(loadingTimeout); 
        if (hasExtAudio && extAud.readyState < 2) { 
            vid.pause(); isAudBuffering = true; updateBufferingUI(); return;
        }
        isVidBuffering = false; isAudBuffering = false; isMediaError = false; 
        updateBufferingUI();
        player.classList.remove("loading");
        if(hasExtAudio && intendedPlayState && !extAud.paused) {
            if(Math.abs(vid.currentTime - extAud.currentTime) > 0.15) extAud.currentTime = vid.currentTime;
        }
    });

    extAud.addEventListener('playing', () => {
        if (vid.readyState < 2) {
            extAud.pause(); isVidBuffering = true; updateBufferingUI(); return;
        }
        isVidBuffering = false; isAudBuffering = false; isMediaError = false; 
        updateBufferingUI();
        player.classList.remove("loading");
    });
    
    vid.addEventListener('ratechange', () => { if(hasExtAudio) extAud.playbackRate = vid.playbackRate; });
    vid.onended = () => { 
        intendedPlayState = false; player.classList.add("show-controls"); 
        if(nextEpisodeData) setTimeout(() => { if(nextBtn) nextBtn.click(); }, 2000); 
    };
    playBtn.onclick = (e) => { popBtn(e.currentTarget); if(vid.paused || !intendedPlayState) doPlay(); else doPause(); };

    function isQualityAllowed(src) {
        if (!src) return true;
        if (src.req_plan) {
            const plans = { 'free': 0, 'starter': 1, 'elite': 2, 'supreme': 3 };
            const userLvl = plans[userSubPlan] || 0;
            const reqLvl = plans[src.req_plan] || 0;
            return userLvl >= reqLvl;
        }
        const l = (src.label || '').toLowerCase();
        if (l.includes('4k') || l.includes('2160') || l.includes('ultra')) return (userSubPlan === 'supreme');
        if (l.includes('1080') || l.includes('fhd')) return (userSubPlan === 'elite' || userSubPlan === 'supreme');
        return true; 
    }

    let lastLoggedTime = -1;
    let silentStallTimer = 0;
    setInterval(() => {
        if (intendedPlayState && !vid.paused && !isDragging && !isSeekingDebouncing) {
            if (vid.currentTime === lastLoggedTime) {
                silentStallTimer++;
                if (silentStallTimer >= 2) {
                    console.log("Playhead stall detected, trigger stream nudge.");
                    if (hls) {
                        hls.recoverMediaError();
                    } else {
                        vid.currentTime = vid.currentTime + 0.1;
                    }
                    silentStallTimer = 0;
                }
            } else {
                silentStallTimer = 0;
            }
            lastLoggedTime = vid.currentTime;
        }
    }, 1000);

    function setupManualQualityMenu() {
        upgradeOverlay.classList.remove('active');

        if (videoSources.length <= 1) { 
            settingsBtn.style.display = 'none'; qualityMenu.innerHTML = ''; 
            if (videoSources.length === 1 && !isQualityAllowed(videoSources[0])) {
                player.classList.remove('loading');
                upgradeMsgText.innerText = `Upgrade for ${videoSources[0].label}`;
                upgradeOverlay.classList.add('active');
                return;
            }
            loadVideo(videoSources[0].url, savedTimeLoaded ? vid.currentTime : 0); return; 
        }
        
        settingsBtn.style.display = 'inline-block';
        
        let defaultIdx = 0; 
        if (savedQualityPref) {
            let foundIdx = videoSources.findIndex(s => s.label === savedQualityPref && isQualityAllowed(s));
            if (foundIdx !== -1) defaultIdx = foundIdx;
            else {
                defaultIdx = videoSources.findIndex(s => isQualityAllowed(s));
                if (defaultIdx === -1) defaultIdx = 0;
            }
        } else {
            defaultIdx = videoSources.findIndex(s => isQualityAllowed(s));
            if (defaultIdx === -1) defaultIdx = 0;
        }

        let html = '';
        videoSources.forEach((src, i) => {
            const locked = !isQualityAllowed(src);
            html += `<button class="quality-btn ${defaultIdx === i ? 'active' : ''} ${locked ? 'locked-quality' : ''}" data-index="${i}" data-locked="${locked}">
                <i class="fa-solid fa-check"></i> 
                <span>${src.label}</span> 
                <i class="fa-solid fa-lock lock-icon-q"></i>
            </button>`;
        });
        qualityMenu.innerHTML = html;
        
        document.querySelectorAll('.quality-btn').forEach(btn => {
            btn.onclick = (e) => {
                e.stopPropagation(); popBtn(btn);
                const isLocked = btn.getAttribute('data-locked') === 'true';
                const idx = parseInt(btn.getAttribute('data-index'));
                
                if (isLocked) {
                    vid.pause();
                    if(hasExtAudio) extAud.pause();
                    player.classList.remove('loading');
                    upgradeMsgText.innerText = `Upgrade for ${videoSources[idx].label}`;
                    upgradeOverlay.classList.add('active');
                    qualityMenu.classList.remove('active');
                    setTimeout(() => { window.location.href = 'subscription.html'; }, 2000);
                    return;
                }
                
                if(btn.classList.contains('active')) return; 
                document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
                
                let timeToSave = vid.currentTime;
                if (timeToSave === 0 && targetResumeTime > 0) timeToSave = targetResumeTime;
                targetResumeTime = timeToSave; 
                
                const qualityLabel = videoSources[idx].label;
                savedQualityPref = qualityLabel; 
                if(currentUser) update(ref(db, `users/${currentUser.uid}/settings`), { quality: qualityLabel });
                
                loadVideo(videoSources[idx].url, targetResumeTime); 
                showQualityMsg(videoSources[idx].label + " Selected");
                qualityMenu.classList.remove('active');
            };
        });

        if (!isQualityAllowed(videoSources[defaultIdx])) {
            player.classList.remove('loading');
            upgradeMsgText.innerText = `Upgrade for ${videoSources[defaultIdx].label}`;
            upgradeOverlay.classList.add('active');
            const fallback = videoSources.findIndex(s => isQualityAllowed(s));
            if (fallback !== -1) {
                loadVideo(videoSources[fallback].url, savedTimeLoaded ? vid.currentTime : 0);
            }
        } else {
            loadVideo(videoSources[defaultIdx].url, savedTimeLoaded ? vid.currentTime : 0); 
        }
    }

    function setupAudioMenu() {

        if (savedAudioPref) {
            let foundIdx = audioSources.findIndex(a => a.label === savedAudioPref);
            if (foundIdx !== -1) defaultIdx = foundIdx;
        }
        
        loadAudio(audioSources[defaultIdx].url, 0);
        vid.muted = true; extAud.muted = false; updateTitle(audioSources[defaultIdx].label);

        audioBtn.style.display = 'inline-block';
        
        let html = '';

        audioMenu.innerHTML = html;
        
        document.querySelectorAll('#audio-menu .audio-btn-item').forEach(btn => {
            btn.onclick = (e) => {

                document.querySelectorAll('#audio-menu .audio-btn-item').forEach(b => b.classList.remove('active')); btn.classList.add('active');
                
                const idx = parseInt(btn.getAttribute('data-index'));
                targetResumeTime = vid.currentTime;
                const audioLabel = audioSources[idx].label;
                savedAudioPref = audioLabel; 
                if(currentUser) update(ref(db, `users/${currentUser.uid}/settings`), { audio: audioLabel });
                
                player.classList.add('loading'); vid.pause(); if(hasExtAudio) extAud.pause();

                setTimeout(() => { 
                    vid.currentTime = extAud.currentTime || targetResumeTime; 
                    if(intendedPlayState) doPlay(); else player.classList.remove('loading'); 
                }, 1500);
                
                audioMenu.classList.remove('active');
            };
        });

    function toggleMenu(menuEl, btnEl) {
        const act = menuEl.classList.contains('active'); 
        qualityMenu.classList.remove('active'); audioMenu.classList.remove('active');
        if(!act) menuEl.classList.add('active');
    }
    settingsBtn.onclick = (e) => { e.stopPropagation(); popBtn(settingsBtn); toggleMenu(qualityMenu, settingsBtn); };
    audioBtn.onclick = (e) => { e.stopPropagation(); popBtn(audioBtn); toggleMenu(audioMenu, audioBtn); };
    document.addEventListener('click', (e) => { if (!e.target.closest('.right-btns')) { qualityMenu.classList.remove('active'); audioMenu.classList.remove('active'); }});

    let holdTimer, isHolding = false, justFinishedAction = false, controlsHiddenByHold = false;
    const startHold = (e) => { 
        if(e.touches && e.touches.length > 1) return; 
        holdTimer = setTimeout(() => { 
            isHolding = true; 
            vid.playbackRate = 2; 
            if(hasExtAudio) extAud.playbackRate = 2;
            speedOverlay.classList.add('active'); 
            qMsgOverlay.classList.remove('active');
            
            if (player.classList.contains('show-controls')) {
                player.classList.remove('show-controls');
                controlsHiddenByHold = true;
            }
        }, 400); 
    };
    
    const endHold = () => { 
        clearTimeout(holdTimer); 
        if(isHolding) { 
            isHolding = false; justFinishedAction = true; 
            vid.playbackRate = 1; 
            if(hasExtAudio) extAud.playbackRate = 1;
            speedOverlay.classList.remove('active'); 
            
            if(controlsHiddenByHold) {
                player.classList.add('show-controls');
                resetHideTimer();
                controlsHiddenByHold = false;
            }
            setTimeout(() => justFinishedAction = false, 150); 
        }
    };
    
    tapLayer.addEventListener('touchstart', (e) => { if(e.touches.length > 1) return; startHold(e); }, {passive: true}); tapLayer.addEventListener('touchend', endHold);
    tapLayer.addEventListener('touchcancel', endHold); tapLayer.addEventListener('mousedown', startHold); window.addEventListener('mouseup', endHold);
    
    let tapTimer = null, tapCount = 0, lastTapTime = 0, skipResetTimer = null;
    tapLayer.onclick = (e) => {
        qualityMenu.classList.remove('active'); audioMenu.classList.remove('active');
        if(justFinishedAction) return; 
        const now = Date.now(); if (now - lastTapTime > 300) tapCount = 0; lastTapTime = now; tapCount++;
        const rect = tapLayer.getBoundingClientRect(), clickX = e.clientX - rect.left, isRight = clickX > rect.width / 2;
        
        if (tapCount === 1) { 
            tapTimer = setTimeout(() => { 
                tapCount = 0; 
                player.classList.toggle("show-controls"); 
                if (!vid.paused && player.classList.contains("show-controls")) resetHideTimer(); 
            }, 250); 
        } else {
            clearTimeout(tapTimer); 
            
            if (isRight) { 
                performRobustSkip(10); 
                triggerRipple("skip-r"); 
            } else { 
                performRobustSkip(-10);

        const diff = Date.now() - ms;
        const mins = Math.floor(diff / 60000);
        const hrs = Math.floor(mins / 60);
        if (mins < 1) return "Just now";
        if (mins < 60) return `${mins} min ago`;
        if (hrs < 24) return `${hrs} hr ago`;
        const days = Math.floor(hrs / 24);
        if (days === 1) return `1 day ago`;
        return new Date(ms).toLocaleDateString();
    }

                                    ${rTextHtml}
                                    <div class="c-actions">
                                        <button class="c-action-btn ${rHasLiked ? 'liked-by-me' : ''}" onclick="toggleLike('${r.id}')" style="${rHasLiked ? 'color: var(--accent); opacity: 1;' : ''}">
                                            <i class="${rHasLiked ? 'fa-solid' : 'fa-regular'} fa-thumbs-up"></i> <span>${rLikeCount > 0 ? rLikeCount : ''}</span>
                                        </button>
                                        <button class="c-action-btn" onclick="replyTo('${rCleanName}', '${r.uid}', '${p.id}')"><i class="fa-solid fa-reply"></i> Reply</button>
                                        ${rPinBtnHtml}
                                        ${rIsOwner || (currentUser && currentUser.email === 'z3ro.vx@mail.ru') ? `<button class="c-action-btn delete-btn" onclick="deleteComment('${r.id}')"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                    </div>
                                </div>
                            </div>`;

                            if (idx < 3) {
                                repliesHtml += singleReplyHtml;
                            } else {
                                extraRepliesHtml += singleReplyHtml;
                            }
                        });
                    }

                    html += `
                    <div class="comment-box" id="comment-${p.id}" style="opacity: 0; display: flex; flex-direction: column; gap: 8px;">
                        <div style="display: flex; gap: 12px; width: 100%;">
                            ${imgAvatarHtml}
                            <div class="c-content" style="margin-left: 4px;">
                                ${pinIndicator}
                                <div class="c-name" onclick="openProfilePopup('${p.uid}')">@${cleanCurrentName} ${verifiedHtml}<span class="c-time">${timeAgo(p.timestamp)}</span></div>
                                ${textHtml}
                                <div class="c-actions">
                                    <button class="c-action-btn ${hasLiked ? 'liked-by-me' : ''}" onclick="toggleLike('${p.id}')" style="${hasLiked ? 'color: var(--accent); opacity: 1;' : ''}">
                                        <i class="${hasLiked ? 'fa-solid' : 'fa-regular'} fa-thumbs-up"></i> <span>${likeCount > 0 ? likeCount : ''}</span>
                                    </button>
                                    <button class="c-action-btn" onclick="replyTo('${cleanCurrentName}', '${p.uid}', '${p.id}')"><i class="fa-solid fa-reply"></i> Reply</button>
                                    ${pinBtnHtml}
                                    ${isOwner || (currentUser && currentUser.email === 'z3ro.vx@mail.ru') ? `<button class="c-action-btn delete-btn" onclick="deleteComment('${p.id}')"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                                </div>
                            </div>
                        </div>
                        
                        <div class="replies-thread-container" style="display: flex; flex-direction: column; width: 100%;">
                            ${repliesHtml}
                            
                            ${p.childrenReplies.length > 3 ? `
                                <div class="extra-replies" id="extra-replies-${p.id}" style="display: none; width: 100%;">
                                    ${extraRepliesHtml}
                                </div>
                                <button class="c-action-btn" id="replies-btn-${p.id}" onclick="toggleRepliesVisibility('${p.id}')" style="margin-left: 45px; margin-top: 6px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 6px; width: max-content;">
                                    <i class="fa-solid fa-chevron-down"></i> View ${p.childrenReplies.length - 3} more replies
                                </button>
                            ` : ''}
                        </div>
                    </div>`;
                });
                listEl.innerHTML = html;
                
                if (typeof anime !== 'undefined') {
                    anime({
                        targets: '.comment-box',
                        translateY: [40, 0],
                        opacity: [0, 1],
                        filter: ['blur(10px)', 'blur(0px)'],
                        delay: anime.stagger(80), 
                        easing: 'easeOutQuint',
                        duration: 600
                    });
                }
                
            } else {
                listEl.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 14px; margin-top: 40px;">No comments yet. Be the first!</div>';
            }
        } catch(e) {
            console.error(e);
            listEl.innerHTML = '<div style="text-align: center; color: #ff453a; font-size: 14px; margin-top: 40px;">Error loading data engine.</div>';
        }
    }

    window.postComment = async function() {
        if(!currentUser) { showToast("Login to comment!"); return; }
        const input = document.getElementById('new-comment-text');
        const text = input.value.trim();
        
        if(!text) { showToast("Write something first!"); return; }
        
        let replyUid = null;
        let replyName = null;
        
        if (currentReplyToUid && text.startsWith(`@${currentReplyToName}`)) {
            replyUid = currentReplyToUid;
            replyName = currentReplyToName;
        }
        
        const reviewId = 'rev_' + Date.now();
        const reviewData = { 
            uid: currentUser.uid, 
            name: currentUserProfile.username || currentUser.displayName || currentUser.email.split('@')[0], 
            text: text, 
            timestamp: Date.now(),
            isVerified: (userSubPlan && userSubPlan !== 'free') ? true : false
        };
        
        if(replyUid) {
            reviewData.replyToUid = replyUid;
            reviewData.replyToName = replyName;
        }
        
        const activeAvatar = currentUserProfile.avatarUrl || currentUser.photoURL || "";
        if(activeAvatar) {
            reviewData.photoURL = activeAvatar;
        }

        let cleanCurrentName = reviewData.name.replace(/\s+/g, '');
        let textStr = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        if (replyUid && replyName) {
            let rRegex = new RegExp(`@${replyName}`, 'i');
            textStr = textStr.replace(rRegex, `<span style="color: var(--accent); font-weight: 600;">@${replyName}</span>`);
        }
        
        let verifiedHtml = reviewData.isVerified ? `<span class="verified-tick" title="Subscribed"><i class="fa-solid fa-check"></i></span>` : '';
        let imgAvatarHtml = '';
        if(activeAvatar) {
            imgAvatarHtml = `<div class="c-avatar-wrapper" onclick="openProfilePopup('${currentUser.uid}')" style="width: 36px; height: 36px; border-radius: 50%; overflow: hidden; position: relative; flex-shrink: 0; border: 1.5px solid var(--accent); background: #1a1a1a; cursor: pointer;">
                <img src="${activeAvatar}" class="c-avatar" style="width:100%; height:100%; object-fit: cover;" referrerpolicy="no-referrer">
            </div>`;
        } else {
            imgAvatarHtml = `<div class="c-avatar-wrapper" onclick="openProfilePopup('${currentUser.uid}')" style="width: 36px; height: 36px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--accent), #e00073); color: #fff; font-size: 14px; font-weight: 800; flex-shrink: 0; border: 1.5px solid var(--accent); cursor: pointer;">
                ${reviewData.name.charAt(0).toUpperCase()}
            </div>`;
        }

        let replyClass = replyUid ? 'is-reply' : '';
        let targetParentIdForNewReplyBtn = replyUid ? currentReplyToParentId : reviewId;
        
        let optCommentHtml = `
        <div class="comment-box ${replyClass}" id="comment-${reviewId}" style="opacity: 1;">
            ${imgAvatarHtml}
            <div class="c-content" style="margin-left: 4px;">
                <div class="c-name" onclick="openProfilePopup('${currentUser.uid}')">@${cleanCurrentName} ${verifiedHtml}<span class="c-time">Just now</span></div>
                <div class="c-text">${textStr}</div>
                <div class="c-actions">
                    <button class="c-action-btn" onclick="toggleLike('${reviewId}')">
                        <i class="fa-regular fa-thumbs-up"></i> <span></span>
                    </button>
                    <button class="c-action-btn" onclick="replyTo('${cleanCurrentName}', '${currentUser.uid}', '${targetParentIdForNewReplyBtn}')"><i class="fa-solid fa-reply"></i> Reply</button>
                    <button class="c-action-btn delete-btn" onclick="deleteComment('${reviewId}')"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        </div>`;

        const listEl = document.getElementById('comments-list');
        if (listEl.innerHTML.includes('No comments yet')) {
            listEl.innerHTML = '';
        }

        if (replyUid && currentReplyToParentId) {
            const parentThread = document.getElementById(`comment-${currentReplyToParentId}`);
            if (parentThread) {
                const threadCont = parentThread.querySelector('.replies-thread-container');
                if (threadCont) {
                    threadCont.insertAdjacentHTML('beforeend', optCommentHtml);
                } else {
                    listEl.insertAdjacentHTML('afterbegin', optCommentHtml);
                }
            } else {
                listEl.insertAdjacentHTML('afterbegin', optCommentHtml);
            }
        } else {
            const firstChild = listEl.querySelector('.comment-box');
            if (firstChild) {
                firstChild.insertAdjacentHTML('beforebegin', optCommentHtml);
            } else {
                listEl.insertAdjacentHTML('afterbegin', optCommentHtml);
            }
        }

        input.value = ''; 
        currentReplyToUid = null;
        currentReplyToName = "";
        currentReplyToParentId = null;

        try { 
            const commentPath = (sIdx !== null && eIdx !== null) ? `reviews/${movieId}_s${sIdx}_e${eIdx}/${reviewId}` : `reviews/${movieId}/${reviewId}`;
            await set(ref(db, commentPath), reviewData); 
        } catch(e) { 
            showToast("Error posting comment."); 
            loadComments();
        }
    }
    
    document.getElementById('new-comment-text').addEventListener('keypress', (e) => { if(e.key === 'Enter') postComment(); });

    let _pendingDeleteId = null;
    window.deleteComment = function(revId) {
        _pendingDeleteId = revId;
        document.getElementById('del-modal').classList.add('active');
    }
    function _closeDelModal() {
        document.getElementById('del-modal').classList.remove('active');
        _pendingDeleteId = null;
    }
    document.getElementById('del-modal-cancel').onclick = _closeDelModal;
    document.getElementById('del-modal').addEventListener('click', function(e) {
        if (e.target === this) _closeDelModal();
    });

    document.getElementById('del-modal-confirm').onclick = async function() {
        if (!_pendingDeleteId) return;
        const revId = _pendingDeleteId;
        _closeDelModal();
        
        const commentPath = (sIdx !== null && eIdx !== null)
            ? `reviews/${movieId}_s${sIdx}_e${eIdx}/${revId}`
            : `reviews/${movieId}/${revId}`;
            
        try {
            await remove(ref(db, commentPath));
            showToast("Comment deleted.");
            
            const targetComment = document.getElementById(`comment-${revId}`);
            if (targetComment) {
                anime({
                    targets: targetComment,
                    opacity: 0,
                    height: 0,
                    paddingTop: 0,
                    paddingBottom: 0,
                    marginTop: 0,
                    marginBottom: 0,
                    duration: 350,
                    easing: 'easeInQuad',
                    complete: () => {
                        targetComment.remove();
                        const listEl = document.getElementById('comments-list');
                        if (listEl && listEl.querySelectorAll('.comment-box').length === 0) {
                            listEl.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 14px; margin-top: 40px;">No comments yet. Be the first!</div>';
                        }
                    }
                });
            }
        } catch(e) { 
            showToast("Error deleting comment!"); 
        }
    }

    window.toggleLike = async function(revId) {
        if(!currentUser) { showToast("Login to like!"); return; }
        
        const btn = document.querySelector(`#comment-${revId} .c-action-btn:first-child`);
        if(!btn) return;
        
        const icon = btn.querySelector('i');
        const countSpan = btn.querySelector('span');
        
        const isCurrentlyLiked = btn.classList.contains('liked-by-me');
        let currentCount = parseInt(countSpan.innerText.trim()) || 0;
        
        if (isCurrentlyLiked) {
            btn.style.color = '';
            btn.style.opacity = '0.7';
            btn.classList.remove('liked-by-me');
            icon.className = 'fa-regular fa-thumbs-up';
            let newCount = currentCount - 1;
            countSpan.innerText = newCount > 0 ? newCount : '';
        } else {
            btn.style.color = 'var(--accent)';
            btn.style.opacity = '1';
            btn.classList.add('liked-by-me');
            icon.className = 'fa-solid fa-thumbs-up';
            let newCount = currentCount + 1;
            countSpan.innerText = newCount;
        }
        
        const revPath = (sIdx !== null && eIdx !== null) ? `reviews/${movieId}_s${sIdx}_e${eIdx}/${revId}` : `reviews/${movieId}/${revId}`;
        const likePath = `${revPath}/likes/${currentUser.uid}`;
        
        try {
            const snap = await get(ref(db, likePath));
            if (snap.exists()) {
                await remove(ref(db, likePath)); 
            } else {
                await set(ref(db, likePath), true); 
            }
        } catch(e) { 
            showToast("Error updating like!");
            loadComments(); 
        }
    }
</script>
</body>
</html>
