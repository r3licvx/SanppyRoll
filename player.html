 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover">
    <title>SanppyRoll - Watch</title>
    
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root { 
            --accent: #F47521; 
            --bg-main: #0b0b0e;
            --bg-card: #151518;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --anim: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            --bg-glass: rgba(15, 15, 15, 0.65);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, button, input, textarea { font-family: 'SF Pro Display', -apple-system, sans-serif; font-weight: 400; }
        
        body { background: var(--bg-main); color: var(--text-main); overflow-x: hidden; -webkit-font-smoothing: antialiased;}
        #app-container { width: 100%; max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; }

        /* --- PLAYER UI --- */
        .player-wrapper {
            position: sticky; top: 0; z-index: 100; width: 100%;
        }
        
        .video-container {
            width: 100%; position: relative; background: #000; 
            overflow: hidden; user-select: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); background-size: cover; background-position: center;
        }

        /* SCROLL FADE GAP */
        .scroll-fader {
            position: absolute; bottom: -30px; left: 0; width: 100%; height: 30px;
            background: linear-gradient(to bottom, var(--bg-main) 0%, transparent 100%);
            pointer-events: none; z-index: 90;
        }
        .video-container:fullscreen ~ .scroll-fader, .video-container:-webkit-full-screen ~ .scroll-fader { display: none; }
        
        @media (max-aspect-ratio: 16/9) {
            .video-container { aspect-ratio: 16/9; }
        }
        @media (min-aspect-ratio: 16/9) {
            .video-container { height: 100vh; }
        }

        /* Force stretch to avoid black notch areas on Chrome/Safari */
        .video-container:fullscreen, .video-container:-webkit-full-screen { 
            width: 100vw; height: 100vh; max-width: none; border-radius: 0; aspect-ratio: auto;
            padding: 0 !important; margin: 0 !important; box-shadow: none !important;
        }
        
        video { 
            width: 100%; height: 100%; display: block; 
            object-fit: contain; /* Starts as Contain (Original Scale) */
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), object-fit 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); 
            background: transparent;
        }
        video:fullscreen, video:-webkit-full-screen { object-fit: contain !important; }
        
        /* Fit Modes */
        video.fit-contain { object-fit: contain; transform: scale(1); }
        video.fit-fill { object-fit: fill; transform: scale(1); }
        video.fit-cover { object-fit: cover; transform: scale(1); }
        video.fit-scale-115 { object-fit: contain; transform: scale(1.15); }
        video.fit-scale-125 { object-fit: contain; transform: scale(1.25); }
        
        .top-header {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 20px 25px 40px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            color: #fff; z-index: 10; opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            pointer-events: none; display: flex; align-items: center; justify-content: space-between;
        }
        
        .header-left { display: flex; align-items: center; gap: 15px; flex: 1; overflow: hidden; }
        .back-btn { pointer-events: auto; cursor: pointer; font-size: clamp(14px, 3.5vw, 18px); flex-shrink: 0; transition: color 0.2s;}
        .back-btn:hover { color: var(--accent); }
        .title-wrapper { display: flex; flex-direction: column; overflow: hidden; flex: 1; margin-top: 1px;}
        
        #video-title-text { 
            font-size: clamp(14px, 3vw, 16px); font-weight: 400; letter-spacing: 0.3px; 
            margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.95;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        @media (max-width: 768px) {
            .title-wrapper { display: none; } 
            .top-header { padding: 15px 20px; }
        }

        .center-overlay {
            position: absolute; top: 35px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.85); color: #fff; font-size: 13px; font-weight: 400;
            padding: 8px 16px; border-radius: 30px; z-index: 15;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease-in-out;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08); white-space: nowrap; letter-spacing: 0.3px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .center-overlay.active { opacity: 1; }
        .grad-icon { color: var(--accent); display: inline-block; font-size: 12px;}

        @media (max-width: 600px) {
            .center-overlay { font-size: 11px; padding: 6px 12px; top: 20px;}
        }

        .controls {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 70px 25px 25px; display: flex; flex-direction: column;
            opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease;
            z-index: 10;
            background: linear-gradient(to top, var(--bg-main) 0%, rgba(11,11,14,0.8) 30%, transparent 100%);
        }
        .video-container.show-controls .controls,
        .video-container.show-controls .top-header { opacity: 1; visibility: visible; }

        .progress-area { 
            height: 16px; width: 100%; display: flex; align-items: center;
            cursor: pointer; margin-bottom: 12px; position: relative; 
        }
        .progress-visual-bg {
            height: 2px; width: 100%; background: rgba(255,255,255,0.2); 
            position: relative; border-radius: 4px; pointer-events: none;
            transition: height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .video-container.show-controls .progress-visual-bg { height: 2px; }
        .progress-area:hover .progress-visual-bg, .progress-area.dragging .progress-visual-bg { height: 4px; }
        
        .buffer-bar {
            height: 100%; width: 0%; left: 0; background: rgba(255,255,255,0.35); 
            position: absolute; border-radius: 4px; pointer-events: none; transition: width 0.1s linear, left 0.1s linear;
        }
        
        .progress-bar { 
            height: 100%; width: 0%; background: var(--accent); 
            position: absolute; border-radius: 4px; pointer-events: none;
        }
        .progress-bar::after { 
            content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%) scale(0);
            width: 10px; height: 10px; background: #fff; border-radius: 50%; 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .progress-area:hover .progress-bar::after, .progress-area.dragging .progress-bar::after { transform: translateY(-50%) scale(1); }

        .drag-time {
            position: absolute; top: -35px; background: rgba(15,15,15,0.9); color: #fff;
            padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 400;
            transform: translateX(-50%); display: none; z-index: 12; pointer-events: none; border: 1px solid rgba(255,255,255,0.1);
        }
        .progress-area.dragging .drag-time { display: block; }

        .mini-timeline {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255,255,255,0.2); z-index: 5;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .mini-progress { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear;}
        
        .video-container:not(.show-controls) .mini-timeline { opacity: 1; visibility: visible; }
        .video-container:fullscreen .mini-timeline, .video-container:-webkit-full-screen .mini-timeline { display: none !important; }
        @media (min-width: 769px) { .mini-timeline { display: none !important; } }

        .buttons { display: flex; align-items: center; justify-content: space-between; color: #fff; }
        .left-btns, .right-btns { display: flex; align-items: center; gap: clamp(10px, 3.5vw, 18px); position: relative; }
        
        .buttons i { cursor: pointer; font-size: clamp(14px, 4vw, 18px); transition: all 0.2s; color: #fff; text-align: center; opacity: 0.85; }
        .buttons i:hover { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .pop-anim { transform: scale(1.15) !important; opacity: 1 !important; transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1) !important; }
        
        .video-container:fullscreen .buttons i, .video-container:-webkit-full-screen .buttons i {
            font-size: clamp(14px, 2.5vw, 16px);
        }

        #prev-btn, #next-btn { font-size: 14px; }
        .time { font-size: clamp(11px, 2.5vw, 13px); font-weight: 400; color: rgba(255,255,255,0.8); margin-left: 5px; font-variant-numeric: tabular-nums;}

        .settings-menu {
            position: absolute; bottom: 50px; right: 0;
            background: var(--bg-glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
            padding: 6px; min-width: 110px; max-height: 120px; flex-direction: column;
            z-index: 15; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            overflow-y: auto; overflow-x: hidden;
            visibility: hidden; opacity: 0; transform: translateY(15px) scale(0.95); transform-origin: bottom right;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex;
        }
        .settings-menu.active { visibility: visible; opacity: 1; transform: translateY(0) scale(1); }
        .settings-menu::-webkit-scrollbar { width: 3px; }
        .settings-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
        
        .quality-btn, .audio-btn-item {
            background: transparent; border: none; color: rgba(255,255,255,0.85);
            padding: 8px 12px; text-align: left; font-size: 12px; font-weight: 400; 
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; outline: none;
            border-radius: 8px; margin-bottom: 2px;
        }
        .quality-btn:last-child { margin-bottom: 0; }
        .quality-btn:hover, .audio-btn-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        .quality-btn i.fa-check, .audio-btn-item i.fa-check { font-size: 10px; width: 10px; opacity: 0; color: #fff; transition: 0.2s; }
        .quality-btn.active, .audio-btn-item.active { color: var(--accent); background: rgba(244, 117, 33, 0.1); }
        .quality-btn.active i.fa-check, .audio-btn-item.active i.fa-check { opacity: 1; color: var(--accent); }
        
        .quality-btn.locked-quality { opacity: 0.6; color: rgba(255,255,255,0.5); }
        .quality-btn.locked-quality:hover { background: transparent; opacity: 0.8; }
        .lock-icon-q { display: none; font-size: 10px; color: #FFD700; margin-left: 6px; }
        .quality-btn.locked-quality .lock-icon-q { display: inline-block; }
        .quality-btn.locked-quality i.fa-check { display: none !important; }

        .yt-ripple {
            position: absolute; top: 0; bottom: 0; width: 35%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; opacity: 0; pointer-events: none; z-index: 8;
        }
        .yt-left { left: 0; background: linear-gradient(90deg, rgba(244, 117, 33, 0.1) 0%, transparent 80%); }
        .yt-right { right: 0; background: linear-gradient(270deg, rgba(244, 117, 33, 0.1) 0%, transparent 80%); }
        .ripple-active { animation: cleanFade 0.4s ease forwards; }
        @keyframes cleanFade { 0% { opacity: 0; } 30% { opacity: 1; } 100% { opacity: 0; } }
        .ripple-active i { animation: popArrow 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes popArrow { 0% { transform: scale(0.8); } 50% { transform: scale(1.2); color: var(--accent); } 100% { transform: scale(1); color: #fff; } }
        .yt-ripple i { font-size: 28px; margin-bottom: 8px; opacity: 0.9; }
        .yt-ripple span { font-size: 13px; font-weight: 400; }

        /* MODIFIED LOADER CSS */
        .loader-wrapper {
            position: absolute; inset: 0;
            z-index: 100; pointer-events: none; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: opacity 0.3s;
        }
        .loader-content { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .netflix-loader { width: 35px; height: 35px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); text-shadow: 0 2px 10px rgba(0,0,0,0.8); transition: color 0.3s;}
        
        .video-container.loading .loader-wrapper { opacity: 1; visibility: visible; }
        .video-container.error-state .netflix-loader { display: none; }
        .video-container.error-state .loader-text { color: #ff453a; font-size: 14px; font-weight: 600; }

        .tap-layer { position: absolute; inset: 0; z-index: 5; cursor: pointer; -webkit-touch-callout: none; user-select: none; }

        #below-content {
            opacity: 0; margin-top: 25px; 
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            flex: 1; display: flex; flex-direction: column;
        }
        #below-content.visible { opacity: 1; transform: translateY(0); }

        .video-info-section { padding: 0 5% 0px; background: var(--bg-main); position: relative; z-index: 2; }
        .yt-title { font-size: clamp(20px, 5vw, 24px); font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 10px; letter-spacing: -0.3px;}
        .yt-desc { font-size: clamp(13px, 3vw, 14px); color: var(--text-muted); line-height: 1.5; font-weight: 400; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 20px;}
        
        .details-section { padding: 0px 5% 10px; background: var(--bg-main); flex: 1; position: relative; z-index: 2;}
        
        .action-row { 
            display: flex; align-items: center; gap: 12px; margin-bottom: 25px; 
            padding-bottom: 0px; border-bottom: none; flex-wrap: wrap;
        }
        .action-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; 
            padding: 8px 16px; border-radius: 25px; font-size: 13px; font-weight: 400; cursor: pointer; 
            display: flex; align-items: center; gap: 8px; transition: all 0.2s; outline: none;
            backdrop-filter: blur(10px);
        }
        .action-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .action-btn:active { transform: scale(0.95); }
        .action-btn i { font-size: 14px; color: var(--accent); }

        .series-container { margin-bottom: 20px; }
        .season-tabs { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); scrollbar-width: none; }
        .season-tabs::-webkit-scrollbar { display: none; }
        .season-btn { background: transparent; border: none; color: var(--text-muted); font-size: 14px; font-weight: 400; cursor: pointer; white-space: nowrap; transition: 0.2s; outline: none; position: relative; padding-bottom: 8px;}
        .season-btn:hover { color: #fff; }
        .season-btn.active { color: #fff; font-weight: 600; }
        .season-btn.active::after { content: ''; position: absolute; left: 0; bottom: -1px; width: 100%; height: 3px; background: var(--accent); border-radius: 3px 3px 0 0; }
        
        #episode-list { display: flex; flex-direction: column; gap: 10px; }
        .ep-card { display: flex; gap: 12px; background: rgba(255, 255, 255, 0.02); padding: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: all 0.2s; align-items: center; }
        .ep-card:hover { background: rgba(255,255,255,0.05); border-color: rgba(244, 117, 33, 0.4);}
        .ep-card:active { transform: scale(0.98); }
        
        .ep-thumb { width: 110px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; position: relative; flex-shrink: 0; background: #111; }
        .ep-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; transition: opacity 0.3s; }
        .ep-card:hover .ep-thumb img { opacity: 1; }
        .ep-thumb .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.8); font-size: 20px; transition: all 0.2s; z-index: 2; text-shadow: 0 4px 15px rgba(0,0,0,0.8);}
        .ep-card:hover .play-icon, .ep-card.active-ep .play-icon { color: #fff; transform: translate(-50%, -50%) scale(1.15); }
        
        .ep-info { display: flex; flex-direction: column; justify-content: center; width: 100%; padding-right: 5px;}
        .ep-num { font-size: 10px; color: var(--accent); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; background: rgba(244, 117, 33, 0.15); padding: 3px 8px; border-radius: 6px; width: fit-content;}
        .ep-title { font-size: 13px; font-weight: 400; color: #fff; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .ep-desc { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.5); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .ep-card.active-ep { background: rgba(244, 117, 33, 0.08); border-color: rgba(244, 117, 33, 0.4); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(11,11,14,0.8); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);}
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 800px; height: 85dvh; display: flex; flex-direction: column; position: relative; border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.6); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);}
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .modal-header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-header h3 { font-size: 16px; font-weight: 600; color: #fff; margin:0;}
        .header-actions { display: flex; gap: 15px; align-items: center;}
        .refresh-btn { background: transparent; border: none; color: var(--accent); font-size: 13px; font-weight: 400; cursor: pointer; transition: 0.2s; outline: none;}
        .refresh-btn:active { transform: scale(0.9); }
        .close-modal { background: rgba(255,255,255,0.1); border: none; width: 30px; height: 30px; border-radius: 50%; color: #fff; font-size: 14px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; outline: none;}
        .close-modal:hover { background: rgba(255,255,255,0.2); transform: rotate(90deg); }
        
        .modal-body { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-x: hidden; }
        .modal-body::-webkit-scrollbar { width: 3px; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .comment-box { display: flex; gap: 12px; margin-bottom: 5px;}
        .c-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #333;}
        .c-content { display: flex; flex-direction: column; flex: 1; padding-right: 5px;}
        .c-name { font-size: 13px; font-weight: 600; color: #f1f1f1; margin-bottom: 4px; display: flex; align-items: center;}
        .c-time { font-size: 11px; font-weight: 400; color: var(--text-muted); margin-left: 8px; }
        .c-text { font-size: 14px; font-weight: 400; color: #fff; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap;}
        .c-text.truncated { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .read-more-btn { background: transparent; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; padding: 0; margin-top: 5px; font-weight: 400; text-align: left; display: inline-block; width: max-content; outline: none;}
        .read-more-btn:hover { color: #fff; }
        
        .c-actions { display: flex; align-items: center; gap: 15px; margin-top: 8px; }
        .c-action-btn { background: transparent; border: none; color: #f1f1f1; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 400; opacity: 0.7; transition: 0.2s; outline: none;}
        .c-action-btn i { font-size: 14px; }
        .c-action-btn:hover { opacity: 1; color: var(--accent); }
        .c-action-btn.delete-btn { color: #ff453a; margin-left: auto; }
        .c-action-btn.delete-btn:hover { color: #ff6b63; }
        
        .chat-input-area { padding: 15px 25px 20px; background: var(--bg-main); border-top: 1px solid rgba(255,255,255,0.05); z-index: 10; display: flex; gap: 10px; align-items: center;}
        .comment-input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.05); color: #fff; font-size: 14px; font-weight: 400; outline: none; padding: 12px 18px; border-radius: 30px; transition: 0.2s;}
        .comment-input:focus { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
        .post-comment-btn { background: var(--accent); color: #fff; border: none; width: 44px; height: 44px; border-radius: 50%; font-weight: 400; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; flex-shrink: 0; outline: none;}
        .post-comment-btn:active { transform: scale(0.95); }

        .verified-tick { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; margin-left: 6px; flex-shrink: 0; }
        .verified-tick i { font-size: 8px; color: #fff; }

    async function checkAndResumeProgress() {
        if(!currentUser) return;
        const epKey = (sIdx !== null && eIdx !== null) ? `s${sIdx}_e${eIdx}` : 'movie';
        const localKey = `nexstream_prog_${currentUser.uid}_${movieId}_${epKey}`;
        
        let targetTime = 0;
        const dbPath = (sIdx !== null && eIdx !== null) ? `users/${currentUser.uid}/progress/${movieId}/s${sIdx}_e${eIdx}` : `users/${currentUser.uid}/progress/${movieId}`;
        try {
            const snap = await get(child(dbRef, dbPath));
            if (snap.exists()) {
                const fbData = snap.val();
                if (fbData.time > 0) targetTime = fbData.time; 
            } else {
                localStorage.removeItem(localKey);
            }
        } catch(err) {}
        
        if(targetTime === 0) { 
            try {
                const localData = JSON.parse(localStorage.getItem(localKey));
                if (localData && localData.time > 0) targetTime = localData.time;
            } catch(e) {}
        }
        
        if (targetTime > 0) {
            targetResumeTime = targetTime; 
            if(vid.readyState > 0) {
                vid.currentTime = targetTime;
                if(hasExtAudio) extAud.currentTime = targetTime;
                savedTimeLoaded = true;
                if(intendedPlayState) doPlay();
            } else {
                vid.addEventListener('loadedmetadata', () => {
                    if(!savedTimeLoaded) {
                        vid.currentTime = targetTime;
                        if(hasExtAudio) extAud.currentTime = targetTime;
                        savedTimeLoaded = true;
                        if(intendedPlayState) doPlay();
                    }
                }, {once: true});
            }
        }
    }

    async function loadAudio(url, startTime = 0) {
        isAudBuffering = false; isMediaError = false; audError = false; 
        if(!vidError) player.classList.remove('error-state'); loaderText.innerText = "Loading...";

        if(hlsAudio) { hlsAudio.destroy(); hlsAudio = null; }
        extAud.pause();
        extAud.removeAttribute('src');

        const isM3U8 = url.toLowerCase().includes('.m3u8') || url.toLowerCase().includes('m3u8') || url.includes('desidubanime');
        const isAppleNative = extAud.canPlayType('application/vnd.apple.mpegurl');

        if (Hls.isSupported() && !isAppleNative && isM3U8) {
            hlsAudio = new Hls({ startPosition: startTime });
            hlsAudio.loadSource(url);
            hlsAudio.attachMedia(extAud);
            hlsAudio.on(Hls.Events.MANIFEST_PARSED, function () {
                extAud.currentTime = startTime;
            });
            hlsAudio.on(Hls.Events.ERROR, function(event, data) {
                if(data.fatal) {
                    console.error("Audio HLS failed, trying native...", data);
                    extAud.src = url; 
                    extAud.currentTime = startTime;
                }
            });
        } else {
            extAud.src = url;
            extAud.load();
            extAud.addEventListener('loadeddata', () => { extAud.currentTime = startTime; }, {once: true});
        }
    }

    async function loadVideo(url, startTime = 0) {
        isVidBuffering = false; isMediaError = false; vidError = false; 
        if(!audError) player.classList.remove('error-state'); loaderText.innerText = "Loading...";
        player.classList.add('loading');
        targetResumeTime = startTime; 
        document.getElementById("curr").innerText = fmt(startTime);
        if (vid.duration) pBar.style.width = `${(startTime / vid.duration) * 100}%`;
        
        vid.pause();
        if(hasExtAudio) {
            extAud.pause();
            extAud.currentTime = startTime; 
        }

        const isM3U8 = url.toLowerCase().includes('.m3u8') || url.toLowerCase().includes('m3u8');
        const isAppleNative = vid.canPlayType('application/vnd.apple.mpegurl');

        const playNative = (vidUrl, time) => {
            if(hls) { hls.destroy(); hls = null; }
            vid.preload = "auto";
            vid.src = vidUrl; 
            
            vid.addEventListener('loadeddata', () => {
                vid.currentTime = time; 
                if(hasExtAudio) extAud.currentTime = time;
                vid.style.backgroundImage = 'none';
                if(intendedPlayState) doPlay(); else player.classList.remove('loading'); 
                
                if (vid.audioTracks && vid.audioTracks.length > 1 && !hasExtAudio) {
                    let aHtml = '';
                    for (let i = 0; i < vid.audioTracks.length; i++) {
                        let track = vid.audioTracks[i];
                        let lbl = track.language || track.label || `Track ${i + 1}`;
                        aHtml += `<button class="quality-btn ${track.enabled ? 'active' : ''}" data-native-idx="${i}"><i class="fa-solid fa-check"></i> ${lbl}</button>`;
                    }
                    audioMenu.innerHTML = aHtml;
                    audioBtn.style.display = 'inline-block';
                    
                    audioMenu.querySelectorAll('.quality-btn').forEach(btn => {
                        btn.onclick = (e) => {
                            e.stopPropagation(); popBtn(btn);
                            let idx = parseInt(btn.getAttribute('data-native-idx'));
                            for(let j=0; j<vid.audioTracks.length; j++) {
                                vid.audioTracks[j].enabled = (j === idx);
                            }
                            audioMenu.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            audioMenu.classList.remove('active');
                            showToast("Audio track switched");
                        };
                    });
                }
            }, {once: true}); 

            vid.addEventListener('error', (e) => {
                console.error("Native Video Load Error", e);
                if (Hls.isSupported() && !isM3U8) {
                    playHls(vidUrl, time);
                } else {
                    showMediaError('video');
                }
            }, {once: true});
        };

        const playHls = (vidUrl, time) => {
            if(hls) { hls.destroy(); hls = null; }
            hls = new Hls({ startPosition: time }); 
            hls.loadSource(vidUrl); hls.attachMedia(vid);
            hls.on(Hls.Events.MANIFEST_PARSED, function () { 
                vid.currentTime = time; 
                if(hasExtAudio) extAud.currentTime = time; 
                vid.style.backgroundImage = 'none';
                if(intendedPlayState) doPlay(); else player.classList.remove('loading'); 
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.error("HLS Error", data);
                    if(isM3U8) playNative(vidUrl, time);
                    else {
                        showMediaError('video');
                    }
                }
            });
        };
        
        if (Hls.isSupported() && isM3U8) {
            playHls(url, targetResumeTime);
        } else if (isAppleNative && isM3U8) {
            playNative(url, targetResumeTime);
        } else {
            playNative(url, targetResumeTime);
        }
    }

    async function doPlay() {
        intendedPlayState = true;
        isVidBuffering = true; updateBufferingUI();
        try {
            if (hasExtAudio) {
                if (vid.readyState >= 3 && extAud.readyState >= 3) {
                    clearTimeout(loadingTimeout);
                    if(Math.abs(vid.currentTime - extAud.currentTime) > 0.15) extAud.currentTime = vid.currentTime;
                    await Promise.all([vid.play(), extAud.play()]);
                    isVidBuffering = false; updateBufferingUI(); resetHideTimer(); vid.style.backgroundImage = 'none';
                } 
            } else {
                if (vid.readyState >= 3) {
                    clearTimeout(loadingTimeout);
                    await vid.play();
                    isVidBuffering = false; updateBufferingUI(); resetHideTimer(); vid.style.backgroundImage = 'none';
                }
            }
        } catch (e) {
            intendedPlayState = false;
            vid.pause(); if(hasExtAudio) extAud.pause();
            player.classList.add("show-controls"); player.classList.remove("loading");
            showMsg("Tap to Play");
        }
    }

    function doPause() {
        intendedPlayState = false;
        vid.pause(); if(hasExtAudio) extAud.pause();
        player.classList.add("show-controls");
        clearTimeout(hideTimer);
    }

    const tryResumeSync = async () => { 
        if (intendedPlayState) {
            if (hasExtAudio) {
                if (vid.readyState >= 3 && extAud.readyState >= 3) {
                    isVidBuffering = false; isAudBuffering = false; updateBufferingUI();
                    if (Math.abs(vid.currentTime - extAud.currentTime) > 0.15) extAud.currentTime = vid.currentTime;
                    try { await Promise.all([vid.play(), extAud.play()]); } catch(e){}
                } else if (vid.readyState >= 3 && extAud.readyState < 3) {
                    isAudBuffering = true; updateBufferingUI(); vid.pause();
                } else if (extAud.readyState >= 3 && vid.readyState < 3) {
                    isVidBuffering = true; updateBufferingUI(); extAud.pause();
                }
            } else {
                if (vid.readyState >= 3) {
                    isVidBuffering = false; updateBufferingUI();
                    try { await vid.play(); } catch(e){}
                }
            }
        } 
    };
    
    vid.addEventListener('canplay', tryResumeSync); extAud.addEventListener('canplay', tryResumeSync);
    
    vid.addEventListener('waiting', () => { 
        intendedPlayState = true; 
        isVidBuffering = true; updateBufferingUI();
        if(hasExtAudio && !isAudBuffering) extAud.pause(); 
    });
    
    extAud.addEventListener('waiting', () => { 
        intendedPlayState = true; 
        isAudBuffering = true; updateBufferingUI();
        if(!isVidBuffering) vid.pause(); 
    });
    
    vid.addEventListener('playing', () => { 
        clearTimeout(loadingTimeout); 
        if (hasExtAudio && extAud.readyState < 3) { 
            vid.pause(); isAudBuffering = true; updateBufferingUI(); return;
        }
        isVidBuffering = false; isMediaError = false; updateBufferingUI();
        if(hasExtAudio && intendedPlayState && !extAud.paused) {
            if(Math.abs(vid.currentTime - extAud.currentTime) > 0.15) extAud.currentTime = vid.currentTime;
        }
    });

    extAud.addEventListener('playing', () => {
        if (vid.readyState < 3) {
            extAud.pause(); isVidBuffering = true; updateBufferingUI(); return;
        }

    // Scrubbing timeline performs fluid visual changes, deferring the physical seek until drag release.
    const updateTimelineVisuals = (e) => {

        if (mins < 60) return `${mins} min ago`;
        if (hrs < 24) return `${hrs} hr ago`;
        const days = Math.floor(hrs / 24);

        return new Date(ms).toLocaleDateString();

                revs.sort((a,b) => b.timestamp - a.timestamp);

    document.getElementById('new-comment-text').addEventListener('keypress', (e) => { if(e.key === 'Enter') postComment(); });

    let _pendingDeleteId = null;
    window.deleteComment = function(revId) {
        _pendingDeleteId = revId;
        document.getElementById('del-modal').classList.add('active');
    }
    function _closeDelModal() {
        document.getElementById('del-modal').classList.remove('active');
        _pendingDeleteId = null;
    }
    document.getElementById('del-modal-cancel').onclick = _closeDelModal;
    document.getElementById('del-modal').addEventListener('click', function(e) {
        if (e.target === this) _closeDelModal();
    });
    document.getElementById('del-modal-confirm').onclick = async function() {
        if (!_pendingDeleteId) return;
        const revId = _pendingDeleteId;
        _closeDelModal();
        const commentPath = (sIdx !== null && eIdx !== null)
            ? `reviews/${movieId}_s${sIdx}_e${eIdx}/${revId}`
            : `reviews/${movieId}/${revId}`;
        try {
            await remove(ref(db, commentPath));
            showToast("Comment deleted.");
            loadComments();
        } catch(e) { showToast("Error deleting comment!"); }
    }

    window.toggleLike = async function(revId) {
        if(!currentUser) { showToast("Login to like!"); return; }
        
        const revPath = (sIdx !== null && eIdx !== null) ? `reviews/${movieId}_s${sIdx}_e${eIdx}/${revId}` : `reviews/${movieId}/${revId}`;
        const likePath = `${revPath}/likes/${currentUser.uid}`;
        
        try {
            const revSnap = await get(ref(db, revPath));
            if(revSnap.exists() && typeof revSnap.val().likes === 'number') {
                await set(ref(db, `${revPath}/likes`), null);
            }
            const snap = await get(ref(db, likePath));
            if (snap.exists()) {
                await remove(ref(db, likePath)); 
            } else {
                await set(ref(db, likePath), true); 
            }
            loadComments(); 
        } catch(e) { showToast("Error toggling like!"); }
    }
</script>
</body>
</html>
