<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Search - SanppyRoll</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <script>
        (function() {
            const cachedPic = localStorage.getItem('cachedProfilePic');
            const cachedName = localStorage.getItem('cachedProfileName') || 'U';
            const isPremium = localStorage.getItem('cachedIsPremium') === 'true';
            
            window.addEventListener('DOMContentLoaded', () => {
                const profileBtn = document.getElementById('user-profile-icon');
                if (!profileBtn) return;
                
                if (isPremium) profileBtn.classList.add('premium-user');
                const initial = cachedName.charAt(0).toUpperCase();
                
                if (cachedPic) {
                    profileBtn.innerHTML = `<img src="${cachedPic}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'profile-fallback-avatar\\'>${initial}</div>';">`;
                } else {
                    profileBtn.innerHTML = `<div class="profile-fallback-avatar">${initial}</div>`;
                }
                profileBtn.style.opacity = '1';
            });
        })();
    </script>

    <style>
        /* ── CSS VARIABLES ── */
        :root {
            --accent: #f47521;
            --text-muted: rgba(255, 255, 255, 0.4);
            --bg-dark: #0b0b0e;
        }

        /* ── CORE ── */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
            outline: none;
        }
        
        body, input, button, div, span, p, h1, h2, h3, h4, a {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Immersive Underlay Home Page Simulation Gradients */
        body {
            background: var(--bg-dark); color: #fff; overflow-x: hidden; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding-top: 90px;
            position: relative;
            transform: translateY(-100%);
            opacity: 0;
            animation: slideDown 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 15% 15%, rgba(244, 117, 33, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(224, 0, 115, 0.08) 0%, transparent 45%),
                #07070a;
            z-index: -2;
            pointer-events: none;
        }

        /* Motion Blur Entrance Sequence */
        @keyframes slideDown {
            0% { transform: translateY(-100%) scaleY(1.08); filter: blur(12px); opacity: 0; }
            100% { transform: translateY(0) scaleY(1); filter: blur(0); opacity: 1; }
        }

        img { pointer-events: none; -webkit-user-drag: none; display: block; }

        .svg-icon { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; transition: all 0.2s; }
        
        /* ── ULTRA PREMIUM NAVBAR ── */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 85px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; gap: 14px;
            background: rgba(11, 11, 14, 0.6);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .back-btn {
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #fff;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0;
        }
        .back-btn:hover { background: rgba(255,255,255,0.08); }
        .back-btn:active { transform: scale(0.9) rotate(-10deg); }
        .back-btn .svg-icon { stroke-width: 3px; width: 22px; height: 22px; }
        
        /* ── SLEEK GLASS SEARCH BAR (NO GLOW) ── */
        .search-wrapper {
            flex: 1; height: 44px; display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 22px;
            padding: 0 16px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .search-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(244, 117, 33, 0.4);
            transform: scale(1.01);
        }
        .search-icon { color: rgba(255, 255, 255, 0.35); width: 16px; height: 16px; }
        .search-wrapper:focus-within .search-icon { color: var(--accent); transform: scale(1.1); }
        
        /* ── NORMAL SEARCH INPUT ── */
        .search-input {
            flex: 1; height: 100%; border: none; outline: none; background: transparent;
            font-size: 14px; color: #fff; font-weight: 600; caret-color: var(--accent);
            -webkit-appearance: none; appearance: none;
        }
        .search-input::placeholder { color: rgba(255, 255, 255, 0.3); }
        
        /* Remove webkit default close buttons */
        .search-input::-webkit-search-decoration,
        .search-input::-webkit-search-cancel-button,
        .search-input::-webkit-search-results-button,
        .search-input::-webkit-search-results-decoration {
            display: none !important;
            -webkit-appearance: none;
        }
        .search-input::-ms-clear,
        .search-input::-ms-reveal {
            display: none; width: 0; height: 0;
        }
        
        .clear-btn {
            background: transparent; border: none; color: rgba(255,255,255,0.4);
            cursor: pointer; display: none; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%; transition: all 0.2s;
        }
        .clear-btn:hover { color: #fff; background: rgba(255,255,255,0.1); transform: rotate(90deg); }
        .clear-btn .svg-icon { width: 12px; height: 12px; stroke-width: 3; }

        /* ── PROFILE ICON ── */
        .profile-btn { 
            position: relative; width: 36px; height: 36px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            background: #111; border: 2.5px solid transparent; padding: 2px;
            cursor: pointer; opacity: 0; box-sizing: border-box; flex-shrink: 0;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease;
        }
        .profile-btn.premium-user { border-color: var(--accent); }
        .profile-btn:active { transform: scale(0.9); }
        .profile-btn img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
        .profile-fallback-avatar {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(135deg, #f47521, #e00073);
            color: #fff; font-weight: 900; font-size: 13px;
        }

        /* ── SEARCH SKELETON LOADERS ── */
        #skeleton-ui { display: none; flex-direction: column; gap: 12px; padding: 15px 5%; }
        .sk-card { display: flex; gap: 14px; padding: 10px; background: rgba(255,255,255,0.015); border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .sk-poster { width: 70px; height: 100px; border-radius: 8px; flex-shrink: 0; }
        .sk-info { flex: 1; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
        .sk-title { height: 14px; width: 55%; border-radius: 4px; }
        .sk-badge { height: 11px; width: 30%; border-radius: 4px; }
        .sk-desc { height: 11px; width: 85%; border-radius: 4px; }
        
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.01) 25%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0.01) 75%);
            background-size: 200% 100%;
            animation: shimmer-anim 1.5s infinite linear;
        }
        @keyframes shimmer-anim {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── RECENT SEARCHES HISTORY ── */
        .history-container { padding: 15px 5% 5px; display: none; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .history-header span { font-size: 11px; font-weight: 800; color: rgba(255, 255, 255, 0.35); text-transform: uppercase; letter-spacing: 1px; }
        .clear-all-btn { font-size: 11px; color: var(--accent); font-weight: 800; cursor: pointer; transition: opacity 0.2s; text-transform: none !important; letter-spacing: 0 !important; }
        .clear-all-btn:active { opacity: 0.6; }
        
        .history-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .h-tag {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 6px 12px; border-radius: 20px; font-size: 12px; color: #d1d1d6;
            cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 700;
            transition: all 0.2s ease;
        }
        .h-tag:active { background: rgba(244,117,33,0.1); border-color: rgba(244,117,33,0.2); color: var(--accent); }
        .h-tag-remove { color: rgba(255,255,255,0.25); display: flex; align-items: center; padding: 1px; transition: color 0.2s; }
        .h-tag-remove:hover { color: #ff453a; }

        /* ── EMPTY / ERROR STATES ── */
        .center-message {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.25); text-align: center; gap: 10px;
            padding: 100px 20px; width: 100%;
        }
        .center-message p { font-size: 13px; font-weight: 600; letter-spacing: 0.2px; line-height: 1.5; color: rgba(255,255,255,0.35); }
        
        .main-msg-icon {
            width: 44px; height: 44px; stroke: rgba(255, 255, 255, 0.2); stroke-width: 1.8;
            margin-bottom: 2px;
        }

        /* ── SEARCH RESULTS ── */
        .results-list { display: flex; flex-direction: column; gap: 12px; padding: 10px 5% 50px; }
        
        .search-card {
            display: flex; gap: 14px; background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.03); border-radius: 14px;
            padding: 8px; cursor: pointer; position: relative; overflow: hidden;
            transition: all 0.22s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .search-card:active { transform: scale(0.98); background: rgba(244, 117, 33, 0.05); border-color: rgba(244, 117, 33, 0.2); }
        .search-poster { width: 70px; height: 100px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #151518; }
        
        .search-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .search-title { font-size: 14px; font-weight: 800; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .search-meta { font-size: 9px; color: var(--accent); font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .search-meta span { background: rgba(244,117,33,0.1); padding: 2px 5px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .search-desc { font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 500; }

        /* ── SMART PARSED NESTED EPISODES ── */
        .nested-results-wrapper {
            background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03);
            border-radius: 14px; margin-bottom: 4px; overflow: hidden;
        }
        .nested-header {
            padding: 10px 12px; background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 10px;
            font-weight: 800; color: var(--accent); text-transform: uppercase;
            letter-spacing: 0.8px; display: flex; align-items: center; gap: 6px;
        }
        .episode-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.02);
            cursor: pointer; transition: background 0.18s;
        }
        .episode-card:last-child { border-bottom: none; }
        .episode-card:active { background: rgba(244, 117, 33, 0.08); }
        .ep-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; padding-right: 10px; }
        .ep-title { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ep-meta { font-size: 10px; color: #8e8e93; font-weight: 600; }
        .ep-play-btn {
            width: 26px; height: 26px; border-radius: 50%; background: #fff;
            color: #000; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .episode-card:active .ep-play-btn { transform: scale(0.9); background: var(--accent); color: #fff; }

        .pro-badge { background: #f5c518 !important; color: #000 !important; font-weight: 900 !important; display: inline-flex; align-items: center; }
    </style>
</head>
<body>

<nav class="navbar">
    <button class="back-btn" onclick="window.goBackWithAnimation()">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    
    <div class="search-wrapper">
        <svg class="svg-icon search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        
        <input type="search" name="q" class="search-input" id="search-input" placeholder="Search movies, anime, episodes..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-lpignore="true" data-1p-ignore="true" role="presentation" autofocus>
        
        <button class="clear-btn" id="clear-btn" onclick="clearSearchField()">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <button class="profile-btn" onclick="window.location.href='profile.html'" id="user-profile-icon"></button>
</nav>

<div id="skeleton-ui">
    <div class="sk-card">
        <div class="skeleton sk-poster"></div>
        <div class="sk-info">
            <div class="skeleton sk-title"></div>
            <div class="skeleton sk-badge"></div>
            <div class="skeleton sk-desc"></div>
        </div>
    </div>
    <div class="sk-card">
        <div class="skeleton sk-poster"></div>
        <div class="sk-info">
            <div class="skeleton sk-title"></div>
            <div class="skeleton sk-badge"></div>
            <div class="skeleton sk-desc"></div>
        </div>
    </div>
    <div class="sk-card">
        <div class="skeleton sk-poster"></div>
        <div class="sk-info">
            <div class="skeleton sk-title"></div>
            <div class="skeleton sk-badge"></div>
            <div class="skeleton sk-desc"></div>
        </div>
    </div>
</div>

<div class="history-container" id="history-container">
    <div class="history-header">
        <span>Recent Searches</span>
        <span class="clear-all-btn" onclick="clearAllSearchHistory()">Clear All</span>
    </div>
    <div class="history-tags" id="history-tags"></div>
</div>

<div id="search-empty-state" class="center-message">
    <svg class="main-msg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        <polygon points="10 8 14 11 10 14 10 8"></polygon>
    </svg>
    <p>Discover movies, web series,<br>and specific episodes</p>
</div>

<div id="search-not-found" class="center-message" style="display:none;">
    <svg class="main-msg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="8" y1="15" x2="16" y2="15"></line>
        <line x1="9" y1="9" x2="9.01" y2="9"></line>
        <line x1="15" y1="9" x2="15.01" y2="9"></line>
    </svg>
    <p>Nothing found.<br>Double check your keywords or season numbers.</p>
</div>

<div class="results-list" id="search-results" style="display:none;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDnmFVfVSCxXC9shWhz4dw06xtTNBA6vsU",
        authDomain: "sanppyroll.firebaseapp.com",
        databaseURL: "https://sanppyroll-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sanppyroll",
        storageBucket: "sanppyroll.firebasestorage.app",
        messagingSenderId: "642736474886",
        appId: "1:642736474886:web:f0e0e3c04101fddfe02c87"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db);
    const auth = getAuth(app);
    
    let currentUser = null;
    let userSubPlan = 'free';
    let allMovies = [];
    let searchTimeout = null;

    /* --- PREMIUM EXIT SLIDE-UP ANIMATION INTERCEPTOR --- */
    window.goBackWithAnimation = function() {
        document.body.style.transition = "transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease, filter 0.4s ease";
        document.body.style.transform = "translateY(-100%) scaleY(1.08)";
        document.body.style.filter = "blur(12px)";
        document.body.style.opacity = "0";
        setTimeout(() => {
            window.history.back();
        }, 450);
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.replace('login.html'); return; }
        currentUser = user;
        
        try {
            const subSnap = await get(child(dbRef, `users/${user.uid}/subscription`));
            let isPremiumPlan = false;
            if (subSnap.exists() && subSnap.val().plan && subSnap.val().expiry > Date.now()) {
                userSubPlan = subSnap.val().plan;
                isPremiumPlan = true;
            }
            localStorage.setItem('cachedIsPremium', isPremiumPlan ? 'true' : 'false');
            
            const profileBtn = document.getElementById('user-profile-icon');
            if (isPremiumPlan) profileBtn.classList.add('premium-user');
            else profileBtn.classList.remove('premium-user');

            const profileSnap = await get(child(dbRef, `users/${user.uid}/profile`));
            let finalUrl = user.photoURL;
            let finalName = user.displayName || user.email;

            if (profileSnap.exists()) {
                const pData = profileSnap.val();
                if (pData.avatarUrl) finalUrl = pData.avatarUrl;
                if (pData.username) finalName = pData.username;
            }
            
            if (finalUrl) localStorage.setItem('cachedProfilePic', finalUrl);
            localStorage.setItem('cachedProfileName', finalName);
            
            if(finalUrl && profileBtn.querySelector('img')?.src !== finalUrl) {
                profileBtn.innerHTML = `<img src="${finalUrl}">`;
            }
        } catch(e) {}

        loadContentAndCache();
    });

    async function loadContentAndCache() {
        const cachedRaw = sessionStorage.getItem('snappy_index_cache');
        if (cachedRaw) {
            try {
                const cached = JSON.parse(cachedRaw);
                allMovies = cached.movies || [];
                if (allMovies.length > 0) return;
            } catch(e) {}
        }
        
        try {
            // FIXED BUG: Fetch targeted nodes in parallel instead of fetching root '/' node to optimize speed
            const [snap] = await Promise.all([
                get(child(dbRef, 'movies'))
            ]);
            if (snap.exists()) {
                const data = snap.val();
                allMovies = Object.keys(data).map(k => ({ id: k, ...data[k] }));
            }
        } catch(e) { console.error("Database fetch failed: ", e); }
    }

    function parseSearchQuery(query) {
        let seasonNum = null;
        let episodeNum = null;

        const seasonMatch = query.match(/(?:s|season\s*)(\d+)/i);
        if (seasonMatch) seasonNum = parseInt(seasonMatch[1], 10);

        const epMatch = query.match(/(?:e|ep|episode\s*)(\d+)/i);
        if (epMatch) episodeNum = parseInt(epMatch[1], 10);

        let cleanQuery = query
            .replace(/(?:s|season\s*)\d+/i, '')
            .replace(/(?:e|ep|episode\s*)\d+/i, '')
            .replace(/\s+/g, ' ')
            .trim();

        return { cleanQuery, seasonNum, episodeNum };
    }

    const searchInput = document.getElementById('search-input');
    const clearBtn = document.getElementById('clear-btn');
    const skeletonUI = document.getElementById('skeleton-ui');
    const emptyState = document.getElementById('search-empty-state');
    const notFoundState = document.getElementById('search-not-found');
    const resultsContainer = document.getElementById('search-results');

    anime({
        targets: '.search-wrapper',
        scale: [0.95, 1],
        opacity: [0, 1],
        easing: 'easeOutQuart',
        duration: 800
    });

    searchInput.addEventListener('input', (e) => {
        const val = e.target.value.trim();
        if (val !== '') {
            clearBtn.style.display = 'flex';
            executeSearch(val);
        } else {
            clearBtn.style.display = 'none';
            resetToInitialState();
        }
    });

    window.clearSearchField = function() {
        searchInput.value = '';
        clearBtn.style.display = 'none';
        resetToInitialState();
        searchInput.focus();
    };

    function resetToInitialState() {
        resultsContainer.style.display = 'none';
        resultsContainer.innerHTML = '';
        notFoundState.style.display = 'none';
        skeletonUI.style.display = 'none';
        emptyState.style.display = 'flex';
        loadSearchHistory();
    }

    function executeSearch(rawQuery) {
        emptyState.style.display = 'none';
        notFoundState.style.display = 'none';
        resultsContainer.style.display = 'none';
        document.getElementById('history-container').style.display = 'none';
        skeletonUI.style.display = 'flex';

        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const parsed = parseSearchQuery(rawQuery.toLowerCase());
            const terms = parsed.cleanQuery.split(' ').filter(Boolean);

            let matches = [];

            allMovies.forEach(m => {
                const targetText = `${m.title || ''} ${m.category || ''} ${m.genres || ''} ${m.description || ''} ${Array.isArray(m.tags) ? m.tags.join(' ') : (m.tags || '')}`.toLowerCase();
                
                const textMatches = terms.every(t => targetText.includes(t));

                if (textMatches) {
                    let episodeMatches = [];
                    if (m.type === 'series' && m.seasons) {
                        m.seasons.forEach((season, sIdx) => {
                            const curSeasonNum = season.season_number || (sIdx + 1);
                            
                            if (parsed.seasonNum === null || curSeasonNum === parsed.seasonNum) {
                                if (season.episodes) {
                                    season.episodes.forEach((episode, eIdx) => {
                                        const curEpNum = episode.episode_number || (eIdx + 1);
                                        
                                        if (parsed.episodeNum === null || curEpNum === parsed.episodeNum) {
                                            episodeMatches.push({
                                                seasonNum: curSeasonNum,
                                                episodeNum: curEpNum,
                                                episodeTitle: episode.title || `Episode ${curEpNum}`,
                                            });
                                        }
                                    });
                                }
                            }
                        });
                    }

                    if ((parsed.seasonNum !== null || parsed.episodeNum !== null) && m.type === 'series' && episodeMatches.length === 0) {
                        return;
                    }

                    matches.push({
                        movie: m,
                        episodeMatches: episodeMatches,
                        isTargeted: (parsed.seasonNum !== null || parsed.episodeNum !== null)
                    });
                }
            });

            renderResults(matches, rawQuery);
        }, 500); 
    }

    function renderResults(results, rawQuery) {
        skeletonUI.style.display = 'none';
        resultsContainer.innerHTML = '';

        if (results.length === 0) {
            resultsContainer.style.display = 'none';
            notFoundState.style.display = 'flex';
            return;
        }

        notFoundState.style.display = 'none';
        resultsContainer.style.display = 'flex';

        results.forEach(res => {
            const m = res.movie;
            const isElite = (m.access_level === 'elite' || m.access_level === 'supreme');
            const premiumTag = isElite ? `
                <span class="pro-badge">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="width: 10px; height: 10px; margin-right: 3px; display: inline-block; vertical-align: middle;">
                        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                    </svg>PRO
                </span>` : '';
            
            let cardHtml = '';

            if (res.isTargeted && res.episodeMatches.length > 0) {
                cardHtml += `
                <div class="nested-results-wrapper">
                    <div class="nested-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 13px; height: 13px; margin-right: 6px; display: inline-block; vertical-align: middle;">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg> Matches found in: ${m.title}
                    </div>
                    <div class="search-card" style="border:none; border-radius:0; border-bottom:1px solid rgba(255,255,255,0.05);" onclick="saveSearchQuery('${m.title.replace(/'/g,"\\'")}'); goToDetail('${m.id}', '${m.access_level || 'free'}')">
                        <img src="${m.poster}" class="search-poster" loading="lazy">
                        <div class="search-info">
                            <div class="search-title">${m.title}</div>
                            <div class="search-meta">
                                <span>${m.category || 'Series'}</span>
                                <span>${m.seasons ? m.seasons.length : 1} Seasons</span>
                                ${premiumTag}
                            </div>
                            <div class="search-desc">${m.description || ''}</div>
                        </div>
                    </div>`;

                res.episodeMatches.forEach(ep => {
                    cardHtml += `
                    <div class="episode-card" onclick="saveSearchQuery('${m.title.replace(/'/g,"\\'")}'); goToPlayer('${m.id}', '${m.access_level || 'free'}', ${ep.seasonNum}, ${ep.episodeNum})">
                        <div class="ep-left">
                            <span class="ep-title">${ep.episodeTitle}</span>
                            <span class="ep-meta">Season ${ep.seasonNum} • Episode ${ep.episodeNum}</span>
                        </div>
                        <div class="ep-play-btn">
                            <svg viewBox="0 0 24 24" fill="currentColor" style="width: 11px; height: 11px; margin-left: 1px;">
                                <path d="M8 5v14l11-7z"></path>
                            </svg>
                        </div>
                    </div>`;
                });
                cardHtml += `</div>`;
            } else {
                cardHtml = `
                <div class="search-card" onclick="saveSearchQuery('${m.title.replace(/'/g,"\\'")}'); goToDetail('${m.id}', '${m.access_level || 'free'}')">
                    <img src="${m.poster}" class="search-poster" loading="lazy">
                    <div class="search-info">
                        <div class="search-title">${m.title}</div>
                        <div class="search-meta">
                            <span>${m.category || 'Content'}</span>
                            ${m.type === 'series' && m.seasons ? `<span>${m.seasons.length} Season${m.seasons.length > 1 ? 's' : ''}</span>` : ''}
                            ${premiumTag}
                        </div>
                        <div class="search-desc">${m.description || ''}</div>
                    </div>
                </div>`;
            }

            resultsContainer.innerHTML += cardHtml;
        });

        anime({
            targets: '.search-card, .nested-results-wrapper',
            translateY: [20, 0],
            opacity: [0, 1],
            delay: anime.stagger(50),
            easing: 'easeOutQuart',
            duration: 500
        });
    }

    window.goToDetail = function(id, accessLevel) {
        if (!checkSubscriptionAccess(accessLevel)) { window.location.href = 'subscription.html'; return; }
        window.location.href = `detail.html?id=${id}`;
    };

    window.goToPlayer = function(id, accessLevel, seasonNum, epNum) {
        if (!checkSubscriptionAccess(accessLevel)) { window.location.href = 'subscription.html'; return; }
        window.location.href = `player.html?id=${id}&s=${seasonNum}&e=${epNum}`;
    };

    function checkSubscriptionAccess(level) {
        if (level === 'any_sub' && userSubPlan === 'free') return false;
        if (level === 'elite' && (userSubPlan === 'free' || userSubPlan === 'starter')) return false;
        if (level === 'supreme' && userSubPlan !== 'supreme') return false;
        return true;
    }

    window.saveSearchQuery = function(title) {
        if (!title || !title.trim()) return;
        let hist = JSON.parse(localStorage.getItem('snappy_search_history') || '[]');
        hist = hist.filter(q => q.toLowerCase() !== title.toLowerCase());
        hist.unshift(title.trim());
        if (hist.length > 8) hist.pop();
        localStorage.setItem('snappy_search_history', JSON.stringify(hist));
    };

    window.loadSearchHistory = function() {
        const hist = JSON.parse(localStorage.getItem('snappy_search_history') || '[]');
        const container = document.getElementById('history-container');
        const tagsDiv = document.getElementById('history-tags');

        if (hist.length > 0) {
            tagsDiv.innerHTML = hist.map((q, i) => `
            <div class="h-tag">
                <span onclick="fillAndSearch('${q.replace(/'/g,"\\'")}');">${q}</span>
                <span class="h-tag-remove" onclick="removeHistoryItem(${i}, event)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:10px; height:10px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </span>
            </div>`).join('');
            container.style.display = 'block';
        } else {
            container.style.display = 'none';
        }
    };

    window.clearAllSearchHistory = function() {
        localStorage.removeItem('snappy_search_history');
        loadSearchHistory();
    };

    window.removeHistoryItem = function(index, event) {
        event.stopPropagation();
        let hist = JSON.parse(localStorage.getItem('snappy_search_history') || '[]');
        hist.splice(index, 1);
        localStorage.setItem('snappy_search_history', JSON.stringify(hist));
        loadSearchHistory();
    };

    window.fillAndSearch = function(query) {
        searchInput.value = query;
        clearBtn.style.display = 'flex';
        executeSearch(query);
    };

    loadSearchHistory();
</script>
</body>
</html>
